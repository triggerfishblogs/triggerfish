services:
  triggerfish:
    image: ${TRIGGERFISH_IMAGE:-ghcr.io/greghavens/triggerfish:latest}
    init: true
    container_name: triggerfish
    restart: unless-stopped
    network_mode: host
    volumes:
      - triggerfish-data:/data
    env_file:
      - path: .env
        required: false

volumes:
  triggerfish-data:
    name: triggerfish-data
