# Basic Triggerfish deployment. For production environments with secret
# isolation (tmpfs key storage, strict permissions, read-only root),
# see docker-compose.hardened.yml in this directory.

services:
  triggerfish:
    image: ${TRIGGERFISH_IMAGE:-ghcr.io/greghavens/triggerfish:latest}
    container_name: triggerfish
    restart: unless-stopped
    network_mode: host
    volumes:
      - triggerfish-data:/data
    env_file:
      - path: .env
        required: false

volumes:
  triggerfish-data:
    name: triggerfish-data
