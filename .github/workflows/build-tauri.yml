name: Build Tauri Native UI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            output: triggerfish-tidepool-macos-arm64
          - runner: macos-13
            target: x86_64-apple-darwin
            output: triggerfish-tidepool-macos-x64
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            output: triggerfish-tidepool-linux-x64
          - runner: ubuntu-24.04-arm64
            target: aarch64-unknown-linux-gnu
            output: triggerfish-tidepool-linux-arm64
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            output: triggerfish-tidepool-windows-x64.exe

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri binary
        working-directory: tauri
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary to dist
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp tauri/target/${{ matrix.target }}/release/triggerfish-tidepool.exe dist/${{ matrix.output }}
          else
            cp tauri/target/${{ matrix.target }}/release/triggerfish-tidepool dist/${{ matrix.output }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum triggerfish-tidepool-* > SHA256SUMS-tauri.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: SHA256SUMS-tauri
          path: dist/SHA256SUMS-tauri.txt
