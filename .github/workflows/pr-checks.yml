name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  lint:
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Lint
        run: deno task lint

      - name: Type check
        run: deno task check

  hygiene:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check for existing audit comment
        id: check-comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the sticky comment left by the hygiene audit (claude[bot])
          comment=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '[.[] | select(.user.login == "claude[bot]" or .user.login == "github-actions[bot]") | select(.body | test("Hygiene (Check|Audit|check)")) | .body] | last // empty')
          if [ -n "$comment" ]; then
            echo "has_previous=true" >> "$GITHUB_OUTPUT"
            echo "$comment" > previous-hygiene-comment.txt
          else
            echo "has_previous=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          prompt: |
            You are a PR hygiene checker for the Triggerfish project.
            PR NUMBER: ${{ github.event.pull_request.number }}
            HAS PREVIOUS AUDIT: ${{ steps.check-comment.outputs.has_previous }}

            ## MODE SELECTION

            If HAS PREVIOUS AUDIT is "true":
              1. Read the file `previous-hygiene-comment.txt` to see the prior audit results.
              2. Get the current diff: `gh pr diff ${{ github.event.pull_request.number }}`
              3. For each finding in the previous audit, check if it was addressed in the current code.
              4. Post an UPDATED comment showing each original finding with ✅ FIXED or ❌ STILL OPEN.
              5. Do NOT look for new issues. Only verify the previously reported ones.
              6. Write verdict: "FAIL" if any findings are still open, "PASS" if all were fixed or if
                 the previous audit was already clean.

            If HAS PREVIOUS AUDIT is "false":
              1. This is the FIRST audit run. Do a full audit.
              2. Get the diff: `gh pr diff ${{ github.event.pull_request.number }}`
              3. If the PR touches more than 50 files, get the file list and read them individually.
              4. Evaluate these hygiene criteria on changed files ONLY:
                 - Any new file over 300 lines?
                 - Any new exported function with a vague name (process, handle, run, execute, check, validate, do, perform, manage)?
                 - Any new file missing a JSDoc @module comment?
                 - Any new file not re-exported by its directory's mod.ts?
                 - Any .claude/rules/ paths frontmatter that should be updated?
              5. Post a single comment with findings. If clean, comment "Hygiene check passed."
              6. Write verdict: "FAIL" if any findings require changes, "PASS" if clean.

            ## DETERMINISM RULES
            - You MUST report the SAME findings given the same code. Do not invent subjective findings.
            - Only report issues that are objectively verifiable (file line count, function name match, missing export).
            - If you are unsure whether something is an issue, it is NOT an issue. Err on the side of passing.

            ## VERDICT FILE
            As your FINAL action, write a verdict file using the Write tool:
            - Path: audit-verdict.txt
            - Content: exactly "FAIL" or "PASS" (nothing else)
          allowed_bots: 'claude'
          settings: |
            {
              "model": "claude-sonnet-4-6"
            }
          claude_args: "--max-turns 25 --allowedTools 'Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh api:*),Read,Glob,Grep,Write'"

      - name: Enforce hygiene verdict
        run: |
          if [ ! -f audit-verdict.txt ]; then
            echo "::error::Hygiene audit did not produce a verdict file"
            exit 1
          fi
          verdict=$(cat audit-verdict.txt | tr -d '[:space:]')
          if [ "$verdict" = "FAIL" ]; then
            echo "::error::Hygiene audit found issues that require changes — see PR comment"
            exit 1
          elif [ "$verdict" != "PASS" ]; then
            echo "::error::Hygiene audit produced unexpected verdict: $verdict"
            exit 1
          fi
          echo "Hygiene audit passed"

  serviceability:
    needs: hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check for existing audit comment
        id: check-comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the sticky comment left by the serviceability audit (claude[bot])
          comment=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '[.[] | select(.user.login == "claude[bot]" or .user.login == "github-actions[bot]") | select(.body | test("Serviceability (Audit|audit|check)")) | .body] | last // empty')
          if [ -n "$comment" ]; then
            echo "has_previous=true" >> "$GITHUB_OUTPUT"
            echo "$comment" > previous-serviceability-comment.txt
          else
            echo "has_previous=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          prompt: |
            You are a serviceability auditor for the Triggerfish project.
            PR NUMBER: ${{ github.event.pull_request.number }}
            HAS PREVIOUS AUDIT: ${{ steps.check-comment.outputs.has_previous }}

            ## MODE SELECTION

            If HAS PREVIOUS AUDIT is "true":
              1. Read the file `previous-serviceability-comment.txt` to see the prior audit results.
              2. Get the current diff: `gh pr diff ${{ github.event.pull_request.number }}`
              3. For each ❌ BLOCKING finding in the previous audit, check if it was fixed.
              4. For each ⚠️ WARNING in the previous audit, check if it was addressed.
              5. Post an UPDATED comment showing each original finding with its current status:
                 - ✅ FIXED — the issue was addressed
                 - ❌ STILL OPEN — the issue remains
              6. Do NOT look for new issues. Only verify the previously reported ones.
              7. Write verdict: "FAIL" if any ❌ or ⚠️ issues are STILL OPEN. "PASS" if all were fixed.

            If HAS PREVIOUS AUDIT is "false":
              1. This is the FIRST audit run. Do a full audit.
              2. Get the diff: `gh pr diff ${{ github.event.pull_request.number }}`
              3. If the PR touches more than 50 files, get the file list and read them individually.
              4. Evaluate ONLY the changed .ts files (skip tests, type-only files, barrel mod.ts):

              BLOCKING (report as ❌) — these are objective, mechanically verifiable:
              - R001: catch/catch() blocks that don't log, rethrow, or return a typed Result/error.
              - R010: empty .catch() handlers — .catch(() => {}), .catch(() => undefined), .catch((_) => null).
              - R013: log.error/log.warn calls where the message string is ONLY a generic phrase with
                no domain noun. Blocking examples: "failed", "error occurred", "something went wrong".
                NOT blocking: any message that names the operation ("Provider request failed", "HMAC check failed").

              WARNINGS (report as ⚠️) — these also block the PR:
              - R002: logger.error() with only a string message and no structured context.
              - R004: raw console.log/warn/error usage instead of the structured logger.
              - R005: security operations without logging within ±5 lines.
              - R007: logging err.message instead of the full error object.
              - R011: channel adapter files missing message lifecycle logging.
              - R012: security events logged at DEBUG/TRACE instead of WARN+.
              - R014: branching logic where only one path logs.

              5. Post a comment with findings (blocking first, then warnings).
              6. Write verdict: "FAIL" if there are ANY ❌ or ⚠️ findings. "PASS" only if clean.

            ## DETERMINISM RULES
            - You MUST report the SAME findings given the same code. Do not vary between runs.
            - BLOCKING findings must be mechanically verifiable: empty catch, empty .catch(), or a log
              message that is literally just "failed"/"error"/"done" with no other words.
            - If a log message contains ANY domain noun (provider, session, webhook, taint, etc.),
              it is NOT a violation of R013 regardless of how you feel about the phrasing.
            - When in doubt, do NOT report it. False positives are worse than missed findings.

            ## VERDICT FILE
            As your FINAL action, write a verdict file using the Write tool:
            - Path: audit-verdict.txt
            - Content: exactly "FAIL" or "PASS" (nothing else)
          allowed_bots: 'claude'
          settings: |
            {
              "model": "claude-sonnet-4-6"
            }
          claude_args: "--max-turns 25 --allowedTools 'Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh api:*),Bash(grep:*),Bash(cat:*),Read,Glob,Grep,Write'"

      - name: Enforce serviceability verdict
        run: |
          if [ ! -f audit-verdict.txt ]; then
            echo "::error::Serviceability audit did not produce a verdict file"
            exit 1
          fi
          verdict=$(cat audit-verdict.txt | tr -d '[:space:]')
          if [ "$verdict" = "FAIL" ]; then
            echo "::error::Serviceability audit found blocking issues — see PR comment"
            exit 1
          elif [ "$verdict" != "PASS" ]; then
            echo "::error::Serviceability audit produced unexpected verdict: $verdict"
            exit 1
          fi
          echo "Serviceability audit passed"

  code-review:
    needs: serviceability
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-plugins-official.git'
          plugins: 'code-review@claude-plugins-official'
          additional_permissions: |
            actions: read
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Run /code-review on this pull request.

            Post your review findings as a PR comment. Include specific file paths,
            line numbers, and code snippets for each finding. If the code looks good,
            comment "Code review passed — no issues found."

            ## SCOPE — ABSOLUTE CONSTRAINT

            You MUST review ONLY the files and lines that were changed in this PR.
            Run `gh pr diff ${{ github.event.pull_request.number }}` and restrict ALL
            findings to code that appears in that diff.

            NEVER:
            - Flag issues in files not modified by this PR
            - Suggest refactoring code that was not changed in this PR
            - Recommend changes to surrounding/adjacent code that the PR did not touch
            - Propose architectural improvements outside the scope of what was changed
            - Flag pre-existing patterns, naming, or style in unchanged code

            If a changed file imports from or calls into other files, you may READ those
            files for context, but you MUST NOT report findings against them. Your review
            covers the diff and ONLY the diff.

            ## ARCHITECTURE CONTEXT — READ BEFORE REVIEWING

            Triggerfish enforces security policy CENTRALLY below the LLM layer.
            The following concerns are handled by the orchestrator/gateway wiring
            layer and MUST NOT be flagged as missing from individual integrations,
            plugins, or tool handlers:

            1. **Session taint escalation** — Taint is escalated in the centralized
               orchestrator tool executor wrapper (gateway layer), NOT in individual
               tool handlers or integrations. If you see that an integration reads
               classified data but does not call `escalateTaint`, that is BY DESIGN.
               The orchestrator's POST_TOOL_RESPONSE hook handles this. Do NOT flag
               "taint not escalated" in integration code.

            2. **Classification enforcement / canFlowTo** — Write-down prevention
               is enforced by policy hooks in the orchestrator, not by tools or
               integrations. Do NOT flag missing canFlowTo checks in tool code.

            3. **Hook execution** — PRE_TOOL_CALL, POST_TOOL_RESPONSE, and PRE_OUTPUT
               hooks run in the orchestrator around every tool call. Individual tools
               do not need to invoke hooks themselves.

            From .claude/rules/security.md:
            > "Never put session management (taint escalation, classification enforcement)
            >  inside plugins — enforcement belongs in the centralized orchestrator tool
            >  executor wrapper, not in individual tool handlers."

            If you are unsure whether something is centrally handled, err on the side
            of NOT flagging it. False positives about architectural patterns the reviewer
            doesn't understand are worse than missed findings.

            CRITICAL — VERDICT FILE:
            As your FINAL action, you MUST write a verdict file using the Write tool:
            - Path: audit-verdict.txt
            - If you found ANY issues: write exactly "FAIL"
            - If the code looks good with no issues: write exactly "PASS"
            You must ALWAYS write this file. The workflow will fail if the file is missing.
          allowed_bots: 'claude'
          settings: |
            {
              "model": "claude-sonnet-4-6"
            }
          claude_args: "--max-turns 40 --allowedTools 'Skill,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh api:*),Bash(git diff:*),Bash(git log:*),Bash(git fetch:*),Read,Glob,Grep,Write'"

      - name: Enforce code review verdict
        run: |
          if [ ! -f audit-verdict.txt ]; then
            echo "::error::Code review did not produce a verdict file"
            exit 1
          fi
          verdict=$(cat audit-verdict.txt | tr -d '[:space:]')
          if [ "$verdict" = "FAIL" ]; then
            echo "::error::Code review found issues — see PR comment"
            exit 1
          elif [ "$verdict" != "PASS" ]; then
            echo "::error::Code review produced unexpected verdict: $verdict"
            exit 1
          fi
          echo "Code review passed"
