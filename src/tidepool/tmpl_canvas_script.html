<script>
(function() {
  var canvasFrame = document.getElementById("canvas-frame");
  var canvasHistory = document.getElementById("canvas-history");
  var collapseBtn = document.getElementById("canvas-collapse");

  var renderHistory = [];
  var activeRenderId = null;

  // -------------------------------------------------------------------------
  // Canvas panel show/hide
  // -------------------------------------------------------------------------

  window.tidepoolCanvas = {
    show: function() {
      document.body.classList.remove("canvas-hidden");
    },
    hide: function() {
      document.body.classList.add("canvas-hidden");
    },
    toggle: function() {
      document.body.classList.toggle("canvas-hidden");
    },

    // -----------------------------------------------------------------------
    // Render dispatchers
    // -----------------------------------------------------------------------

    render: function(evt) {
      var entry = { id: evt.id, label: evt.label, payload: evt };
      renderHistory.push(entry);
      activeRenderId = evt.id;
      injectPayload(evt);
      updateHistoryBar();
    },

    renderUpdate: function(evt) {
      // canvas_update: just re-render the patched tree into the iframe
      if (evt.tree) {
        var doc = buildComponentDoc(evt.tree.root);
        canvasFrame.srcdoc = doc;
      }
    },

    clear: function() {
      canvasFrame.srcdoc = "";
      activeRenderId = null;
    },

    showRenderId: function(id) {
      for (var i = 0; i < renderHistory.length; i++) {
        if (renderHistory[i].id === id) {
          activeRenderId = id;
          injectPayload(renderHistory[i].payload);
          updateHistoryBar();
          return;
        }
      }
    }
  };

  // Start with canvas hidden
  document.body.classList.add("canvas-hidden");

  collapseBtn.addEventListener("click", function() {
    window.tidepoolCanvas.toggle();
  });

  // -------------------------------------------------------------------------
  // Payload injection into iframe
  // -------------------------------------------------------------------------

  function injectPayload(evt) {
    switch (evt.type) {
      case "canvas_render_component":
        canvasFrame.srcdoc = buildComponentDoc(evt.tree.root);
        break;
      case "canvas_render_html":
        canvasFrame.srcdoc = buildHtmlDoc(evt.html);
        break;
      case "canvas_render_file":
        canvasFrame.srcdoc = buildFileDoc(evt.filename, evt.mime, evt.data);
        break;
    }
  }

  // -------------------------------------------------------------------------
  // Tokyonight base CSS for iframe documents
  // -------------------------------------------------------------------------

  var iframeCSS = [
    "*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }",
    ":root { --bg: #1a1b26; --bg2: #24283b; --bg3: #292e42; --fg: #c0caf5; --fg2: #a9b1d6; --fg3: #565f89; --accent: #7aa2f7; --green: #9ece6a; --yellow: #e0af68; --red: #f7768e; --border: #3b4261; }",
    "html, body { background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; font-size: 14px; padding: 16px; }",
    "h1, h2, h3, h4, h5, h6 { color: var(--fg); margin: 8px 0; }",
    "a { color: var(--accent); }",
    "pre { background: var(--bg2); padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 13px; margin: 8px 0; }",
    "code { font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 13px; }",
    "table { border-collapse: collapse; width: 100%; margin: 8px 0; }",
    "th, td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }",
    "th { background: var(--bg2); color: var(--fg2); font-weight: 600; }",
    "img { max-width: 100%; height: auto; border-radius: 4px; }",
    "svg { max-width: 100%; height: auto; }",
    ".a2ui-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin: 8px 0; }",
    ".a2ui-card h3 { margin: 0 0 8px 0; color: var(--accent); }",
    ".a2ui-form { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin: 8px 0; }",
    ".a2ui-form label { display: block; color: var(--fg2); font-size: 12px; margin-bottom: 4px; }",
    ".a2ui-form input, .a2ui-form select, .a2ui-form textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; color: var(--fg); font-family: inherit; font-size: 14px; margin-bottom: 12px; }",
    ".a2ui-layout-row { display: flex; flex-direction: row; gap: 12px; }",
    ".a2ui-layout-column { display: flex; flex-direction: column; gap: 12px; }",
    ".a2ui-layout-row > * { flex: 1; min-width: 0; }",
    ".file-preview { display: flex; flex-direction: column; align-items: center; gap: 12px; }",
    ".file-preview embed { width: 100%; height: calc(100vh - 100px); border: none; }",
    ".download-btn { display: inline-block; background: var(--accent); color: #1a1b26; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 13px; cursor: pointer; }",
    ".download-btn:hover { opacity: 0.9; }",
    ".file-icon { font-size: 48px; color: var(--fg3); margin: 24px 0; }"
  ].join("\n");

  // -------------------------------------------------------------------------
  // Component tree renderer
  // -------------------------------------------------------------------------

  function renderComponent(node) {
    if (!node || !node.type) return "";
    var p = node.props || {};
    var childHtml = "";
    if (node.children) {
      for (var i = 0; i < node.children.length; i++) {
        childHtml += renderComponent(node.children[i]);
      }
    }

    switch (node.type) {
      case "card":
        return '<div class="a2ui-card"><h3>' + esc(p.title || "") + '</h3><div>' + esc(p.content || "") + '</div></div>';

      case "table":
        var thtml = "<table><thead><tr>";
        var headers = p.headers || [];
        for (var hi = 0; hi < headers.length; hi++) {
          thtml += "<th>" + esc(headers[hi]) + "</th>";
        }
        thtml += "</tr></thead><tbody>";
        var rows = p.rows || [];
        for (var ri = 0; ri < rows.length; ri++) {
          thtml += "<tr>";
          for (var ci = 0; ci < rows[ri].length; ci++) {
            thtml += "<td>" + esc(rows[ri][ci]) + "</td>";
          }
          thtml += "</tr>";
        }
        thtml += "</tbody></table>";
        return thtml;

      case "chart":
        if (p.svg) {
          return '<div>' + p.svg + '</div>';
        }
        return renderStructuredChart(p);

      case "form":
        var fhtml = '<div class="a2ui-form">';
        var fields = p.fields || [];
        for (var fi = 0; fi < fields.length; fi++) {
          var f = fields[fi];
          fhtml += '<label>' + esc(f.label || f.name) + '</label>';
          var ftype = f.type || "text";
          if (ftype === "textarea") {
            fhtml += '<textarea readonly></textarea>';
          } else if (ftype === "select") {
            fhtml += '<select disabled><option>' + esc(f.label) + '</option></select>';
          } else {
            fhtml += '<input type="' + esc(ftype) + '" readonly placeholder="' + esc(f.label || "") + '">';
          }
        }
        fhtml += '</div>';
        return fhtml;

      case "image":
        var alt = p.alt ? ' alt="' + esc(p.alt) + '"' : '';
        return '<img src="' + esc(p.src || "") + '"' + alt + '>';

      case "markdown":
        return '<div>' + renderSimpleMarkdown(p.content || "") + '</div>';

      case "layout":
        var dir = p.direction === "row" ? "row" : "column";
        return '<div class="a2ui-layout-' + dir + '">' + childHtml + '</div>';

      default:
        return '<div>' + childHtml + '</div>';
    }
  }

  // -------------------------------------------------------------------------
  // Structured chart renderer (inline SVG)
  // -------------------------------------------------------------------------

  function renderStructuredChart(props) {
    var chartType = props.type || "bar";
    var labels = props.labels || [];
    var values = props.values || [];
    if (labels.length === 0 || values.length === 0) return '<div>No chart data</div>';

    var maxVal = Math.max.apply(null, values);
    if (maxVal === 0) maxVal = 1;

    var colors = ["#7aa2f7", "#9ece6a", "#e0af68", "#f7768e", "#bb9af7", "#7dcfff", "#ff9e64"];
    var w = 400, h = 260, pad = 40;

    if (chartType === "pie") {
      return renderPieChart(labels, values, colors);
    }

    var svg = '<svg viewBox="0 0 ' + w + ' ' + h + '" xmlns="http://www.w3.org/2000/svg">';
    // axis
    svg += '<line x1="' + pad + '" y1="' + (h - pad) + '" x2="' + (w - 10) + '" y2="' + (h - pad) + '" stroke="#3b4261" stroke-width="1"/>';
    svg += '<line x1="' + pad + '" y1="10" x2="' + pad + '" y2="' + (h - pad) + '" stroke="#3b4261" stroke-width="1"/>';

    var plotW = w - pad - 20;
    var plotH = h - pad - 20;

    if (chartType === "line") {
      var points = [];
      for (var li = 0; li < values.length; li++) {
        var lx = pad + (li / Math.max(values.length - 1, 1)) * plotW;
        var ly = (h - pad) - (values[li] / maxVal) * plotH;
        points.push(lx + "," + ly);
      }
      svg += '<polyline points="' + points.join(" ") + '" fill="none" stroke="#7aa2f7" stroke-width="2"/>';
      for (var di = 0; di < points.length; di++) {
        svg += '<circle cx="' + points[di].split(",")[0] + '" cy="' + points[di].split(",")[1] + '" r="3" fill="#7aa2f7"/>';
      }
      for (var lbi = 0; lbi < labels.length; lbi++) {
        var lbx = pad + (lbi / Math.max(labels.length - 1, 1)) * plotW;
        svg += '<text x="' + lbx + '" y="' + (h - pad + 14) + '" fill="#565f89" font-size="10" text-anchor="middle">' + esc(labels[lbi]) + '</text>';
      }
    } else {
      // bar chart (default)
      var barW = plotW / labels.length * 0.7;
      var gap = plotW / labels.length;
      for (var bi = 0; bi < values.length; bi++) {
        var bx = pad + bi * gap + (gap - barW) / 2;
        var bh = (values[bi] / maxVal) * plotH;
        var by = (h - pad) - bh;
        var color = colors[bi % colors.length];
        svg += '<rect x="' + bx + '" y="' + by + '" width="' + barW + '" height="' + bh + '" fill="' + color + '" rx="2"/>';
        svg += '<text x="' + (bx + barW / 2) + '" y="' + (h - pad + 14) + '" fill="#565f89" font-size="10" text-anchor="middle">' + esc(labels[bi]) + '</text>';
      }
    }

    svg += '</svg>';
    return svg;
  }

  function renderPieChart(labels, values, colors) {
    var total = 0;
    for (var i = 0; i < values.length; i++) total += values[i];
    if (total === 0) return '<div>No chart data</div>';

    var cx = 120, cy = 120, r = 100;
    var svg = '<svg viewBox="0 0 360 260" xmlns="http://www.w3.org/2000/svg">';
    var angle = -Math.PI / 2;

    for (var pi = 0; pi < values.length; pi++) {
      var slice = (values[pi] / total) * 2 * Math.PI;
      var x1 = cx + r * Math.cos(angle);
      var y1 = cy + r * Math.sin(angle);
      var x2 = cx + r * Math.cos(angle + slice);
      var y2 = cy + r * Math.sin(angle + slice);
      var large = slice > Math.PI ? 1 : 0;
      var color = colors[pi % colors.length];
      svg += '<path d="M' + cx + ',' + cy + ' L' + x1 + ',' + y1 + ' A' + r + ',' + r + ' 0 ' + large + ',1 ' + x2 + ',' + y2 + ' Z" fill="' + color + '"/>';

      // Legend
      var ly = 10 + pi * 18;
      svg += '<rect x="260" y="' + ly + '" width="12" height="12" fill="' + color + '" rx="2"/>';
      svg += '<text x="278" y="' + (ly + 10) + '" fill="#c0caf5" font-size="11">' + esc(labels[pi]) + '</text>';

      angle += slice;
    }
    svg += '</svg>';
    return svg;
  }

  // -------------------------------------------------------------------------
  // Simple markdown renderer (for iframe content)
  // -------------------------------------------------------------------------

  function renderSimpleMarkdown(text) {
    var html = esc(text);
    html = html.replace(/```(\w*)?\n([\s\S]*?)```/g, "<pre><code>$2</code></pre>");
    html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
    html = html.replace(/^### (.+)$/gm, "<h3>$1</h3>");
    html = html.replace(/^## (.+)$/gm, "<h2>$1</h2>");
    html = html.replace(/^# (.+)$/gm, "<h1>$1</h1>");
    html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    html = html.replace(/\n/g, "<br>");
    return html;
  }

  // -------------------------------------------------------------------------
  // Document builders
  // -------------------------------------------------------------------------

  function buildComponentDoc(root) {
    var body = renderComponent(root);
    return wrapDoc(body);
  }

  function buildHtmlDoc(html) {
    return wrapDoc(html);
  }

  function buildFileDoc(filename, mime, data) {
    var dataUri = "data:" + mime + ";base64," + data;
    var body = '<div class="file-preview">';

    if (mime.indexOf("image/") === 0) {
      body += '<img src="' + dataUri + '" alt="' + esc(filename) + '">';
    } else if (mime === "application/pdf") {
      body += '<embed src="' + dataUri + '" type="application/pdf">';
    } else if (mime.indexOf("text/") === 0 || mime === "application/json" || mime.indexOf("javascript") !== -1 || mime.indexOf("xml") !== -1 || mime.indexOf("yaml") !== -1) {
      try {
        var decoded = atob(data);
        body += '<pre><code>' + esc(decoded) + '</code></pre>';
      } catch(e) {
        body += '<div class="file-icon">\u{1F4C4}</div>';
        body += '<div>' + esc(filename) + '</div>';
      }
    } else {
      body += '<div class="file-icon">\u{1F4C4}</div>';
      body += '<div>' + esc(filename) + '</div>';
    }

    body += '<a class="download-btn" href="' + dataUri + '" download="' + esc(filename) + '">\u2B07 Download ' + esc(filename) + '</a>';
    body += '</div>';
    return wrapDoc(body);
  }

  function wrapDoc(body) {
    return '<!DOCTYPE html><html><head><meta charset="utf-8"><style>' + iframeCSS + '</style></head><body>' + body + '</body></html>';
  }

  // -------------------------------------------------------------------------
  // History bar
  // -------------------------------------------------------------------------

  function updateHistoryBar() {
    canvasHistory.innerHTML = "";
    for (var i = 0; i < renderHistory.length; i++) {
      var entry = renderHistory[i];
      var pill = document.createElement("span");
      pill.className = "history-pill" + (entry.id === activeRenderId ? " active" : "");
      pill.textContent = entry.label;
      pill.setAttribute("data-id", entry.id);
      pill.addEventListener("click", (function(e) {
        return function() {
          window.tidepoolCanvas.showRenderId(e.id);
        };
      })(entry));
      canvasHistory.appendChild(pill);
    }
    // Scroll to end
    canvasHistory.scrollLeft = canvasHistory.scrollWidth;
  }

  // -------------------------------------------------------------------------
  // Helpers
  // -------------------------------------------------------------------------

  function esc(s) {
    var d = document.createElement("div");
    d.textContent = String(s);
    return d.innerHTML;
  }
})();
</script>
