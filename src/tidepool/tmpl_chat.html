<div id="chat-panel">
  <div id="status">
    <span class="dot disconnected" id="dot"></span>
    <span>Triggerfish Tidepool</span>
    <span class="provider" id="provider-info"></span>
    <span class="taint-badge public" id="taint-badge">PUBLIC</span>
  </div>

  <div id="messages"></div>

  <div id="paste-indicator"><span class="paste-icon">&#x1F4CE;</span> <span id="paste-text">Image pasted</span> <span class="paste-dismiss" id="paste-dismiss">&#x2715;</span></div>
  <div id="input-bar">
    <textarea id="input" rows="1" placeholder="Type a message..." autocomplete="off"></textarea>
    <button id="send" disabled>Send</button>
  </div>
</div>
