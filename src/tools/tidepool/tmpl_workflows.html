<div class="screen-workflows-container">
  <div class="workflows-list-panel" id="workflows-list-panel">
    <div class="workflows-list-header">
      <span>Workflows</span>
      <button
        class="workflows-panel-toggle"
        id="workflows-toggle-detail"
        title="Toggle detail panel"
      >
        <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor">
          <path
            d="M6 2v12l4-6-4-6z"
            id="workflows-toggle-icon-path"
          />
        </svg>
      </button>
    </div>
    <div class="workflows-sections" id="workflows-sections">
      <!-- Active runs section -->
      <div class="workflows-group" id="workflows-group-active">
        <div class="workflows-group-header">RUNNING</div>
        <div class="workflows-group-items" id="workflows-items-active"></div>
      </div>
      <!-- Saved workflows section -->
      <div class="workflows-group" id="workflows-group-saved">
        <div class="workflows-group-header">SAVED WORKFLOWS</div>
        <div class="workflows-group-items" id="workflows-items-saved"></div>
      </div>
    </div>
  </div>
  <div class="workflows-resize-handle" id="workflows-resize-handle"></div>
  <div class="workflows-detail-panel" id="workflows-detail-panel">
    <div
      class="workflows-detail-placeholder"
      id="workflows-detail-placeholder"
    >
      <div class="screen-placeholder">
        <svg viewBox="0 0 20 20" width="36" height="36" fill="var(--fg3)">
          <path
            d="M3 3h4v4H3V3zm5 1h9v2H8V4zM3 9h4v4H3V9zm5 1h9v2H8v-2zM3 15h4v4H3v-4zm5 1h9v2H8v-2z"
          />
        </svg>
        <div>Select a workflow or running instance</div>
      </div>
    </div>
    <div
      class="workflows-detail-content"
      id="workflows-detail-content"
      style="display: none"
    >
      <div class="workflows-detail-header" id="workflows-detail-header"></div>
      <div class="workflows-detail-meta" id="workflows-detail-meta"></div>
      <div
        class="workflows-detail-actions"
        id="workflows-detail-actions"
      >
      </div>
      <div class="workflows-detail-body" id="workflows-detail-body">
        <div class="workflows-pane-top" id="workflows-pane-top"></div>
        <div
          class="workflows-hsplit"
          id="workflows-hsplit"
          style="display: none"
        >
          <div class="workflows-hsplit-line"></div>
          <button
            class="workflows-hsplit-minimize"
            id="workflows-hsplit-minimize"
            title="Minimize bottom pane"
          >
            <svg
              viewBox="0 0 16 16"
              width="12"
              height="12"
              fill="currentColor"
            >
              <path
                d="M3 6l5 5 5-5H3z"
                id="workflows-hsplit-icon-path"
              />
            </svg>
          </button>
        </div>
        <div
          class="workflows-pane-bottom"
          id="workflows-pane-bottom"
          style="display: none"
        >
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Context menu for active runs -->
<div
  class="workflows-context-menu"
  id="workflows-ctx-run"
  style="display: none"
>
  <div class="workflows-ctx-item" data-action="pause">Pause</div>
  <div class="workflows-ctx-item" data-action="unpause">Resume</div>
  <div class="workflows-ctx-sep"></div>
  <div class="workflows-ctx-item" data-action="stop">Stop</div>
</div>

<!-- Context menu for saved workflows -->
<div
  class="workflows-context-menu"
  id="workflows-ctx-saved"
  style="display: none"
>
  <div class="workflows-ctx-item" data-action="run">Run Now</div>
  <div class="workflows-ctx-item" data-action="schedule">Schedule...</div>
  <div class="workflows-ctx-item" data-action="view">View Definition</div>
  <div class="workflows-ctx-sep"></div>
  <div class="workflows-ctx-item" data-action="delete">Delete</div>
</div>

<!-- Schedule dialog -->
<div
  class="workflows-modal-overlay"
  id="workflows-schedule-overlay"
  style="display: none"
>
  <div class="workflows-modal">
    <div class="workflows-modal-header">Schedule Workflow</div>
    <div class="workflows-modal-body">
      <div class="workflows-modal-field">
        <label>Workflow</label>
        <div class="workflows-modal-value" id="schedule-wf-name"></div>
      </div>
      <div class="workflows-modal-field">
        <label>Type</label>
        <div class="workflows-modal-radios">
          <label class="workflows-radio">
            <input type="radio" name="schedule-type" value="cron" checked />
            Recurring (cron)
          </label>
          <label class="workflows-radio">
            <input type="radio" name="schedule-type" value="once" /> One-time
            (run at)
          </label>
        </div>
      </div>
      <div class="workflows-modal-field" id="schedule-cron-field">
        <label>Cron Expression</label>
        <input
          type="text"
          id="schedule-cron-input"
          class="workflows-modal-input"
          placeholder="0 9 * * *"
        />
        <div class="workflows-modal-hint">minute hour day month weekday</div>
      </div>
      <div
        class="workflows-modal-field"
        id="schedule-once-field"
        style="display: none"
      >
        <label>Run At</label>
        <input
          type="datetime-local"
          id="schedule-once-input"
          class="workflows-modal-input"
        />
      </div>
      <div
        class="workflows-modal-error"
        id="schedule-error"
        style="display: none"
      >
      </div>
    </div>
    <div class="workflows-modal-footer">
      <button class="workflows-action-btn" id="schedule-cancel-btn">
        Cancel
      </button>
      <button
        class="workflows-action-btn workflows-action-primary"
        id="schedule-confirm-btn"
      >
        Schedule
      </button>
    </div>
  </div>
</div>

<script>
  (function () {
    var activeItems = document.getElementById("workflows-items-active");
    var savedItems = document.getElementById("workflows-items-saved");
    var detailPlaceholder = document.getElementById(
      "workflows-detail-placeholder",
    );
    var detailContent = document.getElementById("workflows-detail-content");
    var detailHeader = document.getElementById("workflows-detail-header");
    var detailMeta = document.getElementById("workflows-detail-meta");
    var detailActions = document.getElementById("workflows-detail-actions");
    var detailBody = document.getElementById("workflows-detail-body");
    var ctxRun = document.getElementById("workflows-ctx-run");
    var ctxSaved = document.getElementById("workflows-ctx-saved");
    var resizeHandle = document.getElementById("workflows-resize-handle");
    var listPanel = document.getElementById("workflows-list-panel");
    var detailPanel = document.getElementById("workflows-detail-panel");
    var toggleBtn = document.getElementById("workflows-toggle-detail");
    var toggleIconPath = document.getElementById(
      "workflows-toggle-icon-path",
    );
    var container = document.querySelector(".screen-workflows-container");
    var paneTop = document.getElementById("workflows-pane-top");
    var paneBottom = document.getElementById("workflows-pane-bottom");
    var hsplit = document.getElementById("workflows-hsplit");
    var hsplitMinBtn = document.getElementById("workflows-hsplit-minimize");
    var hsplitIconPath = document.getElementById(
      "workflows-hsplit-icon-path",
    );

    // ── Vertical resize (list ↔ detail panels) ─────────────────────

    var isVResizing = false;

    resizeHandle.addEventListener("mousedown", function (e) {
      e.preventDefault();
      isVResizing = true;
      document.body.style.cursor = "col-resize";
      document.body.style.userSelect = "none";
    });

    document.addEventListener("mousemove", function (e) {
      if (isVResizing) {
        var containerRect = container.getBoundingClientRect();
        var newWidth = e.clientX - containerRect.left;
        var minW = 200;
        var maxW = containerRect.width - 200;
        newWidth = Math.max(minW, Math.min(maxW, newWidth));
        listPanel.style.width = newWidth + "px";
      }
      if (isHResizing) {
        var bodyRect = detailBody.getBoundingClientRect();
        var newTop = e.clientY - bodyRect.top;
        var minH = 60;
        var maxH = bodyRect.height - 60;
        newTop = Math.max(minH, Math.min(maxH, newTop));
        var pct = (newTop / bodyRect.height) * 100;
        paneTop.style.flex = "0 0 " + pct + "%";
        paneBottom.style.flex = "1";
      }
    });

    document.addEventListener("mouseup", function () {
      if (isVResizing) {
        isVResizing = false;
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
      }
      if (isHResizing) {
        isHResizing = false;
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
      }
    });

    // ── Minimize / maximize detail panel ─────────────────────────────

    var detailMinimized = false;

    toggleBtn.addEventListener("click", function () {
      detailMinimized = !detailMinimized;
      if (detailMinimized) {
        detailPanel.style.display = "none";
        resizeHandle.style.display = "none";
        listPanel.style.flex = "1";
        listPanel.style.width = "";
        toggleIconPath.setAttribute("d", "M6 2v12l4-6-4-6z");
      } else {
        detailPanel.style.display = "";
        resizeHandle.style.display = "";
        listPanel.style.flex = "";
        listPanel.style.width = "320px";
        toggleIconPath.setAttribute("d", "M10 2v12l-4-6 4-6z");
      }
    });

    // ── Horizontal resize (top pane ↔ bottom pane in detail) ────────

    var isHResizing = false;
    var bottomMinimized = false;

    hsplit.addEventListener("mousedown", function (e) {
      if (
        e.target === hsplitMinBtn ||
        e.target.closest(".workflows-hsplit-minimize")
      ) return;
      e.preventDefault();
      isHResizing = true;
      document.body.style.cursor = "row-resize";
      document.body.style.userSelect = "none";
    });

    hsplitMinBtn.addEventListener("click", function () {
      bottomMinimized = !bottomMinimized;
      if (bottomMinimized) {
        paneBottom.style.display = "none";
        paneTop.style.flex = "1";
        // Chevron points up (click to restore)
        hsplitIconPath.setAttribute("d", "M3 10l5-5 5 5H3z");
      } else {
        paneBottom.style.display = "";
        paneTop.style.flex = "";
        // Chevron points down (click to minimize)
        hsplitIconPath.setAttribute("d", "M3 6l5 5 5-5H3z");
      }
    });

    var TAINT_BORDERS = {
      PUBLIC: "var(--green)",
      INTERNAL: "var(--yellow)",
      CONFIDENTIAL: "var(--orange)",
      RESTRICTED: "var(--red)",
    };

    var TAINT_CLASSES = {
      PUBLIC: "taint-public",
      INTERNAL: "taint-internal",
      CONFIDENTIAL: "taint-confidential",
      RESTRICTED: "taint-restricted",
    };

    var activeRuns = [];
    var savedWorkflows = [];
    var selectedRunId = null;
    var selectedWorkflowName = null;
    var ctxTargetRunId = null;
    var ctxTargetWfName = null;

    function escapeH(s) {
      var d = document.createElement("div");
      d.textContent = s || "";
      return d.innerHTML;
    }

    function fmtTime(iso) {
      if (!iso) return "";
      var d = new Date(iso);
      return d.toLocaleString(undefined, {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function fmtDuration(startIso, endIso) {
      if (!startIso || !endIso) return "";
      var ms = new Date(endIso).getTime() - new Date(startIso).getTime();
      if (ms < 1000) return ms + "ms";
      var s = Math.floor(ms / 1000);
      if (s < 60) return s + "s";
      var m = Math.floor(s / 60);
      return m + "m " + (s % 60) + "s";
    }

    // ── Active run cards ────────────────────────────────────────────

    function renderActiveRunCard(run) {
      var el = document.createElement("div");
      el.className = "workflows-run-card";
      el.setAttribute("data-run-id", run.runId);
      var taintColor = TAINT_BORDERS[run.taint] || "var(--border)";
      el.style.borderLeftColor = taintColor;

      if (run.runId === selectedRunId) el.classList.add("selected");

      var statusDot = run.paused ? "yellow" : "green";
      var statusLabel = run.paused ? "PAUSED" : "RUNNING";

      el.innerHTML = '<div class="workflows-card-top">' +
        '<span class="status-dot ' +
        statusDot +
        '"></span>' +
        '<span class="workflows-card-label">' +
        escapeH(run.workflowName) +
        "</span>" +
        "</div>" +
        '<div class="workflows-card-task">' +
        escapeH(
          "Task " + run.currentTaskIndex + ": " + run.currentTaskName,
        ) +
        "</div>" +
        '<div class="workflows-card-bottom">' +
        '<span class="taint-badge ' +
        (run.taint || "PUBLIC").toLowerCase() +
        '">' +
        escapeH(run.taint || "PUBLIC") +
        "</span>" +
        '<span class="workflows-card-status">' +
        statusLabel +
        "</span>" +
        "</div>";

      el.addEventListener("click", function () {
        selectActiveRun(run);
      });
      el.addEventListener("contextmenu", function (e) {
        e.preventDefault();
        showRunContextMenu(e, run);
      });
      return el;
    }

    function renderActiveRuns() {
      activeItems.innerHTML = "";
      if (activeRuns.length === 0) {
        activeItems.innerHTML =
          '<div class="workflows-empty">No running workflows</div>';
        return;
      }
      for (var i = 0; i < activeRuns.length; i++) {
        activeItems.appendChild(renderActiveRunCard(activeRuns[i]));
      }
    }

    // ── Saved workflow cards ────────────────────────────────────────

    function renderSavedWorkflowCard(wf) {
      var el = document.createElement("div");
      el.className = "workflows-saved-card";
      el.setAttribute("data-workflow-name", wf.name);

      if (wf.name === selectedWorkflowName && !selectedRunId) {
        el.classList.add("selected");
      }

      el.innerHTML = '<div class="workflows-card-top">' +
        '<span class="workflows-card-label">' +
        escapeH(wf.name) +
        "</span>" +
        "</div>" +
        (wf.description
          ? '<div class="workflows-card-desc">' +
            escapeH(wf.description) +
            "</div>"
          : "") +
        '<div class="workflows-card-bottom">' +
        '<span class="taint-badge ' +
        (wf.classification || "PUBLIC").toLowerCase() +
        '">' +
        escapeH(wf.classification || "PUBLIC") +
        "</span>" +
        '<span class="workflows-card-time">' +
        escapeH(fmtTime(wf.savedAt)) +
        "</span>" +
        "</div>";

      el.addEventListener("click", function () {
        selectSavedWorkflow(wf);
      });
      el.addEventListener("contextmenu", function (e) {
        e.preventDefault();
        showSavedContextMenu(e, wf);
      });
      return el;
    }

    function renderSavedWorkflows() {
      savedItems.innerHTML = "";
      if (savedWorkflows.length === 0) {
        savedItems.innerHTML =
          '<div class="workflows-empty">No saved workflows</div>';
        return;
      }
      for (var i = 0; i < savedWorkflows.length; i++) {
        savedItems.appendChild(renderSavedWorkflowCard(savedWorkflows[i]));
      }
    }

    // ── Detail: active run ──────────────────────────────────────────

    function selectActiveRun(run) {
      selectedRunId = run.runId;
      selectedWorkflowName = null;
      updateListSelection();
      showDetail();

      var taintClass = TAINT_CLASSES[run.taint] || "taint-public";
      detailHeader.className = "workflows-detail-header " + taintClass;
      detailHeader.innerHTML = '<span class="status-dot ' +
        (run.paused ? "yellow" : "green") +
        '"></span>' +
        '<span class="workflows-detail-label">' +
        escapeH(run.workflowName) +
        "</span>" +
        '<span class="taint-badge ' +
        (run.taint || "PUBLIC").toLowerCase() +
        '">' +
        escapeH(run.taint || "PUBLIC") +
        "</span>";

      detailMeta.innerHTML = "<div>Run ID: <code>" +
        escapeH(run.runId.slice(0, 8)) +
        "...</code></div>" +
        "<div>Started: " +
        escapeH(fmtTime(run.startedAt)) +
        "</div>" +
        "<div>Status: <strong>" +
        escapeH(run.paused ? "Paused" : "Running") +
        "</strong></div>" +
        "<div>Current task: " +
        escapeH(run.currentTaskName) +
        " (step " +
        run.currentTaskIndex +
        ")</div>";

      renderRunActions(run);
      renderRunTree(run);
    }

    function renderRunActions(run) {
      detailActions.innerHTML = "";
      if (run.paused) {
        detailActions.appendChild(
          makeActionBtn("Resume", "workflows-action-primary", function () {
            sendControl(run.runId, "unpause");
          }),
        );
      } else {
        detailActions.appendChild(
          makeActionBtn("Pause", "workflows-action-warn", function () {
            sendControl(run.runId, "pause");
          }),
        );
      }
      detailActions.appendChild(
        makeActionBtn("Stop", "workflows-action-danger", function () {
          sendControl(run.runId, "stop");
        }),
      );
    }

    // ── Flowchart state ────────────────────────────────────────────
    var currentRunTasks = [];
    var currentRunSteps = {};
    var currentViewMode = "flowchart"; // "flowchart" or "yaml"
    var currentWorkflowYaml = null;
    var currentWorkflowTasks = [];
    var currentHealingData = null;

    var NODE_W = 160;
    var NODE_H = 64;
    var GAP_X = 48;
    var GAP_Y = 36;
    var PAD = 24;

    // ── Flowchart layout engine ──────────────────────────────────

    function layoutGraph(tasks) {
      if (!tasks || tasks.length === 0) return { nodes: [], edges: [], width: 0, height: 0 };
      var nodes = [];
      var edges = [];
      var col = 0;
      var lane = 0;

      for (var i = 0; i < tasks.length; i++) {
        var task = tasks[i];
        var x = PAD + col * (NODE_W + GAP_X);
        var y = PAD + lane * (NODE_H + GAP_Y);

        nodes.push({
          index: i,
          task: task,
          x: x,
          y: y,
          col: col,
          lane: lane,
        });

        if (task.type === "switch" && task.switchCases) {
          var baseLane = lane;
          var mergeCol = col + 1;
          for (var c = 0; c < task.switchCases.length; c++) {
            var caseLane = baseLane + c;
            var caseX = PAD + mergeCol * (NODE_W + GAP_X);
            var caseY = PAD + caseLane * (NODE_H + GAP_Y);
            edges.push({
              fromIndex: i,
              toCol: mergeCol,
              toLane: caseLane,
              label: task.switchCases[c].name || ("case " + c),
              fromX: x + NODE_W, fromY: y + NODE_H / 2,
              toX: caseX, toY: caseY + NODE_H / 2,
            });
          }
          // next task goes after the switch fan-out
          lane = baseLane;
          col = mergeCol;
        }

        // Edge to next task
        if (i < tasks.length - 1 && task.type !== "switch") {
          var nextCol = col + 1;
          var nextX = PAD + nextCol * (NODE_W + GAP_X);
          edges.push({
            fromIndex: i,
            toCol: nextCol,
            toLane: lane,
            fromX: x + NODE_W, fromY: y + NODE_H / 2,
            toX: nextX, toY: PAD + lane * (NODE_H + GAP_Y) + NODE_H / 2,
          });
        }
        col++;
      }

      var maxCol = 0;
      var maxLane = 0;
      for (var n = 0; n < nodes.length; n++) {
        if (nodes[n].col > maxCol) maxCol = nodes[n].col;
        if (nodes[n].lane > maxLane) maxLane = nodes[n].lane;
      }
      // Also account for switch fan-out edges
      for (var e = 0; e < edges.length; e++) {
        if (edges[e].toLane > maxLane) maxLane = edges[e].toLane;
      }

      return {
        nodes: nodes,
        edges: edges,
        width: PAD * 2 + (maxCol + 1) * NODE_W + maxCol * GAP_X,
        height: PAD * 2 + (maxLane + 1) * NODE_H + maxLane * GAP_Y,
      };
    }

    var TAINT_ORDER = { PUBLIC: 1, INTERNAL: 2, CONFIDENTIAL: 3, RESTRICTED: 4 };

    function renderFlowchart(layout, stepStates) {
      var wrap = document.createElement("div");
      wrap.className = "wf-flowchart-wrap";

      var canvas = document.createElement("div");
      canvas.className = "wf-flowchart-canvas";
      canvas.style.width = Math.max(layout.width, 400) + "px";
      canvas.style.height = Math.max(layout.height, 200) + "px";

      // SVG edges layer
      var svgNS = "http://www.w3.org/2000/svg";
      var svg = document.createElementNS(svgNS, "svg");
      svg.setAttribute("class", "wf-flowchart-svg");
      svg.setAttribute("width", canvas.style.width);
      svg.setAttribute("height", canvas.style.height);

      // Arrow marker
      var defs = document.createElementNS(svgNS, "defs");
      var marker = document.createElementNS(svgNS, "marker");
      marker.setAttribute("id", "wf-arrow");
      marker.setAttribute("viewBox", "0 0 10 7");
      marker.setAttribute("refX", "10");
      marker.setAttribute("refY", "3.5");
      marker.setAttribute("markerWidth", "8");
      marker.setAttribute("markerHeight", "6");
      marker.setAttribute("orient", "auto-start-reverse");
      var arrowPath = document.createElementNS(svgNS, "path");
      arrowPath.setAttribute("d", "M 0 0 L 10 3.5 L 0 7 z");
      arrowPath.setAttribute("fill", "var(--fg3)");
      marker.appendChild(arrowPath);
      defs.appendChild(marker);
      svg.appendChild(defs);

      // Render edges
      for (var e = 0; e < layout.edges.length; e++) {
        var edge = layout.edges[e];
        var path = document.createElementNS(svgNS, "path");
        var mx = (edge.fromX + edge.toX) / 2;
        var d = "M " + edge.fromX + " " + edge.fromY +
          " C " + mx + " " + edge.fromY + " " + mx + " " + edge.toY +
          " " + edge.toX + " " + edge.toY;
        path.setAttribute("d", d);
        path.setAttribute("fill", "none");
        path.setAttribute("stroke", "var(--fg3)");
        path.setAttribute("stroke-width", "1.5");
        path.setAttribute("marker-end", "url(#wf-arrow)");
        path.setAttribute("data-from", String(edge.fromIndex));
        svg.appendChild(path);

        if (edge.label) {
          var labelEl = document.createElement("div");
          labelEl.className = "wf-edge-label";
          labelEl.textContent = edge.label;
          labelEl.style.left = (mx - 15) + "px";
          labelEl.style.top = ((edge.fromY + edge.toY) / 2 - 8) + "px";
          canvas.appendChild(labelEl);
        }
      }

      canvas.appendChild(svg);

      // Render nodes
      for (var i = 0; i < layout.nodes.length; i++) {
        var n = layout.nodes[i];
        var task = n.task;
        var el = document.createElement("div");
        el.className = "wf-node";
        el.setAttribute("data-task-index", String(n.index));
        el.style.left = n.x + "px";
        el.style.top = n.y + "px";

        // Step state overlay
        var step = stepStates ? stepStates[n.index] : null;
        if (step) {
          el.classList.add("step-" + step.status);
          var taintLevel = step.taintAfter || step.taintBefore;
          if (taintLevel) {
            el.classList.add("taint-" + taintLevel.toLowerCase());
          }
        }

        var nameRow = '<div class="wf-node-name">' + escapeH(task.name);
        if (task.condition) nameRow += '<span class="wf-node-cond">?</span>';
        nameRow += '</div>';

        var typeClass = "wf-node-type wf-node-type-" + escapeH(task.type);
        var typeLabel = task.type;
        if (task.callType) typeLabel += ":" + task.callType;

        var html = nameRow +
          '<span class="' + typeClass + '">' + escapeH(typeLabel) + '</span>';

        if (task.metadata && task.metadata.description) {
          html += '<div class="wf-node-desc">' +
            escapeH(task.metadata.description) + '</div>';
        }

        el.innerHTML = html;

        // Now add taint badge + escalation after innerHTML is set
        if (step) {
          var taintLevel2 = step.taintAfter || step.taintBefore;
          if (taintLevel2) {
            var badge = document.createElement("div");
            badge.className = "wf-node-taint taint-badge " + taintLevel2.toLowerCase();
            badge.textContent = taintLevel2;
            el.appendChild(badge);
          }
          if (step.taintBefore && step.taintAfter &&
              TAINT_ORDER[step.taintAfter] > TAINT_ORDER[step.taintBefore]) {
            var esc = document.createElement("span");
            esc.className = "wf-taint-escalation";
            esc.textContent = "\u2191";
            esc.style.color = TAINT_BORDERS[step.taintAfter] || "var(--fg3)";
            el.querySelector(".wf-node-name").appendChild(esc);
          }
          // Healing badge
          if (step.healingPhase) {
            var hBadge = document.createElement("div");
            var phaseAbbrev = formatHealingPhase(step.healingPhase, step.attemptNumber);
            var phaseClass = getHealingBadgeClass(step.healingPhase);
            hBadge.className = "wf-healing-badge " + phaseClass + " healing-active";
            hBadge.textContent = phaseAbbrev;
            el.appendChild(hBadge);
          }
          // Click handler for failed nodes with healing
          if (step.status === "failed") {
            (function(stepData, taskData) {
              el.style.cursor = "pointer";
              el.addEventListener("click", function() {
                showHealingPanel(taskData.name);
              });
            })(step, task);
          }
        }

        canvas.appendChild(el);
      }

      wrap.appendChild(canvas);

      // Auto-scroll to running node
      if (stepStates) {
        setTimeout(function() {
          var running = wrap.querySelector(".step-running");
          if (running) running.scrollIntoView({ behavior: "smooth", block: "center", inline: "center" });
        }, 50);
      }

      return wrap;
    }

    function formatHealingPhase(phase, attempt) {
      var map = {
        WATCHING: "WATCH",
        TRIAGING: "TRIAGE",
        RETRYING: "RETRY",
        APPLYING_WORKAROUND: "FIX",
        PROPOSING_FIX: "FIX",
        AUTHORING_PLUGIN: "PLUGIN",
        ESCALATING: "ESCALATE",
      };
      var label = map[phase] || phase;
      if (phase === "RETRYING" && attempt) label += " " + attempt + "/3";
      return label;
    }

    function getHealingBadgeClass(phase) {
      if (phase === "WATCHING" || phase === "TRIAGING" || phase === "RETRYING") {
        return "healing-retry";
      }
      if (phase === "APPLYING_WORKAROUND" || phase === "PROPOSING_FIX" || phase === "AUTHORING_PLUGIN") {
        return "healing-fix";
      }
      return "healing-escalate";
    }

    // ── YAML syntax highlighting ─────────────────────────────────

    function highlightYaml(text) {
      return text.replace(/^(#.*)$/gm, '<span class="wf-yaml-comment">$1</span>')
        .replace(/^(\s*[\w.-]+)(:)/gm, '<span class="wf-yaml-key">$1</span>$2')
        .replace(/:\s+(".*?")/g, ': <span class="wf-yaml-string">$1</span>')
        .replace(/:\s+('.*?')/g, ': <span class="wf-yaml-string">$1</span>')
        .replace(/:\s+(\d+\.?\d*)\s*$/gm, ': <span class="wf-yaml-number">$1</span>')
        .replace(/:\s+(true|false)\s*$/gm, ': <span class="wf-yaml-bool">$1</span>');
    }

    // ── Split diff renderer ──────────────────────────────────────

    /** Reconstruct proposed file lines from current YAML + unified diff. */
    function reconstructProposedLines(currentYaml, diff) {
      if (!diff) {
        var fallback = (currentYaml || "").split("\n");
        return fallback.map(function(l) { return { text: l, added: false }; });
      }
      var result = [];
      var srcLines = (currentYaml || "").split("\n");
      var diffLines = diff.split("\n");
      var srcIdx = 0;
      var di = 0;
      // Skip diff header lines until first hunk
      while (di < diffLines.length && !diffLines[di].startsWith("@@")) { di++; }
      while (di < diffLines.length) {
        var dl = diffLines[di];
        if (dl.startsWith("@@")) {
          var hm = dl.match(/@@ -(\d+)/);
          var hunkStart = hm ? parseInt(hm[1], 10) - 1 : srcIdx;
          // Copy unchanged lines before this hunk
          while (srcIdx < hunkStart && srcIdx < srcLines.length) {
            result.push({ text: srcLines[srcIdx], added: false });
            srcIdx++;
          }
          di++;
        } else if (dl.startsWith("-")) {
          srcIdx++;
          di++;
        } else if (dl.startsWith("+")) {
          result.push({ text: dl.substring(1), added: true });
          di++;
        } else {
          result.push({ text: srcLines[srcIdx] || dl.substring(1), added: false });
          srcIdx++;
          di++;
        }
      }
      // Copy remaining unchanged lines after last hunk
      while (srcIdx < srcLines.length) {
        result.push({ text: srcLines[srcIdx], added: false });
        srcIdx++;
      }
      return result;
    }

    function renderSplitDiff(currentYaml, diff, versionNumber, reasoning) {
      var container = document.createElement("div");
      container.style.display = "flex";
      container.style.flexDirection = "column";
      container.style.flex = "1";
      container.style.minHeight = "0";

      if (reasoning) {
        var reasonBlock = document.createElement("div");
        reasonBlock.className = "wf-approval-reasoning";
        reasonBlock.textContent = reasoning;
        container.appendChild(reasonBlock);
      }

      var diffWrap = document.createElement("div");
      diffWrap.className = "wf-diff-container";

      var leftPane = document.createElement("div");
      leftPane.className = "wf-diff-pane";
      var leftHeader = document.createElement("div");
      leftHeader.className = "wf-diff-header";
      leftHeader.textContent = "Current";
      leftPane.appendChild(leftHeader);

      var rightPane = document.createElement("div");
      rightPane.className = "wf-diff-pane";
      var rightHeader = document.createElement("div");
      rightHeader.className = "wf-diff-header";
      rightHeader.textContent = "Proposed (v" + (versionNumber || "?") + ")";
      rightPane.appendChild(rightHeader);

      // Parse unified diff to identify added/removed lines
      var addedLines = {};
      var removedLines = {};
      if (diff) {
        var lines = diff.split("\n");
        var leftLine = 0;
        var rightLine = 0;
        for (var d = 0; d < lines.length; d++) {
          var line = lines[d];
          if (line.startsWith("@@")) {
            var match = line.match(/@@ -(\d+)/);
            if (match) leftLine = parseInt(match[1], 10) - 1;
            var match2 = line.match(/\+(\d+)/);
            if (match2) rightLine = parseInt(match2[1], 10) - 1;
          } else if (line.startsWith("-")) {
            removedLines[leftLine] = true;
            leftLine++;
          } else if (line.startsWith("+")) {
            addedLines[rightLine] = true;
            rightLine++;
          } else {
            leftLine++;
            rightLine++;
          }
        }
      }

      // Render current yaml with removed highlights
      var currentLines = (currentYaml || "").split("\n");
      var leftPre = document.createElement("pre");
      leftPre.className = "workflows-yaml-block";
      leftPre.style.margin = "0";
      leftPre.style.borderRadius = "0";
      leftPre.style.border = "none";
      for (var cl = 0; cl < currentLines.length; cl++) {
        var lineDiv = document.createElement("div");
        lineDiv.className = "wf-diff-line" + (removedLines[cl] ? " wf-diff-removed" : "");
        lineDiv.innerHTML = highlightYaml(escapeH(currentLines[cl]));
        leftPre.appendChild(lineDiv);
      }
      leftPane.appendChild(leftPre);

      // Reconstruct proposed yaml by applying unified diff to current
      var proposedLines = reconstructProposedLines(currentYaml, diff);

      var rightPre = document.createElement("pre");
      rightPre.className = "workflows-yaml-block";
      rightPre.style.margin = "0";
      rightPre.style.borderRadius = "0";
      rightPre.style.border = "none";
      for (var rl = 0; rl < proposedLines.length; rl++) {
        var rLineDiv = document.createElement("div");
        rLineDiv.className = "wf-diff-line" + (proposedLines[rl].added ? " wf-diff-added" : "");
        rLineDiv.innerHTML = highlightYaml(escapeH(proposedLines[rl].text));
        rightPre.appendChild(rLineDiv);
      }
      rightPane.appendChild(rightPre);

      diffWrap.appendChild(leftPane);
      diffWrap.appendChild(rightPane);
      container.appendChild(diffWrap);
      return container;
    }

    // ── Healing detail panel ─────────────────────────────────────

    function showHealingPanel(taskName) {
      if (!selectedWorkflowName && !selectedRunId) return;
      var wfName = selectedWorkflowName;
      if (!wfName && selectedRunId) {
        for (var r = 0; r < activeRuns.length; r++) {
          if (activeRuns[r].runId === selectedRunId) {
            wfName = activeRuns[r].workflowName;
            break;
          }
        }
      }
      if (wfName && window.tidepoolWs) {
        window.tidepoolWs.send({
          topic: "workflows",
          action: "get_healing_status",
          payload: { workflowName: wfName },
        });
      }
    }

    function renderHealingPanel(data) {
      var panel = document.createElement("div");
      panel.className = "wf-healing-panel";

      // Versions list
      var versions = data.versions || [];
      var pending = null;
      for (var v = 0; v < versions.length; v++) {
        if (versions[v].status === "PROPOSED") {
          pending = versions[v];
          break;
        }
      }

      if (versions.length === 0) {
        panel.innerHTML = '<div class="workflows-empty">No healing activity</div>';
        return panel;
      }

      // Version history section
      var section = document.createElement("div");
      section.className = "wf-healing-section";
      var title = document.createElement("div");
      title.className = "wf-healing-section-title";
      title.textContent = "VERSION HISTORY";
      section.appendChild(title);

      var logDiv = document.createElement("div");
      logDiv.className = "wf-healing-log";
      for (var vi = 0; vi < versions.length; vi++) {
        var ver = versions[vi];
        var entry = document.createElement("div");
        entry.className = "wf-healing-log-entry";
        entry.innerHTML = '<span class="wf-healing-log-time">' +
          escapeH(fmtTime(ver.proposedAt)) + '</span>' +
          '<span>v' + escapeH(String(ver.versionNumber)) + ' — ' +
          escapeH(ver.status) + ' (' + escapeH(ver.source) + ')</span>';
        logDiv.appendChild(entry);
      }
      section.appendChild(logDiv);
      panel.appendChild(section);

      // Pending approval
      if (pending) {
        var approvalBox = document.createElement("div");
        approvalBox.className = "wf-approval-box";

        var reasonDiv = document.createElement("div");
        reasonDiv.className = "wf-approval-reasoning";
        reasonDiv.textContent = pending.authorReasoning || "No reasoning provided";
        approvalBox.appendChild(reasonDiv);

        var diffLink = document.createElement("a");
        diffLink.href = "#";
        diffLink.textContent = "View diff";
        diffLink.style.fontSize = "11px";
        diffLink.style.color = "var(--accent)";
        diffLink.addEventListener("click", function(e) {
          e.preventDefault();
          currentViewMode = "yaml";
          renderCurrentView();
        });
        approvalBox.appendChild(diffLink);

        var actionsDiv = document.createElement("div");
        actionsDiv.className = "wf-approval-actions";
        actionsDiv.style.marginTop = "8px";

        var rejectInput = document.createElement("input");
        rejectInput.type = "text";
        rejectInput.placeholder = "Rejection reason...";
        actionsDiv.appendChild(rejectInput);

        var approveBtn = document.createElement("button");
        approveBtn.className = "wf-btn-approve";
        approveBtn.textContent = "Approve";
        approveBtn.addEventListener("click", function() {
          if (window.tidepoolWs) {
            window.tidepoolWs.send({
              topic: "workflows",
              action: "approve_version",
              payload: { versionId: pending.versionId },
            });
          }
        });
        actionsDiv.appendChild(approveBtn);

        var rejectBtn = document.createElement("button");
        rejectBtn.className = "wf-btn-reject";
        rejectBtn.textContent = "Reject";
        rejectBtn.addEventListener("click", function() {
          if (window.tidepoolWs) {
            window.tidepoolWs.send({
              topic: "workflows",
              action: "reject_version",
              payload: {
                versionId: pending.versionId,
                reason: rejectInput.value || "Rejected via Tidepool",
              },
            });
          }
        });
        actionsDiv.appendChild(rejectBtn);

        approvalBox.appendChild(actionsDiv);
        panel.appendChild(approvalBox);
      }

      return panel;
    }

    // ── View mode rendering ──────────────────────────────────────

    function renderCurrentView() {
      if (!selectedWorkflowName && !selectedRunId) return;

      if (selectedRunId) {
        renderRunFlowchartView();
        return;
      }

      clearSplitPanes();

      // View toggle tabs
      var tabs = document.createElement("div");
      tabs.className = "wf-view-tabs";
      var flowTab = document.createElement("button");
      flowTab.className = "wf-view-tab" + (currentViewMode === "flowchart" ? " active" : "");
      flowTab.textContent = "Flowchart";
      flowTab.addEventListener("click", function() {
        currentViewMode = "flowchart";
        renderCurrentView();
      });
      var yamlTab = document.createElement("button");
      yamlTab.className = "wf-view-tab" + (currentViewMode === "yaml" ? " active" : "");
      yamlTab.textContent = "YAML";
      yamlTab.addEventListener("click", function() {
        currentViewMode = "yaml";
        renderCurrentView();
      });
      tabs.appendChild(flowTab);
      tabs.appendChild(yamlTab);
      paneTop.appendChild(tabs);

      if (currentViewMode === "flowchart" && currentWorkflowTasks.length > 0) {
        var layout = layoutGraph(currentWorkflowTasks);
        var chart = renderFlowchart(layout, null);
        paneTop.appendChild(chart);
      } else {
        // YAML view with syntax highlighting
        var pendingVersion = null;
        if (currentHealingData && currentHealingData.versions) {
          for (var v = 0; v < currentHealingData.versions.length; v++) {
            if (currentHealingData.versions[v].status === "PROPOSED") {
              pendingVersion = currentHealingData.versions[v];
              break;
            }
          }
        }

        if (pendingVersion && currentWorkflowYaml) {
          var diffView = renderSplitDiff(
            currentWorkflowYaml,
            pendingVersion.diff,
            pendingVersion.versionNumber,
            pendingVersion.authorReasoning
          );
          paneTop.appendChild(diffView);
        } else if (currentWorkflowYaml) {
          var yamlSection = document.createElement("div");
          yamlSection.className = "workflows-yaml-section";
          var yamlHeader = document.createElement("div");
          yamlHeader.className = "workflows-section-header";
          yamlHeader.textContent = "DEFINITION";
          yamlSection.appendChild(yamlHeader);
          var pre = document.createElement("pre");
          pre.className = "workflows-yaml-block";
          pre.innerHTML = highlightYaml(escapeH(currentWorkflowYaml));
          yamlSection.appendChild(pre);
          paneTop.appendChild(yamlSection);
        }
      }

      paneTop.style.flex = "1";
      hsplit.style.display = "none";
      paneBottom.style.display = "none";
    }

    function renderRunFlowchartView() {
      clearSplitPanes();

      if (currentRunTasks.length > 0) {
        var layout = layoutGraph(currentRunTasks);
        var chart = renderFlowchart(layout, currentRunSteps);
        paneTop.appendChild(chart);
      } else {
        // Fallback to old tree view
        renderRunTreeFallback();
      }

      // Healing panel in bottom if healing data present
      if (currentHealingData && currentHealingData.versions && currentHealingData.versions.length > 0) {
        var healPanel = renderHealingPanel(currentHealingData);
        paneBottom.appendChild(healPanel);
        hsplit.style.display = "";
        paneBottom.style.display = "";
        paneTop.style.flex = "0 0 65%";
        paneBottom.style.flex = "1";
        bottomMinimized = false;
        hsplitIconPath.setAttribute("d", "M3 6l5 5 5-5H3z");
      } else {
        hsplit.style.display = "none";
        paneBottom.style.display = "none";
        paneTop.style.flex = "1";
      }
    }

    function renderRunTreeFallback() {
      if (!selectedRunId) return;
      var run = null;
      for (var i = 0; i < activeRuns.length; i++) {
        if (activeRuns[i].runId === selectedRunId) { run = activeRuns[i]; break; }
      }
      if (!run) return;

      var treeSection = document.createElement("div");
      treeSection.className = "workflows-run-tree";
      var header = document.createElement("div");
      header.className = "run-tree-header";
      header.textContent = "EXECUTION TREE";
      treeSection.appendChild(header);
      var nodes = document.createElement("div");
      nodes.className = "run-tree-nodes";
      for (var j = 0; j <= run.currentTaskIndex; j++) {
        var isCurrent = j === run.currentTaskIndex;
        var node = document.createElement("div");
        node.className = "run-tree-node" + (isCurrent ? " run-tree-current" : " run-tree-done");
        if (isCurrent) node.style.borderLeftColor = TAINT_BORDERS[run.taint] || "var(--border)";
        var taskName = isCurrent ? run.currentTaskName : "task-" + j;
        var taskStatus = isCurrent ? (run.paused ? "paused" : "running") : "done";
        var statusColor = isCurrent ? (run.paused ? "var(--yellow)" : "var(--green)") : "var(--fg3)";
        node.innerHTML = '<span class="run-tree-index">' + j + '</span>' +
          '<span class="run-tree-name">' + escapeH(taskName) + '</span>' +
          '<span class="run-tree-status" style="color:' + statusColor + '">' + taskStatus + '</span>';
        nodes.appendChild(node);
      }
      treeSection.appendChild(nodes);
      paneTop.appendChild(treeSection);
    }

    function renderRunTree(run) {
      clearSplitPanes();
      currentRunSteps = {};
      currentRunTasks = [];

      // Request run detail for flowchart
      if (window.tidepoolWs) {
        window.tidepoolWs.send({
          topic: "workflows",
          action: "get_run_detail",
          payload: { runId: run.runId },
        });
      }

      // Show fallback tree while waiting for detail
      renderRunTreeFallback();
      hsplit.style.display = "none";
      paneBottom.style.display = "none";
      paneTop.style.flex = "1";
    }

    // ── Detail: saved workflow ──────────────────────────────────────

    function selectSavedWorkflow(wf) {
      selectedWorkflowName = wf.name;
      selectedRunId = null;
      updateListSelection();
      showDetail();

      detailHeader.className = "workflows-detail-header";
      detailHeader.innerHTML = '<span class="workflows-detail-label">' +
        escapeH(wf.name) +
        "</span>" +
        '<span class="taint-badge ' +
        (wf.classification || "PUBLIC").toLowerCase() +
        '">' +
        escapeH(wf.classification || "PUBLIC") +
        "</span>";

      detailMeta.innerHTML =
        (wf.description
          ? "<div>" + escapeH(wf.description) + "</div>"
          : "") +
        "<div>Classification: " +
        escapeH(wf.classification || "PUBLIC") +
        "</div>" +
        "<div>Saved: " +
        escapeH(fmtTime(wf.savedAt)) +
        "</div>";

      detailActions.innerHTML = "";
      detailActions.appendChild(
        makeActionBtn("Run", "workflows-action-primary", function () {
          startWorkflow(wf.name);
        }),
      );
      detailActions.appendChild(
        makeActionBtn("Delete", "workflows-action-danger", function () {
          deleteWorkflow(wf.name);
        }),
      );

      // Show loading state, then fetch YAML
      clearSplitPanes();
      paneTop.innerHTML =
        '<div class="workflows-yaml-loading">Loading definition...</div>';
      requestWorkflowDetail(wf.name);
      requestRunHistory(wf.name);
    }

    function renderWorkflowYaml(yaml, history, tasks) {
      currentWorkflowYaml = yaml;
      currentWorkflowTasks = tasks || [];
      currentViewMode = (currentWorkflowTasks.length > 0) ? "flowchart" : "yaml";

      clearSplitPanes();
      renderCurrentView();

      // History in bottom pane
      if (history && history.length > 0) {
        var histSection = document.createElement("div");
        histSection.className = "workflows-history-section";

        var histHeader = document.createElement("div");
        histHeader.className = "workflows-section-header";
        histHeader.textContent = "RUN HISTORY";
        histSection.appendChild(histHeader);

        var histList = document.createElement("div");
        histList.className = "workflows-history-list";

        for (var i = 0; i < history.length; i++) {
          histList.appendChild(renderHistoryRow(history[i]));
        }
        histSection.appendChild(histList);
        paneBottom.appendChild(histSection);

        // Show split with default 60/40
        hsplit.style.display = "";
        paneBottom.style.display = "";
        paneTop.style.flex = "0 0 60%";
        paneBottom.style.flex = "1";
        bottomMinimized = false;
        hsplitIconPath.setAttribute("d", "M3 6l5 5 5-5H3z");
      }
    }

    function renderHistoryRow(run) {
      var row = document.createElement("div");
      row.className = "workflows-history-row";

      var statusColors = {
        completed: "var(--green)",
        failed: "var(--red)",
        cancelled: "var(--fg3)",
      };
      var statusColor = statusColors[run.status] || "var(--fg3)";

      row.innerHTML = '<span class="history-status" style="color:' +
        statusColor +
        '">' +
        escapeH(run.status) +
        "</span>" +
        '<span class="history-time">' +
        escapeH(fmtTime(run.startedAt)) +
        "</span>" +
        '<span class="history-duration">' +
        escapeH(fmtDuration(run.startedAt, run.completedAt)) +
        "</span>" +
        '<span class="history-tasks">' +
        run.taskCount +
        " tasks</span>" +
        (run.error
          ? '<span class="history-error">' + escapeH(run.error) + "</span>"
          : "");
      return row;
    }

    // ── Shared detail helpers ───────────────────────────────────────

    function clearSplitPanes() {
      paneTop.innerHTML = "";
      paneBottom.innerHTML = "";
      hsplit.style.display = "none";
      paneBottom.style.display = "none";
      paneTop.style.flex = "1";
      bottomMinimized = false;
    }

    function showDetail() {
      detailPlaceholder.style.display = "none";
      detailContent.style.display = "flex";
    }

    function hideDetail() {
      detailPlaceholder.style.display = "";
      detailContent.style.display = "none";
      selectedRunId = null;
      selectedWorkflowName = null;
      clearSplitPanes();
    }

    function makeActionBtn(label, className, handler) {
      var btn = document.createElement("button");
      btn.className = "workflows-action-btn " + className;
      btn.textContent = label;
      btn.addEventListener("click", handler);
      return btn;
    }

    function updateListSelection() {
      var cards = document.querySelectorAll(
        ".workflows-run-card, .workflows-saved-card",
      );
      for (var i = 0; i < cards.length; i++) {
        var card = cards[i];
        var isSelected = false;
        if (
          selectedRunId &&
          card.getAttribute("data-run-id") === selectedRunId
        ) {
          isSelected = true;
        }
        if (
          selectedWorkflowName &&
          !selectedRunId &&
          card.getAttribute("data-workflow-name") === selectedWorkflowName
        ) {
          isSelected = true;
        }
        card.classList.toggle("selected", isSelected);
      }
    }

    // ── Context menus ───────────────────────────────────────────────

    function showRunContextMenu(e, run) {
      closeBothMenus();
      ctxTargetRunId = run.runId;

      var pauseItem = ctxRun.querySelector('[data-action="pause"]');
      var unpauseItem = ctxRun.querySelector('[data-action="unpause"]');
      pauseItem.style.display = run.paused ? "none" : "";
      unpauseItem.style.display = run.paused ? "" : "none";

      positionMenu(ctxRun, e.clientX, e.clientY);
    }

    function showSavedContextMenu(e, wf) {
      closeBothMenus();
      ctxTargetWfName = wf.name;
      positionMenu(ctxSaved, e.clientX, e.clientY);
    }

    function positionMenu(menu, x, y) {
      menu.style.display = "block";
      menu.style.left = x + "px";
      menu.style.top = y + "px";
      // Clamp to viewport
      var rect = menu.getBoundingClientRect();
      if (rect.right > window.innerWidth) {
        menu.style.left = window.innerWidth - rect.width - 4 + "px";
      }
      if (rect.bottom > window.innerHeight) {
        menu.style.top = window.innerHeight - rect.height - 4 + "px";
      }
    }

    function closeBothMenus() {
      ctxRun.style.display = "none";
      ctxSaved.style.display = "none";
    }

    document.addEventListener("click", closeBothMenus);

    ctxRun.addEventListener("click", function (e) {
      var action = e.target.getAttribute("data-action");
      if (action && ctxTargetRunId) {
        sendControl(ctxTargetRunId, action);
      }
      closeBothMenus();
    });

    ctxSaved.addEventListener("click", function (e) {
      var action = e.target.getAttribute("data-action");
      if (!action || !ctxTargetWfName) {
        closeBothMenus();
        return;
      }
      if (action === "run") {
        startWorkflow(ctxTargetWfName);
      } else if (action === "schedule") {
        openScheduleDialog(ctxTargetWfName);
      } else if (action === "view") {
        for (var i = 0; i < savedWorkflows.length; i++) {
          if (savedWorkflows[i].name === ctxTargetWfName) {
            selectSavedWorkflow(savedWorkflows[i]);
            break;
          }
        }
      } else if (action === "delete") {
        deleteWorkflow(ctxTargetWfName);
      }
      closeBothMenus();
    });

    // ── Schedule dialog ─────────────────────────────────────────────

    var scheduleOverlay = document.getElementById(
      "workflows-schedule-overlay",
    );
    var scheduleWfNameEl = document.getElementById("schedule-wf-name");
    var scheduleCronInput = document.getElementById("schedule-cron-input");
    var scheduleOnceInput = document.getElementById("schedule-once-input");
    var scheduleCronField = document.getElementById("schedule-cron-field");
    var scheduleOnceField = document.getElementById("schedule-once-field");
    var scheduleError = document.getElementById("schedule-error");
    var scheduleCancelBtn = document.getElementById("schedule-cancel-btn");
    var scheduleConfirmBtn = document.getElementById(
      "schedule-confirm-btn",
    );
    var scheduleTargetName = null;

    var scheduleTypeRadios = document.querySelectorAll(
      'input[name="schedule-type"]',
    );
    for (var r = 0; r < scheduleTypeRadios.length; r++) {
      scheduleTypeRadios[r].addEventListener("change", function () {
        var isCron = this.value === "cron";
        scheduleCronField.style.display = isCron ? "" : "none";
        scheduleOnceField.style.display = isCron ? "none" : "";
      });
    }

    function openScheduleDialog(name) {
      scheduleTargetName = name;
      scheduleWfNameEl.textContent = name;
      scheduleCronInput.value = "";
      scheduleOnceInput.value = "";
      scheduleError.style.display = "none";
      scheduleOverlay.style.display = "flex";
    }

    function closeScheduleDialog() {
      scheduleOverlay.style.display = "none";
      scheduleTargetName = null;
    }

    scheduleCancelBtn.addEventListener("click", closeScheduleDialog);
    scheduleOverlay.addEventListener("click", function (e) {
      if (e.target === scheduleOverlay) closeScheduleDialog();
    });

    scheduleConfirmBtn.addEventListener("click", function () {
      if (!scheduleTargetName) return;
      var selectedType = document.querySelector(
        'input[name="schedule-type"]:checked',
      ).value;
      var expression;

      if (selectedType === "cron") {
        expression = scheduleCronInput.value.trim();
        if (!expression) {
          scheduleError.textContent = "Enter a cron expression";
          scheduleError.style.display = "";
          return;
        }
      } else {
        var dt = scheduleOnceInput.value;
        if (!dt) {
          scheduleError.textContent = "Pick a date and time";
          scheduleError.style.display = "";
          return;
        }
        var d = new Date(dt);
        expression = d.getMinutes() + " " + d.getHours() + " " +
          d.getDate() + " " + (d.getMonth() + 1) + " *";
      }

      if (window.tidepoolWs) {
        window.tidepoolWs.send({
          topic: "workflows",
          action: "schedule",
          payload: { name: scheduleTargetName, expression: expression },
        });
      }
      closeScheduleDialog();
    });

    // ── Server communication ────────────────────────────────────────

    function startWorkflow(name) {
      if (window.tidepoolWs) {
        window.tidepoolWs.send({
          topic: "workflows",
          action: "start",
          payload: { name: name },
        });
      }
    }

    function deleteWorkflow(name) {
      if (window.tidepoolWs) {
        window.tidepoolWs.send({
          topic: "workflows",
          action: "delete_workflow",
          payload: { name: name },
        });
      }
    }

    function sendControl(runId, action) {
      if (window.tidepoolWs) {
        window.tidepoolWs.send({
          topic: "workflows",
          action: "control",
          payload: { runId: runId, action: action },
        });
      }
    }

    function requestActiveRuns() {
      if (window.tidepoolWs) {
        window.tidepoolWs.send({
          topic: "workflows",
          action: "list_active",
        });
      }
    }

    function requestWorkflowList() {
      if (window.tidepoolWs) {
        window.tidepoolWs.send({
          topic: "workflows",
          action: "list_workflows",
        });
      }
    }

    function requestWorkflowDetail(name) {
      if (window.tidepoolWs) {
        window.tidepoolWs.send({
          topic: "workflows",
          action: "get_workflow",
          payload: { name: name },
        });
      }
    }

    function requestRunHistory(workflowName) {
      if (window.tidepoolWs) {
        window.tidepoolWs.send({
          topic: "workflows",
          action: "get_history",
          payload: { workflowName: workflowName, limit: 20 },
        });
      }
    }

    // ── WebSocket message handling ──────────────────────────────────

    var pendingHistory = null;

    if (window.tidepoolMux) {
      window.tidepoolMux.on("workflows", function (msg) {
        if (msg.type === "workflow_list") {
          savedWorkflows = msg.workflows || [];
          renderSavedWorkflows();
          updateBadge();
        } else if (msg.type === "active_runs") {
          activeRuns = msg.runs || [];
          renderActiveRuns();
          refreshSelectedRun();
          updateBadge();
        } else if (msg.type === "run_event") {
          handleRunEvent(msg.event);
        } else if (msg.type === "control_result") {
          requestActiveRuns();
        } else if (msg.type === "workflow_detail") {
          if (msg.found && msg.name === selectedWorkflowName) {
            // If we already have history, render together; otherwise wait
            if (pendingHistory !== null) {
              renderWorkflowYaml(msg.yaml, pendingHistory, msg.tasks);
              pendingHistory = null;
            } else {
              // Store detail, wait for history
              pendingHistory = msg;
            }
          }
        } else if (msg.type === "run_history") {
          if (selectedWorkflowName && !selectedRunId) {
            if (pendingHistory && pendingHistory.yaml) {
              // We had detail waiting
              renderWorkflowYaml(pendingHistory.yaml, msg.runs || [], pendingHistory.tasks);
              pendingHistory = null;
            } else {
              pendingHistory = msg.runs || [];
            }
          }
        } else if (msg.type === "run_detail") {
          if (selectedRunId && msg.runId === selectedRunId) {
            currentRunTasks = msg.tasks || [];
            var steps = msg.steps || [];
            currentRunSteps = {};
            for (var s = 0; s < steps.length; s++) {
              currentRunSteps[steps[s].taskIndex] = steps[s];
            }
            renderRunFlowchartView();
          }
        } else if (msg.type === "step_event") {
          handleStepEvent(msg.event);
        } else if (msg.type === "healing_status") {
          currentHealingData = msg;
          if (selectedRunId) {
            renderRunFlowchartView();
          } else if (selectedWorkflowName) {
            renderCurrentView();
          }
        } else if (msg.type === "version_result") {
          if (msg.ok) {
            showToast("Version " + msg.action + "d", "success");
            // Refresh healing status
            if (selectedWorkflowName) {
              showHealingPanel(null);
            }
          } else {
            showToast("Version " + msg.action + " failed", "error");
          }
        } else if (msg.type === "workflow_deleted") {
          if (msg.ok) {
            if (selectedWorkflowName === msg.name) {
              hideDetail();
            }
            requestWorkflowList();
            showToast("Workflow deleted", "success");
          }
        } else if (msg.type === "start_result") {
          if (msg.ok) {
            showToast("Workflow '" + msg.name + "' started", "success");
            requestActiveRuns();
          } else {
            showToast(
              "Start failed: " + (msg.error || "Unknown error"),
              "error",
            );
          }
        } else if (msg.type === "schedule_result") {
          if (msg.ok) {
            showToast(
              "Scheduled '" + msg.name + "' (" + msg.expression + ")",
              "success",
            );
          } else {
            showToast(
              "Schedule failed: " + (msg.error || "Unknown error"),
              "error",
            );
          }
        }
      });
    }

    // ── Toast notifications ────────────────────────────────────────

    var toastEl = null;
    var toastTimer = null;

    function showToast(message, type) {
      if (toastEl) {
        toastEl.remove();
        clearTimeout(toastTimer);
      }
      toastEl = document.createElement("div");
      toastEl.className = "workflows-toast " + type;
      toastEl.textContent = message;
      document.body.appendChild(toastEl);
      // Trigger reflow then show
      void toastEl.offsetWidth;
      toastEl.classList.add("visible");
      toastTimer = setTimeout(function () {
        toastEl.classList.remove("visible");
        setTimeout(function () {
          if (toastEl) toastEl.remove();
          toastEl = null;
        }, 250);
      }, 3000);
    }

    function handleRunEvent(event) {
      if (event.type === "run_started") {
        // Insert directly — don't rely on server round-trip (run may finish first)
        activeRuns.push({
          runId: event.runId,
          workflowName: event.workflowName,
          status: event.status || "running",
          currentTaskIndex: event.currentTaskIndex || 0,
          currentTaskName: event.currentTaskName || "starting",
          startedAt: new Date().toISOString(),
          paused: false,
          taint: event.taint || "PUBLIC",
        });
        renderActiveRuns();
        updateBadge();
      } else if (
        event.type === "run_completed" ||
        event.type === "run_stopped"
      ) {
        // Remove from active list directly
        activeRuns = activeRuns.filter(function (r) {
          return r.runId !== event.runId;
        });
        renderActiveRuns();
        updateBadge();
        // Show result toast
        if (event.status === "completed") {
          showToast("'" + event.workflowName + "' completed", "success");
        } else if (event.status === "failed" || event.error) {
          showToast(
            "'" + event.workflowName + "' failed: " +
              (event.error || "unknown"),
            "error",
          );
        } else {
          showToast("'" + event.workflowName + "' stopped", "success");
        }
        // If we were viewing this run, clear detail
        if (selectedRunId === event.runId) {
          hideDetail();
        }
        // Refresh history if viewing this workflow's definition
        if (selectedWorkflowName === event.workflowName && !selectedRunId) {
          requestWorkflowDetail(event.workflowName);
          requestRunHistory(event.workflowName);
        }
      } else if (
        event.type === "task_progress" ||
        event.type === "run_paused" ||
        event.type === "run_unpaused"
      ) {
        updateActiveRun(event);
      }
    }

    function updateActiveRun(event) {
      for (var i = 0; i < activeRuns.length; i++) {
        if (activeRuns[i].runId === event.runId) {
          activeRuns[i] = Object.assign({}, activeRuns[i], {
            status: event.status,
            currentTaskIndex: event.currentTaskIndex !== undefined
              ? event.currentTaskIndex
              : activeRuns[i].currentTaskIndex,
            currentTaskName: event.currentTaskName ||
              activeRuns[i].currentTaskName,
            paused: event.status === "paused",
            taint: event.taint || activeRuns[i].taint,
          });
          break;
        }
      }
      renderActiveRuns();
      refreshSelectedRun();
    }

    function handleStepEvent(event) {
      if (!event || !selectedRunId) return;
      var runId = event.runId;
      // Only process events for the currently viewed run
      var isViewedRun = (runId === selectedRunId);

      if (event.type === "STEP_STARTED" && isViewedRun) {
        currentRunSteps[event.taskIndex] = {
          taskIndex: event.taskIndex,
          taskName: event.taskName,
          status: "running",
          taintBefore: event.runningTaint,
        };
        renderRunFlowchartView();
      } else if (event.type === "STEP_COMPLETED" && isViewedRun) {
        var prev = currentRunSteps[event.taskIndex] || {};
        currentRunSteps[event.taskIndex] = Object.assign({}, prev, {
          taskIndex: event.taskIndex,
          taskName: event.taskName,
          status: "completed",
          taintAfter: event.taintAfter,
          duration: event.duration,
        });
        renderRunFlowchartView();
      } else if (event.type === "STEP_FAILED" && isViewedRun) {
        var prevF = currentRunSteps[event.taskIndex] || {};
        currentRunSteps[event.taskIndex] = Object.assign({}, prevF, {
          taskIndex: event.taskIndex,
          taskName: event.taskName,
          status: "failed",
          error: event.error,
          attemptNumber: event.attemptNumber,
        });
        renderRunFlowchartView();
      } else if (event.type === "STEP_SKIPPED" && isViewedRun) {
        currentRunSteps[event.taskIndex] = {
          taskIndex: event.taskIndex,
          taskName: event.taskName,
          status: "skipped",
        };
        renderRunFlowchartView();
      } else if (event.type === "BRANCH_TAKEN" && isViewedRun) {
        // Find the switch step and annotate with branch taken
        for (var key in currentRunSteps) {
          if (currentRunSteps[key].taskName === event.switchName) {
            currentRunSteps[key] = Object.assign({}, currentRunSteps[key], {
              branchTaken: event.branch,
            });
          }
        }
        renderRunFlowchartView();
      }
    }

    function refreshSelectedRun() {
      if (!selectedRunId) return;
      for (var i = 0; i < activeRuns.length; i++) {
        if (activeRuns[i].runId === selectedRunId) {
          selectActiveRun(activeRuns[i]);
          return;
        }
      }
      // Run no longer active — clear detail
      hideDetail();
    }

    function updateBadge() {
      if (window.tidepoolBadge) {
        if (activeRuns.length > 0) {
          window.tidepoolBadge.setCount("workflows", activeRuns.length);
          window.tidepoolBadge.setStatus("workflows", "green");
        } else {
          window.tidepoolBadge.setCount("workflows", 0);
          window.tidepoolBadge.setStatus("workflows", "");
        }
      }
    }

    // ── Screen lifecycle ────────────────────────────────────────────

    if (window.tidepoolScreens) {
      window.tidepoolScreens.workflows = {
        onMount: function () {
          pendingHistory = null;
          if (window.tidepoolWs) {
            window.tidepoolWs.send({
              topic: "workflows",
              action: "subscribe_live",
            });
            requestWorkflowList();
            requestActiveRuns();
          }
        },
        onUnmount: function () {
          closeBothMenus();
        },
      };
    }
  })();
</script>
