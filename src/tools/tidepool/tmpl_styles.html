<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  :root {
    --bg: #1a1b26;
    --bg2: #24283b;
    --bg3: #292e42;
    --fg: #c0caf5;
    --fg2: #a9b1d6;
    --fg3: #565f89;
    --accent: #7aa2f7;
    --green: #9ece6a;
    --yellow: #e0af68;
    --red: #f7768e;
    --orange: #ff9e64;
    --border: #3b4261;
    --nav-width: 56px;
  }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family:
      -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
    font-size: 14px;
  }
  body {
    display: flex;
    flex-direction: column;
  }

  /* App shell layout: nav + screens */
  #app {
    display: flex;
    flex-direction: row;
    flex: 1;
    overflow: hidden;
  }

  /* Nav bar */
  #nav-bar {
    width: var(--nav-width);
    min-width: var(--nav-width);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 8px;
    gap: 4px;
    overflow-y: auto;
    z-index: 100;
  }
  .nav-brand {
    color: var(--accent);
    padding: 8px;
    margin-bottom: 8px;
  }
  .nav-items {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    width: 100%;
  }
  .nav-item {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    background: none;
    border: none;
    border-radius: 8px;
    color: var(--fg3);
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
    padding: 0;
  }
  .nav-item:hover {
    background: var(--bg3);
    color: var(--fg2);
  }
  .nav-item.active {
    background: var(--bg3);
    color: var(--accent);
  }
  .nav-item svg {
    width: 20px;
    height: 20px;
  }
  .nav-label {
    font-size: 9px;
    margin-top: 2px;
    line-height: 1;
    letter-spacing: 0.3px;
  }
  .nav-badge {
    position: absolute;
    top: 2px;
    right: 2px;
    min-width: 16px;
    height: 16px;
    background: var(--red);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
  }
  .nav-status-dot {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1px solid var(--bg2);
  }
  .nav-status-dot.green {
    background: var(--green);
  }
  .nav-status-dot.yellow {
    background: var(--yellow);
  }
  .nav-status-dot.red {
    background: var(--red);
  }

  /* Screen containers */
  #screens {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    position: relative;
  }
  .screen {
    position: absolute;
    inset: 0;
    flex-direction: row;
    overflow: hidden;
  }
  .screen-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    height: 100%;
    color: var(--fg3);
    font-size: 16px;
  }
  .screen-placeholder-hint {
    font-size: 13px;
    color: var(--fg3);
    opacity: 0.6;
  }

  /* Chat screen: split layout */
  #screen-chat {
    display: flex;
    flex-direction: row;
  }
  #chat-panel {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 0;
  }
  #canvas-panel {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border);
    background: var(--bg);
    transition: flex 0.2s ease, opacity 0.2s ease;
    overflow: hidden;
  }
  .canvas-hidden #canvas-panel {
    flex: 0;
    opacity: 0;
    pointer-events: none;
    border-left: none;
  }

  /* Status bar */
  #status {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--fg3);
  }
  #status .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  #status .dot.connected {
    background: var(--green);
  }
  #status .dot.connecting {
    background: var(--yellow);
  }
  #status .dot.disconnected {
    background: var(--red);
  }
  #status .provider {
    color: var(--fg2);
  }
  .mcp-status {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .mcp-status.green {
    background: var(--green);
    color: #1a1b26;
  }
  .mcp-status.yellow {
    background: var(--yellow);
    color: #1a1b26;
  }
  .mcp-status.red {
    background: var(--red);
    color: #1a1b26;
  }
  .taint-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: auto;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .taint-badge.public {
    background: var(--green);
    color: #1a1b26;
  }
  .taint-badge.internal {
    background: var(--yellow);
    color: #1a1b26;
  }
  .taint-badge.confidential {
    background: var(--orange);
    color: #1a1b26;
  }
  .taint-badge.restricted {
    background: var(--red);
    color: #1a1b26;
  }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 8px;
    line-height: 1.5;
    word-wrap: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--accent);
    color: #1a1b26;
    border: 2px solid transparent;
  }
  .msg.user.taint-public {
    border-color: var(--green);
  }
  .msg.user.taint-internal {
    border-color: var(--yellow);
  }
  .msg.user.taint-confidential {
    border-color: var(--orange);
  }
  .msg.user.taint-restricted {
    border-color: var(--red);
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--bg2);
    border: 2px solid var(--border);
  }
  .msg.assistant.taint-public {
    border-color: var(--green);
  }
  .msg.assistant.taint-internal {
    border-color: var(--yellow);
  }
  .msg.assistant.taint-confidential {
    border-color: var(--orange);
  }
  .msg.assistant.taint-restricted {
    border-color: var(--red);
  }
  .msg.assistant.thinking {
    color: var(--fg3);
    min-height: 20px;
  }
  .msg.assistant.thinking .thinking-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
  }
  .msg.assistant.thinking .thinking-spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--fg3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  .msg.error {
    align-self: flex-start;
    background: #2d1b2e;
    border: 1px solid var(--red);
    color: var(--red);
  }
  .msg pre {
    background: var(--bg);
    padding: 8px;
    border-radius: 4px;
    overflow-x: auto;
    margin: 6px 0;
    font-size: 13px;
  }
  .msg code {
    background: var(--bg);
    padding: 2px 4px;
    border-radius: 3px;
    font-size: 13px;
  }
  .msg pre code {
    background: none;
    padding: 0;
  }
  .msg strong {
    font-weight: 600;
  }

  /* Tool calls */
  .tool {
    font-size: 12px;
    color: var(--fg3);
    padding: 4px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tool .spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid var(--fg3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  .tool.done .spinner {
    display: none;
  }
  .tool.done::before {
    content: "\2713";
    color: var(--green);
  }
  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  /* Web tool calls (styled) */
  .tool-web {
    padding: 6px 14px;
    font-size: 13px;
    color: var(--fg2);
  }
  .tool-web .tool-icon {
    color: var(--accent);
    font-size: 14px;
    margin-right: 4px;
  }
  .tool-web .tool-name {
    font-weight: 600;
    color: var(--fg);
  }
  .tool-web .tool-arg {
    color: var(--fg3);
    font-size: 12px;
  }
  .tool-web .tool-meta {
    color: var(--fg3);
    font-size: 12px;
    padding-left: 22px;
    margin-top: 2px;
  }
  .tool-web .tool-meta .spinner {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 2px solid var(--fg3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 4px;
  }
  .tool-web.done .tool-meta .spinner {
    display: none;
  }
  .tool-web.done .tool-meta::before {
    content: "\2713 ";
    color: var(--green);
  }

  /* Todo list */
  .todo-list {
    padding: 10px 14px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-width: 85%;
    font-size: 13px;
    line-height: 1.8;
  }
  .todo-list .todo-header {
    font-size: 13px;
    color: var(--fg2);
    margin-bottom: 4px;
  }
  .todo-list .todo-empty {
    color: var(--fg3);
  }
  .todo-list .todo-item {
    padding: 1px 0;
  }
  .todo-list .todo-done {
    color: var(--fg3);
  }
  .todo-list .todo-done .todo-check {
    color: var(--green);
  }
  .todo-list .todo-done s {
    text-decoration: line-through;
  }
  .todo-list .todo-active {
    color: var(--yellow);
    font-weight: 600;
  }
  .todo-list .todo-active .todo-arrow {
    color: var(--yellow);
  }
  .todo-list .todo-pending {
    color: var(--fg2);
  }
  .todo-list .todo-pending .todo-circle {
    color: var(--fg3);
  }

  /* Render labels in chat timeline */
  .render-label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--fg2);
  }
  .render-label .render-icon {
    color: var(--accent);
  }
  .render-label .render-text {
    font-weight: 600;
    color: var(--fg);
  }
  .render-label .render-view {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    cursor: pointer;
    color: var(--accent);
    font-size: 12px;
  }
  .render-label .render-view:hover {
    background: var(--border);
  }

  /* Input */
  #input-bar {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    background: var(--bg2);
    border-top: 2px solid var(--green);
    transition: border-color 0.3s ease;
  }
  #input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--fg);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    resize: none;
  }
  #input:focus {
    border-color: var(--accent);
  }
  #send {
    background: var(--accent);
    color: #1a1b26;
    border: none;
    border-radius: 6px;
    padding: 10px 20px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  #send:hover {
    opacity: 0.9;
  }
  #send:disabled {
    opacity: 0.4;
    cursor: default;
  }

  /* Image paste indicator */
  #paste-indicator {
    display: none;
    padding: 4px 16px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--fg3);
    align-items: center;
    gap: 6px;
  }
  #paste-indicator.visible {
    display: flex;
  }
  #paste-indicator .paste-icon {
    color: var(--accent);
  }
  #paste-indicator .paste-dismiss {
    cursor: pointer;
    color: var(--fg3);
    margin-left: auto;
  }
  #paste-indicator .paste-dismiss:hover {
    color: var(--red);
  }

  /* Canvas panel */
  #canvas-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--fg3);
  }
  #canvas-header .canvas-title {
    color: var(--fg2);
  }
  #canvas-collapse {
    background: none;
    border: none;
    color: var(--fg3);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
  }
  #canvas-collapse:hover {
    color: var(--fg);
  }
  #canvas-frame {
    flex: 1;
    border: none;
    width: 100%;
    background: var(--bg);
  }
  #canvas-history {
    display: flex;
    gap: 6px;
    padding: 12px 16px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    overflow-x: auto;
    align-items: center;
    min-height: 58px;
  }
  #canvas-history:empty {
    display: none;
  }
  .history-pill {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--fg3);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .history-pill:hover {
    border-color: var(--accent);
    color: var(--fg2);
  }
  .history-pill.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--bg2);
  }

  /* TidepoolChat component instances */
  .tidepool-chat-instance {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .chat-input-bar {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    background: var(--bg2);
    border-top: 2px solid var(--green);
    transition: border-color 0.3s ease;
  }
  .chat-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--fg);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    resize: none;
  }
  .chat-input:focus {
    border-color: var(--accent);
  }
  .chat-send-btn {
    background: var(--accent);
    color: #1a1b26;
    border: none;
    border-radius: 6px;
    padding: 10px 20px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .chat-send-btn:hover {
    opacity: 0.9;
  }
  .chat-send-btn:disabled {
    opacity: 0.4;
    cursor: default;
  }

  /* Status dot component */
  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    vertical-align: middle;
  }
  .status-dot.green {
    background: var(--green);
  }
  .status-dot.yellow {
    background: var(--yellow);
  }
  .status-dot.red {
    background: var(--red);
  }
  .status-dot.gray {
    background: var(--fg3);
  }

  /* Logs screen */
  .screen-logs-container {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
  }
  .logs-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logs-level-filters {
    display: flex;
    gap: 4px;
  }
  .log-level-btn {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: none;
    color: var(--fg3);
    cursor: pointer;
  }
  .log-level-btn.active {
    background: var(--bg3);
    color: var(--fg);
    border-color: var(--accent);
  }
  .logs-source-filter {
    font-size: 12px;
    padding: 4px 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--fg);
  }
  .logs-search {
    flex: 1;
    font-size: 12px;
    padding: 4px 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--fg);
    outline: none;
    min-width: 100px;
  }
  .logs-pause-btn, .logs-clear-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--fg3);
    cursor: pointer;
    padding: 4px 8px;
    font-size: 14px;
    position: relative;
  }
  .logs-pause-btn:hover, .logs-clear-btn:hover {
    color: var(--fg);
    border-color: var(--accent);
  }
  .logs-buffered-badge {
    position: absolute;
    top: -6px;
    right: -6px;
    min-width: 16px;
    height: 16px;
    background: var(--accent);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
  }
  .logs-output {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
    line-height: 1.6;
  }
  .log-line {
    white-space: pre-wrap;
    word-break: break-all;
  }
  .log-ts {
    color: var(--fg3);
    margin-right: 8px;
  }
  .log-level {
    font-weight: 600;
    margin-right: 6px;
    min-width: 40px;
    display: inline-block;
  }
  .log-level-debug {
    color: var(--fg3);
  }
  .log-level-info {
    color: var(--fg);
  }
  .log-level-warn {
    color: var(--yellow);
  }
  .log-level-error {
    color: var(--red);
  }
  .log-source {
    color: var(--accent);
    margin-right: 6px;
  }

  /* Memory screen */
  .screen-memory-container {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    position: relative;
  }
  .memory-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .memory-search {
    flex: 1;
    font-size: 13px;
    padding: 6px 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--fg);
    outline: none;
  }
  .memory-classification-filter, .memory-tag-filter {
    font-size: 12px;
    padding: 6px 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--fg);
  }
  .memory-search-btn {
    background: var(--accent);
    color: #1a1b26;
    border: none;
    border-radius: 6px;
    padding: 6px 16px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
  }
  .memory-visibility-note {
    padding: 6px 16px;
    font-size: 12px;
    color: var(--yellow);
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .memory-results {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .memory-result-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .memory-result-card:hover {
    border-color: var(--accent);
  }
  .memory-result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .memory-result-date {
    font-size: 11px;
    color: var(--fg3);
  }
  .memory-result-content {
    font-size: 13px;
    color: var(--fg2);
    line-height: 1.5;
  }
  .memory-result-tags {
    margin-top: 6px;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .memory-tag {
