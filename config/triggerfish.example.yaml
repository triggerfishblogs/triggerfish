# Triggerfish Example Configuration
# Copy to ~/.triggerfish/triggerfish.yaml and edit.
#
# SECRETS: API keys and tokens must NOT be stored as plaintext in this file.
# Use the `secret:<key>` reference syntax to pull values from the OS keychain:
#
#   apiKey: "secret:provider:anthropic:apiKey"
#
# Store secrets with:
#   triggerfish config set-secret provider:anthropic:apiKey sk-ant-...
#
# Migrate existing plaintext secrets automatically:
#   triggerfish config migrate-secrets

models:
  primary:
    provider: anthropic
    model: claude-sonnet-4-5-20250929
  # vision: glm-4.5v  # Optional: separate vision model for image description
  #
  # Per-classification model overrides (optional).
  # Route specific classification levels to different providers/models.
  # Unlisted levels fall back to the primary model above.
  # Each referenced provider must be configured in the providers block.
  #
  # classification_models:
  #   CONFIDENTIAL:
  #     provider: ollama
  #     model: llama3
  #   RESTRICTED:
  #     provider: ollama
  #     model: llama3
  providers:
    anthropic:
      model: claude-sonnet-4-5-20250929
      # API key stored in OS keychain — never commit plaintext here
      apiKey: "secret:provider:anthropic:apiKey"
    # openai:
    #   model: gpt-4o
    #   apiKey: "secret:provider:openai:apiKey"
    # google:
    #   model: gemini-2.0-flash
    #   apiKey: "secret:provider:google:apiKey"
    # openrouter:
    #   model: anthropic/claude-sonnet-4-5
    #   apiKey: "secret:provider:openrouter:apiKey"
    # ollama:
    #   model: llama3
    #   endpoint: http://localhost:11434
    # lmstudio:
    #   model: lmstudio-community/Meta-Llama-3.1-8B-Instruct-GGUF
    #   endpoint: http://localhost:1234
    # fireworks:
    #   model: accounts/fireworks/models/llama-v3p1-70b-instruct
    #   apiKey: "secret:provider:fireworks:apiKey"

channels:
  cli:
    enabled: true
    classification: INTERNAL
