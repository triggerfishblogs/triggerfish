# Triggerfish Example Configuration
# Copy to ~/.triggerfish/triggerfish.yaml and edit.

models:
  primary: claude-sonnet-4-5-20250929
  # vision: glm-4.5v  # Optional: separate vision model for image description
  providers:
    anthropic:
      model: claude-sonnet-4-5-20250929
    # zai:
    #   model: glm-4.7

channels:
  cli:
    enabled: true
    classification: INTERNAL

logging:
  # quiet = errors only, normal = info (default), verbose = debug, debug = trace (everything)
  level: normal

policy:
  default_action: ALLOW
