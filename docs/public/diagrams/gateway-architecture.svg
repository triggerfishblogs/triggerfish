<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600" font-family="system-ui, sans-serif">
  <defs>
    <marker id="ga" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="600" fill="#ffffff"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e40af">Gateway Architecture — Hub and Spoke</text>

  <!-- Left column: Channels -->
  <text x="110" y="72" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">Channels</text>

  <!-- Channel boxes -->
  <rect x="30" y="86" width="160" height="36" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="110" y="109" text-anchor="middle" font-size="13" font-weight="500" fill="#1e40af">WhatsApp</text>

  <rect x="30" y="130" width="160" height="36" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="110" y="153" text-anchor="middle" font-size="13" font-weight="500" fill="#1e40af">Telegram</text>

  <rect x="30" y="174" width="160" height="36" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="110" y="197" text-anchor="middle" font-size="13" font-weight="500" fill="#1e40af">Slack</text>

  <rect x="30" y="218" width="160" height="36" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="110" y="241" text-anchor="middle" font-size="13" font-weight="500" fill="#1e40af">Discord</text>

  <rect x="30" y="262" width="160" height="36" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="110" y="285" text-anchor="middle" font-size="13" font-weight="500" fill="#1e40af">Signal</text>

  <rect x="30" y="306" width="160" height="36" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="110" y="329" text-anchor="middle" font-size="13" font-weight="500" fill="#1e40af">WebChat</text>

  <rect x="30" y="350" width="160" height="36" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="110" y="373" text-anchor="middle" font-size="13" font-weight="500" fill="#1e40af">Email</text>

  <rect x="30" y="394" width="160" height="36" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="110" y="417" text-anchor="middle" font-size="13" font-weight="500" fill="#1e40af">CLI</text>

  <!-- Arrows from channels to gateway -->
  <line x1="190" y1="104" x2="340" y2="230" stroke="#374151" stroke-width="1.2" marker-end="url(#ga)"/>
  <line x1="190" y1="148" x2="340" y2="240" stroke="#374151" stroke-width="1.2" marker-end="url(#ga)"/>
  <line x1="190" y1="192" x2="340" y2="250" stroke="#374151" stroke-width="1.2" marker-end="url(#ga)"/>
  <line x1="190" y1="236" x2="340" y2="260" stroke="#374151" stroke-width="1.2" marker-end="url(#ga)"/>
  <line x1="190" y1="280" x2="340" y2="275" stroke="#374151" stroke-width="1.2" marker-end="url(#ga)"/>
  <line x1="190" y1="324" x2="340" y2="290" stroke="#374151" stroke-width="1.2" marker-end="url(#ga)"/>
  <line x1="190" y1="368" x2="340" y2="305" stroke="#374151" stroke-width="1.2" marker-end="url(#ga)"/>
  <line x1="190" y1="412" x2="340" y2="320" stroke="#374151" stroke-width="1.2" marker-end="url(#ga)"/>

  <!-- Center: Gateway box -->
  <rect x="345" y="80" width="310" height="380" rx="12" fill="#2563eb" stroke="#1e40af" stroke-width="2"/>

  <!-- Gateway header -->
  <rect x="345" y="80" width="310" height="44" rx="12" fill="#1e40af"/>
  <rect x="345" y="104" width="310" height="20" fill="#1e40af"/>
  <text x="500" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Gateway</text>

  <!-- Gateway sub-components -->
  <rect x="370" y="140" width="260" height="50" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
  <text x="500" y="162" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">Session Manager</text>
  <text x="500" y="180" text-anchor="middle" font-size="11" fill="#6b7280">Create, track, taint, isolate</text>

  <rect x="370" y="200" width="260" height="50" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
  <text x="500" y="222" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">Policy Engine</text>
  <text x="500" y="240" text-anchor="middle" font-size="11" fill="#6b7280">Hooks, classification, enforcement</text>

  <rect x="370" y="260" width="260" height="50" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
  <text x="500" y="282" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">Notification Service</text>
  <text x="500" y="300" text-anchor="middle" font-size="11" fill="#6b7280">Cross-channel delivery</text>

  <rect x="370" y="320" width="260" height="50" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
  <text x="500" y="342" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">Channel Router</text>
  <text x="500" y="360" text-anchor="middle" font-size="11" fill="#6b7280">Message routing + retry</text>

  <rect x="370" y="380" width="260" height="50" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
  <text x="500" y="402" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">Audit Logger</text>
  <text x="500" y="420" text-anchor="middle" font-size="11" fill="#6b7280">All decisions logged</text>

  <!-- Right column: Services -->
  <text x="820" y="72" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">Services</text>

  <rect x="710" y="110" width="200" height="56" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="810" y="134" text-anchor="middle" font-size="13" font-weight="500" fill="#374151">Agent Loop</text>
  <text x="810" y="152" text-anchor="middle" font-size="11" fill="#6b7280">LLM orchestration</text>

  <rect x="710" y="180" width="200" height="56" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="810" y="204" text-anchor="middle" font-size="13" font-weight="500" fill="#374151">MCP Servers</text>
  <text x="810" y="222" text-anchor="middle" font-size="11" fill="#6b7280">Tool providers</text>

  <rect x="710" y="250" width="200" height="56" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="810" y="274" text-anchor="middle" font-size="13" font-weight="500" fill="#374151">StorageProvider</text>
  <text x="810" y="292" text-anchor="middle" font-size="11" fill="#6b7280">Persistent state</text>

  <rect x="710" y="320" width="200" height="56" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="810" y="344" text-anchor="middle" font-size="13" font-weight="500" fill="#374151">Memory Store</text>
  <text x="810" y="362" text-anchor="middle" font-size="11" fill="#6b7280">FTS5 cross-session</text>

  <rect x="710" y="390" width="200" height="56" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="810" y="414" text-anchor="middle" font-size="13" font-weight="500" fill="#374151">Scheduler</text>
  <text x="810" y="432" text-anchor="middle" font-size="11" fill="#6b7280">Cron, triggers, webhooks</text>

  <!-- Arrows from gateway to services -->
  <line x1="655" y1="165" x2="704" y2="140" stroke="#374151" stroke-width="1.2" marker-end="url(#ga)"/>
  <line x1="655" y1="225" x2="704" y2="210" stroke="#374151" stroke-width="1.2" marker-end="url(#ga)"/>
  <line x1="655" y1="285" x2="704" y2="280" stroke="#374151" stroke-width="1.2" marker-end="url(#ga)"/>
  <line x1="655" y1="345" x2="704" y2="350" stroke="#374151" stroke-width="1.2" marker-end="url(#ga)"/>
  <line x1="655" y1="405" x2="704" y2="420" stroke="#374151" stroke-width="1.2" marker-end="url(#ga)"/>

  <!-- Bottom annotation -->
  <rect x="200" y="490" width="600" height="90" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="500" y="516" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">All traffic flows through the Gateway</text>
  <text x="500" y="536" text-anchor="middle" font-size="12" fill="#6b7280">No channel communicates directly with services.</text>
  <text x="500" y="554" text-anchor="middle" font-size="12" fill="#6b7280">Policy enforcement is applied to every message at the gateway level.</text>
  <text x="500" y="572" text-anchor="middle" font-size="12" fill="#6b7280">WebSocket control plane manages real-time session state.</text>
</svg>