<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 860 360"
  width="860"
  height="360"
  font-family="system-ui, sans-serif"
>
  <defs>
    <marker
      id="arr-r"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151" />
    </marker>
    <marker
      id="arr-red"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="360" fill="#ffffff" />

  <!-- Title -->
  <text
    x="430"
    y="36"
    text-anchor="middle"
    font-size="18"
    font-weight="700"
    fill="#1e40af"
  >Taint Escalation — Classification Levels</text>

  <!-- Baseline -->
  <line
    x1="80"
    y1="280"
    x2="780"
    y2="280"
    stroke="#d1d5db"
    stroke-width="1.5"
  />

  <!-- PUBLIC bar -->
  <rect
    x="100"
    y="220"
    width="140"
    height="60"
    rx="8"
    fill="#16a34a"
    stroke="#15803d"
    stroke-width="1.5"
  />
  <text
    x="170"
    y="248"
    text-anchor="middle"
    font-size="15"
    font-weight="600"
    fill="#ffffff"
  >PUBLIC</text>
  <text x="170" y="266" text-anchor="middle" font-size="11" fill="#dcfce7"
  >Level 0</text>

  <!-- INTERNAL bar -->
  <rect
    x="270"
    y="175"
    width="140"
    height="105"
    rx="8"
    fill="#2563eb"
    stroke="#1e40af"
    stroke-width="1.5"
  />
  <text
    x="340"
    y="220"
    text-anchor="middle"
    font-size="15"
    font-weight="600"
    fill="#ffffff"
  >INTERNAL</text>
  <text x="340" y="238" text-anchor="middle" font-size="11" fill="#bfdbfe"
  >Level 1</text>

  <!-- CONFIDENTIAL bar -->
  <rect
    x="440"
    y="130"
    width="140"
    height="150"
    rx="8"
    fill="#d97706"
    stroke="#b45309"
    stroke-width="1.5"
  />
  <text
    x="510"
    y="190"
    text-anchor="middle"
    font-size="15"
    font-weight="600"
    fill="#ffffff"
  >CONFIDENTIAL</text>
  <text x="510" y="208" text-anchor="middle" font-size="11" fill="#fef3c7"
  >Level 2</text>

  <!-- RESTRICTED bar -->
  <rect
    x="610"
    y="85"
    width="140"
    height="195"
    rx="8"
    fill="#dc2626"
    stroke="#b91c1c"
    stroke-width="1.5"
  />
  <text
    x="680"
    y="170"
    text-anchor="middle"
    font-size="15"
    font-weight="600"
    fill="#ffffff"
  >RESTRICTED</text>
  <text x="680" y="188" text-anchor="middle" font-size="11" fill="#fecaca"
  >Level 3</text>

  <!-- Forward escalation arrow -->
  <line
    x1="120"
    y1="310"
    x2="740"
    y2="310"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#arr-r)"
  />
  <text
    x="430"
    y="332"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#374151"
  >Taint can only escalate</text>

  <!-- Blocked reverse arrow -->
  <line
    x1="620"
    y1="68"
    x2="200"
    y2="68"
    stroke="#dc2626"
    stroke-width="2"
    stroke-dasharray="6,3"
    marker-end="url(#arr-red)"
  />
  <!-- X mark -->
  <line x1="395" y1="54" x2="415" y2="78" stroke="#dc2626" stroke-width="3" />
  <line x1="415" y1="54" x2="395" y2="78" stroke="#dc2626" stroke-width="3" />
  <text
    x="430"
    y="52"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#dc2626"
  >Never decreases</text>

  <!-- Small escalation arrows between bars -->
  <line
    x1="244"
    y1="250"
    x2="264"
    y2="240"
    stroke="#374151"
    stroke-width="1.5"
    marker-end="url(#arr-r)"
  />
  <line
    x1="414"
    y1="220"
    x2="434"
    y2="210"
    stroke="#374151"
    stroke-width="1.5"
    marker-end="url(#arr-r)"
  />
  <line
    x1="584"
    y1="190"
    x2="604"
    y2="175"
    stroke="#374151"
    stroke-width="1.5"
    marker-end="url(#arr-r)"
  />
</svg>
