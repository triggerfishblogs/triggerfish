<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 800 420"
  width="800"
  height="420"
  font-family="system-ui, sans-serif"
>
  <defs>
    <marker
      id="hv-arrow"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151" />
    </marker>
    <marker
      id="hv-green"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
    <marker
      id="hv-red"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#ffffff" />

  <!-- Title -->
  <text
    x="400"
    y="36"
    text-anchor="middle"
    font-size="18"
    font-weight="700"
    fill="#1e40af"
  >HMAC Signature Verification</text>

  <!-- Inbound Request -->
  <rect
    x="300"
    y="60"
    width="200"
    height="50"
    rx="8"
    fill="#f3f4f6"
    stroke="#9ca3af"
    stroke-width="2"
  />
  <text
    x="400"
    y="90"
    text-anchor="middle"
    font-size="14"
    font-weight="700"
    fill="#374151"
  >Inbound Request</text>

  <!-- Arrow down to first diamond -->
  <line
    x1="400"
    y1="110"
    x2="400"
    y2="138"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#hv-arrow)"
  />

  <!-- Diamond 1: Signature Present? -->
  <polygon
    points="400,150 480,190 400,230 320,190"
    fill="#dbeafe"
    stroke="#1e40af"
    stroke-width="2"
  />
  <text
    x="400"
    y="187"
    text-anchor="middle"
    font-size="12"
    font-weight="600"
    fill="#1e40af"
  >Signature</text>
  <text
    x="400"
    y="201"
    text-anchor="middle"
    font-size="12"
    font-weight="600"
    fill="#1e40af"
  >present?</text>

  <!-- No path → Reject 401 -->
  <line
    x1="320"
    y1="190"
    x2="188"
    y2="190"
    stroke="#dc2626"
    stroke-width="2"
    marker-end="url(#hv-red)"
  />
  <text x="260" y="182" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626"
  >No</text>

  <rect
    x="80"
    y="170"
    width="100"
    height="40"
    rx="8"
    fill="#fef2f2"
    stroke="#dc2626"
    stroke-width="2"
  />
  <text
    x="130"
    y="195"
    text-anchor="middle"
    font-size="13"
    font-weight="700"
    fill="#dc2626"
  >Reject 401</text>

  <!-- Yes path down to compute -->
  <line
    x1="400"
    y1="230"
    x2="400"
    y2="258"
    stroke="#16a34a"
    stroke-width="2"
    marker-end="url(#hv-green)"
  />
  <text x="420" y="248" font-size="12" font-weight="700" fill="#16a34a"
  >Yes</text>

  <!-- Compute HMAC box -->
  <rect
    x="270"
    y="270"
    width="260"
    height="40"
    rx="8"
    fill="#dbeafe"
    stroke="#1e40af"
    stroke-width="2"
  />
  <text
    x="400"
    y="295"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#1e40af"
  >Compute HMAC(body, secret)</text>

  <!-- Arrow down to second diamond -->
  <line
    x1="400"
    y1="310"
    x2="400"
    y2="328"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#hv-arrow)"
  />

  <!-- Diamond 2: Signature Matches? -->
  <polygon
    points="400,340 480,375 400,410 320,375"
    fill="#dbeafe"
    stroke="#1e40af"
    stroke-width="2"
  />
  <text
    x="400"
    y="372"
    text-anchor="middle"
    font-size="12"
    font-weight="600"
    fill="#1e40af"
  >Signature</text>
  <text
    x="400"
    y="386"
    text-anchor="middle"
    font-size="12"
    font-weight="600"
    fill="#1e40af"
  >matches?</text>

  <!-- No path → Reject 403 -->
  <line
    x1="320"
    y1="375"
    x2="188"
    y2="375"
    stroke="#dc2626"
    stroke-width="2"
    marker-end="url(#hv-red)"
  />
  <text x="260" y="367" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626"
  >No</text>

  <rect
    x="80"
    y="355"
    width="100"
    height="40"
    rx="8"
    fill="#fef2f2"
    stroke="#dc2626"
    stroke-width="2"
  />
  <text
    x="130"
    y="380"
    text-anchor="middle"
    font-size="13"
    font-weight="700"
    fill="#dc2626"
  >Reject 403</text>

  <!-- Yes path → Proceed -->
  <line
    x1="480"
    y1="375"
    x2="578"
    y2="375"
    stroke="#16a34a"
    stroke-width="2"
    marker-end="url(#hv-green)"
  />
  <text x="530" y="367" font-size="12" font-weight="700" fill="#16a34a"
  >Yes</text>

  <rect
    x="590"
    y="355"
    width="120"
    height="40"
    rx="8"
    fill="#dcfce7"
    stroke="#16a34a"
    stroke-width="2"
  />
  <text
    x="650"
    y="380"
    text-anchor="middle"
    font-size="14"
    font-weight="700"
    fill="#166534"
  >Proceed</text>
</svg>
