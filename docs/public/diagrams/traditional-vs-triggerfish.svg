<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 860 440"
  width="860"
  height="440"
  font-family="system-ui, sans-serif"
>
  <!-- Background -->
  <rect width="860" height="440" fill="#ffffff" />

  <defs>
    <marker
      id="tvt-arrow"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151" />
    </marker>
    <marker
      id="tvt-blue"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e40af" />
    </marker>
  </defs>

  <!-- Title -->
  <text
    x="430"
    y="36"
    text-anchor="middle"
    font-size="18"
    font-weight="700"
    fill="#1e40af"
  >Traditional vs. Triggerfish Security Model</text>

  <!-- Divider -->
  <line
    x1="430"
    y1="60"
    x2="430"
    y2="420"
    stroke="#d1d5db"
    stroke-width="1"
    stroke-dasharray="6,4"
  />

  <!-- LEFT: Traditional -->
  <text
    x="215"
    y="76"
    text-anchor="middle"
    font-size="15"
    font-weight="700"
    fill="#374151"
  >Traditional</text>

  <!-- LLM box (traditional) -->
  <rect
    x="115"
    y="100"
    width="200"
    height="70"
    rx="8"
    fill="#fef2f2"
    stroke="#dc2626"
    stroke-width="2"
  />
  <text
    x="215"
    y="130"
    text-anchor="middle"
    font-size="16"
    font-weight="700"
    fill="#dc2626"
  >LLM</text>
  <text x="215" y="150" text-anchor="middle" font-size="12" fill="#dc2626"
  >Makes security decisions</text>

  <!-- Arrow LLM → Execution (traditional) -->
  <line
    x1="215"
    y1="170"
    x2="215"
    y2="238"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#tvt-arrow)"
  />
  <text x="215" y="210" text-anchor="middle" font-size="11" fill="#6b7280"
  >Direct control</text>

  <!-- Execution box (traditional) -->
  <rect
    x="115"
    y="250"
    width="200"
    height="60"
    rx="8"
    fill="#f3f4f6"
    stroke="#9ca3af"
    stroke-width="2"
  />
  <text
    x="215"
    y="285"
    text-anchor="middle"
    font-size="15"
    font-weight="600"
    fill="#374151"
  >Execution</text>

  <!-- Warning annotation (traditional) -->
  <rect
    x="75"
    y="340"
    width="280"
    height="60"
    rx="8"
    fill="#fef2f2"
    stroke="#fca5a5"
    stroke-width="1"
  />
  <text
    x="215"
    y="364"
    text-anchor="middle"
    font-size="12"
    font-weight="600"
    fill="#dc2626"
  >LLM can be prompt-injected</text>
  <text x="215" y="384" text-anchor="middle" font-size="11" fill="#991b1b"
  >Security depends on LLM judgment</text>

  <!-- RIGHT: Triggerfish -->
  <text
    x="645"
    y="76"
    text-anchor="middle"
    font-size="15"
    font-weight="700"
    fill="#1e40af"
  >Triggerfish</text>

  <!-- LLM box (Triggerfish) -->
  <rect
    x="545"
    y="100"
    width="200"
    height="70"
    rx="8"
    fill="#f3f4f6"
    stroke="#9ca3af"
    stroke-width="2"
  />
  <text
    x="645"
    y="130"
    text-anchor="middle"
    font-size="16"
    font-weight="700"
    fill="#374151"
  >LLM</text>
  <text x="645" y="150" text-anchor="middle" font-size="12" fill="#6b7280"
  >Makes requests only</text>

  <!-- Arrow LLM → Policy (Triggerfish) -->
  <line
    x1="645"
    y1="170"
    x2="645"
    y2="208"
    stroke="#1e40af"
    stroke-width="2"
    marker-end="url(#tvt-blue)"
  />

  <!-- Policy Layer box (Triggerfish) -->
  <rect
    x="520"
    y="220"
    width="250"
    height="60"
    rx="8"
    fill="#dbeafe"
    stroke="#1e40af"
    stroke-width="2"
  />
  <text
    x="645"
    y="246"
    text-anchor="middle"
    font-size="15"
    font-weight="700"
    fill="#1e40af"
  >Policy Layer</text>
  <text x="645" y="266" text-anchor="middle" font-size="12" fill="#1e40af"
  >Deterministic enforcement</text>

  <!-- Arrow Policy → Execution (Triggerfish) -->
  <line
    x1="645"
    y1="280"
    x2="645"
    y2="318"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#tvt-arrow)"
  />

  <!-- Execution box (Triggerfish) -->
  <rect
    x="545"
    y="330"
    width="200"
    height="60"
    rx="8"
    fill="#dcfce7"
    stroke="#16a34a"
    stroke-width="2"
  />
  <text
    x="645"
    y="365"
    text-anchor="middle"
    font-size="15"
    font-weight="600"
    fill="#166534"
  >Execution</text>

  <!-- Triggerfish annotation -->
  <rect
    x="490"
    y="340"
    width="310"
    height="60"
    rx="8"
    fill="#dcfce7"
    stroke="#16a34a"
    stroke-width="1"
  />
  <text
    x="645"
    y="364"
    text-anchor="middle"
    font-size="12"
    font-weight="600"
    fill="#166534"
  >LLM cannot bypass policy layer</text>
  <text x="645" y="384" text-anchor="middle" font-size="11" fill="#166534"
  >Security is deterministic, not probabilistic</text>
</svg>
