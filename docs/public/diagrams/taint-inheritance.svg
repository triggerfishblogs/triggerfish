<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 860 400"
  width="860"
  height="400"
  font-family="system-ui, sans-serif"
>
  <defs>
    <marker
      id="ti-arrow"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="400" fill="#ffffff" />

  <!-- Title -->
  <text
    x="430"
    y="36"
    text-anchor="middle"
    font-size="18"
    font-weight="700"
    fill="#1e40af"
  >Taint Inheritance in Delegation Chains</text>

  <!-- Agent A -->
  <rect
    x="40"
    y="80"
    width="220"
    height="120"
    rx="8"
    fill="#fef3c7"
    stroke="#d97706"
    stroke-width="2"
  />
  <text
    x="150"
    y="110"
    text-anchor="middle"
    font-size="16"
    font-weight="700"
    fill="#92400e"
  >Agent A</text>
  <text x="150" y="138" text-anchor="middle" font-size="12" fill="#92400e"
  >Ceiling: RESTRICTED</text>
  <text x="150" y="158" text-anchor="middle" font-size="12" fill="#92400e"
  >Own taint: PUBLIC</text>
  <text x="150" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#d97706"
  >Effective: CONFIDENTIAL</text>
  <text x="150" y="195" text-anchor="middle" font-size="10" fill="#6b7280"
  >(accessed classified data)</text>

  <!-- Arrow A → B -->
  <line
    x1="260"
    y1="140"
    x2="308"
    y2="140"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#ti-arrow)"
  />
  <text x="285" y="130" text-anchor="middle" font-size="11" fill="#6b7280"
  >delegates</text>

  <!-- Agent B -->
  <rect
    x="320"
    y="80"
    width="220"
    height="120"
    rx="8"
    fill="#fef3c7"
    stroke="#d97706"
    stroke-width="2"
  />
  <text
    x="430"
    y="110"
    text-anchor="middle"
    font-size="16"
    font-weight="700"
    fill="#92400e"
  >Agent B</text>
  <text x="430" y="138" text-anchor="middle" font-size="12" fill="#92400e"
  >Ceiling: RESTRICTED</text>
  <text x="430" y="158" text-anchor="middle" font-size="12" fill="#92400e"
  >Own taint: PUBLIC</text>
  <text x="430" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#d97706"
  >Inherits: CONFIDENTIAL</text>
  <text x="430" y="195" text-anchor="middle" font-size="10" fill="#6b7280"
  >max(PUBLIC, CONFIDENTIAL)</text>

  <!-- Arrow B → C -->
  <line
    x1="540"
    y1="140"
    x2="588"
    y2="140"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#ti-arrow)"
  />
  <text x="565" y="130" text-anchor="middle" font-size="11" fill="#6b7280"
  >delegates</text>

  <!-- Agent C -->
  <rect
    x="600"
    y="80"
    width="220"
    height="120"
    rx="8"
    fill="#fef3c7"
    stroke="#d97706"
    stroke-width="2"
  />
  <text
    x="710"
    y="110"
    text-anchor="middle"
    font-size="16"
    font-weight="700"
    fill="#92400e"
  >Agent C</text>
  <text x="710" y="138" text-anchor="middle" font-size="12" fill="#92400e"
  >Ceiling: CONFIDENTIAL</text>
  <text x="710" y="158" text-anchor="middle" font-size="12" fill="#92400e"
  >Own taint: PUBLIC</text>
  <text x="710" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#d97706"
  >Inherits: CONFIDENTIAL</text>
  <text x="710" y="195" text-anchor="middle" font-size="10" fill="#6b7280"
  >max(PUBLIC, CONFIDENTIAL)</text>

  <!-- Taint propagation line -->
  <rect
    x="40"
    y="230"
    width="780"
    height="6"
    rx="3"
    fill="#d97706"
  />
  <text
    x="430"
    y="260"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#d97706"
  >CONFIDENTIAL taint propagates through the entire chain</text>

  <!-- Bottom explanation -->
  <rect
    x="120"
    y="290"
    width="620"
    height="80"
    rx="8"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1"
  />
  <text
    x="430"
    y="316"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#374151"
  >Taint only escalates, never decreases</text>
  <text x="430" y="338" text-anchor="middle" font-size="12" fill="#6b7280"
  >Each agent inherits max(own taint, delegator's taint).</text>
  <text x="430" y="356" text-anchor="middle" font-size="12" fill="#6b7280"
  >An agent with a lower ceiling than the taint will be blocked.</text>
</svg>
