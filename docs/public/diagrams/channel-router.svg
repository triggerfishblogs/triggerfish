<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 860 560"
  width="860"
  height="560"
  font-family="system-ui, sans-serif"
>
  <defs>
    <marker
      id="cr-arr"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="560" fill="#ffffff" />

  <!-- Title -->
  <text
    x="430"
    y="36"
    text-anchor="middle"
    font-size="18"
    font-weight="700"
    fill="#1e40af"
  >Channel Router Architecture</text>

  <!-- Channel inputs — left column -->
  <rect x="40" y="70" width="160" height="40" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" />
  <text x="120" y="95" text-anchor="middle" font-size="13" font-weight="500" fill="#1e40af">Telegram</text>

  <rect x="40" y="120" width="160" height="40" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" />
  <text x="120" y="145" text-anchor="middle" font-size="13" font-weight="500" fill="#1e40af">Signal</text>

  <rect x="40" y="170" width="160" height="40" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" />
  <text x="120" y="195" text-anchor="middle" font-size="13" font-weight="500" fill="#1e40af">Slack</text>

  <rect x="40" y="220" width="160" height="40" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" />
  <text x="120" y="245" text-anchor="middle" font-size="13" font-weight="500" fill="#1e40af">Discord</text>

  <rect x="40" y="270" width="160" height="40" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" />
  <text x="120" y="295" text-anchor="middle" font-size="13" font-weight="500" fill="#1e40af">WhatsApp</text>

  <rect x="40" y="320" width="160" height="40" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" />
  <text x="120" y="345" text-anchor="middle" font-size="13" font-weight="500" fill="#1e40af">WebChat</text>

  <rect x="40" y="370" width="160" height="40" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" />
  <text x="120" y="395" text-anchor="middle" font-size="13" font-weight="500" fill="#1e40af">Email</text>

  <rect x="40" y="420" width="160" height="40" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" />
  <text x="120" y="445" text-anchor="middle" font-size="13" font-weight="500" fill="#1e40af">CLI</text>

  <!-- Arrows from channels to router -->
  <line x1="200" y1="90" x2="316" y2="220" stroke="#374151" stroke-width="1.2" marker-end="url(#cr-arr)" />
  <line x1="200" y1="140" x2="316" y2="230" stroke="#374151" stroke-width="1.2" marker-end="url(#cr-arr)" />
  <line x1="200" y1="190" x2="316" y2="240" stroke="#374151" stroke-width="1.2" marker-end="url(#cr-arr)" />
  <line x1="200" y1="240" x2="316" y2="250" stroke="#374151" stroke-width="1.2" marker-end="url(#cr-arr)" />
  <line x1="200" y1="290" x2="316" y2="260" stroke="#374151" stroke-width="1.2" marker-end="url(#cr-arr)" />
  <line x1="200" y1="340" x2="316" y2="270" stroke="#374151" stroke-width="1.2" marker-end="url(#cr-arr)" />
  <line x1="200" y1="390" x2="316" y2="280" stroke="#374151" stroke-width="1.2" marker-end="url(#cr-arr)" />
  <line x1="200" y1="440" x2="316" y2="290" stroke="#374151" stroke-width="1.2" marker-end="url(#cr-arr)" />

  <!-- Central router box -->
  <rect
    x="320"
    y="180"
    width="260"
    height="140"
    rx="8"
    fill="#2563eb"
    stroke="#1e40af"
    stroke-width="2"
  />
  <text
    x="450"
    y="228"
    text-anchor="middle"
    font-size="16"
    font-weight="700"
    fill="#ffffff"
  >Channel Router</text>
  <text
    x="450"
    y="252"
    text-anchor="middle"
    font-size="12"
    fill="#bfdbfe"
  >Classification gate</text>
  <text
    x="450"
    y="270"
    text-anchor="middle"
    font-size="12"
    fill="#bfdbfe"
  >Message routing + retry</text>
  <text
    x="450"
    y="288"
    text-anchor="middle"
    font-size="12"
    fill="#bfdbfe"
  >Write-down prevention</text>

  <!-- Side annotations -->
  <rect x="320" y="338" width="120" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1" />
  <text x="380" y="355" text-anchor="middle" font-size="11" font-weight="500" fill="#166534">Allowed flows</text>
  <text x="380" y="370" text-anchor="middle" font-size="11" fill="#166534">pass through</text>

  <rect x="460" y="338" width="120" height="40" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1" />
  <text x="520" y="355" text-anchor="middle" font-size="11" font-weight="500" fill="#dc2626">Write-down</text>
  <text x="520" y="370" text-anchor="middle" font-size="11" fill="#dc2626">flows blocked</text>

  <!-- Arrow: Router → Gateway Server -->
  <line
    x1="450"
    y1="320"
    x2="450"
    y2="426"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#cr-arr)"
  />

  <!-- Gateway Server -->
  <rect
    x="320"
    y="432"
    width="260"
    height="60"
    rx="8"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1.5"
  />
  <text
    x="450"
    y="458"
    text-anchor="middle"
    font-size="14"
    font-weight="600"
    fill="#374151"
  >Gateway Server</text>
  <text
    x="450"
    y="478"
    text-anchor="middle"
    font-size="12"
    fill="#6b7280"
  >WebSocket control plane</text>

  <!-- Right annotation -->
  <rect
    x="620"
    y="200"
    width="200"
    height="100"
    rx="8"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1"
  />
  <text x="720" y="224" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Each channel has:</text>
  <text x="720" y="244" text-anchor="middle" font-size="11" fill="#6b7280">- Classification level</text>
  <text x="720" y="260" text-anchor="middle" font-size="11" fill="#6b7280">- Adapter interface</text>
  <text x="720" y="276" text-anchor="middle" font-size="11" fill="#6b7280">- Connect / disconnect</text>
  <text x="720" y="292" text-anchor="middle" font-size="11" fill="#6b7280">- sendWithRetry()</text>

  <!-- Arrow: Router box → annotation -->
  <line
    x1="580"
    y1="250"
    x2="614"
    y2="250"
    stroke="#d1d5db"
    stroke-width="1.5"
    marker-end="url(#cr-arr)"
  />

  <!-- Bottom note -->
  <rect
    x="130"
    y="512"
    width="600"
    height="32"
    rx="8"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1"
  />
  <text
    x="430"
    y="533"
    text-anchor="middle"
    font-size="12"
    fill="#6b7280"
  >No channel communicates directly with the agent. All traffic flows through the router.</text>
</svg>