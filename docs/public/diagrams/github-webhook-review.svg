<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 880 480"
  width="880"
  height="480"
  font-family="system-ui, sans-serif"
>
  <defs>
    <marker
      id="gwr-arrow"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151" />
    </marker>
    <marker
      id="gwr-blue"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e40af" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#ffffff" />

  <!-- Title -->
  <text
    x="440"
    y="36"
    text-anchor="middle"
    font-size="18"
    font-weight="700"
    fill="#1e40af"
  >GitHub PR Review Loop</text>

  <!-- Step 1: Agent opens PR -->
  <rect
    x="40"
    y="70"
    width="160"
    height="60"
    rx="8"
    fill="#dbeafe"
    stroke="#1e40af"
    stroke-width="2"
  />
  <text
    x="120"
    y="96"
    text-anchor="middle"
    font-size="13"
    font-weight="700"
    fill="#1e40af"
  >Agent opens PR</text>
  <text x="120" y="115" text-anchor="middle" font-size="11" fill="#1e40af"
  >Creates tracking file</text>

  <!-- Arrow 1 → 2 -->
  <line x1="200" y1="100" x2="248" y2="100" stroke="#374151" stroke-width="2" marker-end="url(#gwr-arrow)" />

  <!-- Step 2: Waits -->
  <rect
    x="260"
    y="70"
    width="120"
    height="60"
    rx="8"
    fill="#f3f4f6"
    stroke="#9ca3af"
    stroke-width="2"
  />
  <text
    x="320"
    y="105"
    text-anchor="middle"
    font-size="13"
    font-weight="700"
    fill="#374151"
  >Waits</text>

  <!-- Arrow 2 → 3 -->
  <line x1="380" y1="100" x2="428" y2="100" stroke="#374151" stroke-width="2" marker-end="url(#gwr-arrow)" />

  <!-- Step 3: Webhook received -->
  <rect
    x="440"
    y="70"
    width="180"
    height="60"
    rx="8"
    fill="#fef3c7"
    stroke="#d97706"
    stroke-width="2"
  />
  <text
    x="530"
    y="96"
    text-anchor="middle"
    font-size="13"
    font-weight="700"
    fill="#92400e"
  >GitHub webhook:</text>
  <text x="530" y="115" text-anchor="middle" font-size="12" fill="#92400e"
  >review submitted</text>

  <!-- Arrow 3 → 4 -->
  <line x1="620" y1="100" x2="668" y2="100" stroke="#374151" stroke-width="2" marker-end="url(#gwr-arrow)" />

  <!-- Step 4: Read tracking file -->
  <rect
    x="680"
    y="70"
    width="160"
    height="60"
    rx="8"
    fill="#dbeafe"
    stroke="#1e40af"
    stroke-width="2"
  />
  <text
    x="760"
    y="96"
    text-anchor="middle"
    font-size="13"
    font-weight="700"
    fill="#1e40af"
  >Agent reads</text>
  <text x="760" y="115" text-anchor="middle" font-size="12" fill="#1e40af"
  >tracking file</text>

  <!-- Arrow down to second row -->
  <line x1="760" y1="130" x2="760" y2="178" stroke="#374151" stroke-width="2" marker-end="url(#gwr-arrow)" />

  <!-- Step 5: Address feedback -->
  <rect
    x="680"
    y="190"
    width="160"
    height="60"
    rx="8"
    fill="#dbeafe"
    stroke="#1e40af"
    stroke-width="2"
  />
  <text
    x="760"
    y="216"
    text-anchor="middle"
    font-size="13"
    font-weight="700"
    fill="#1e40af"
  >Agent addresses</text>
  <text x="760" y="235" text-anchor="middle" font-size="12" fill="#1e40af"
  >feedback</text>

  <!-- Arrow 5 → 6 -->
  <line x1="680" y1="220" x2="632" y2="220" stroke="#374151" stroke-width="2" marker-end="url(#gwr-arrow)" />

  <!-- Step 6: Commit + push -->
  <rect
    x="460"
    y="190"
    width="160"
    height="60"
    rx="8"
    fill="#dcfce7"
    stroke="#16a34a"
    stroke-width="2"
  />
  <text
    x="540"
    y="216"
    text-anchor="middle"
    font-size="13"
    font-weight="700"
    fill="#166534"
  >Agent commits</text>
  <text x="540" y="235" text-anchor="middle" font-size="12" fill="#166534"
  >&amp; pushes</text>

  <!-- Loop arrow back to "Waits" -->
  <path
    d="M 460 220 L 320 220 L 320 136"
    fill="none"
    stroke="#1e40af"
    stroke-width="2"
    stroke-dasharray="6,3"
    marker-end="url(#gwr-blue)"
  />

  <!-- Loop label -->
  <rect
    x="340"
    y="168"
    width="100"
    height="24"
    rx="4"
    fill="#ffffff"
    stroke="#1e40af"
    stroke-width="1"
  />
  <text
    x="390"
    y="184"
    text-anchor="middle"
    font-size="11"
    font-weight="600"
    fill="#1e40af"
  >Loop until</text>

  <!-- Approved exit -->
  <line x1="320" y1="220" x2="320" y2="318" stroke="#16a34a" stroke-width="2" />
  <line
    x1="320"
    y1="310"
    x2="320"
    y2="338"
    stroke="#16a34a"
    stroke-width="2"
    marker-end="url(#gwr-arrow)"
  />

  <rect
    x="240"
    y="350"
    width="160"
    height="50"
    rx="8"
    fill="#dcfce7"
    stroke="#16a34a"
    stroke-width="2"
  />
  <text
    x="320"
    y="380"
    text-anchor="middle"
    font-size="14"
    font-weight="700"
    fill="#166534"
  >Approved</text>

  <!-- Exit condition label -->
  <text x="365" y="300" font-size="11" font-weight="600" fill="#16a34a"
  >Review approved</text>

  <!-- Bottom note -->
  <rect
    x="120"
    y="430"
    width="640"
    height="36"
    rx="8"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1"
  />
  <text
    x="440"
    y="453"
    text-anchor="middle"
    font-size="12"
    font-weight="600"
    fill="#374151"
  >Each iteration spawns an isolated session — the agent cannot access prior session data.</text>
</svg>
