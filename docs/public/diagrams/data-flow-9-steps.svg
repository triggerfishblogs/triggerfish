<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 920" width="860" height="920" font-family="system-ui, sans-serif">
  <defs>
    <marker id="df" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="920" fill="#ffffff"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e40af">Message Flow — 9 Steps</text>

  <!-- Step 1 -->
  <circle cx="68" cy="80" r="20" fill="#2563eb"/>
  <text x="68" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">1</text>
  <rect x="100" y="60" width="700" height="44" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="126" y="78" font-size="14" font-weight="600" fill="#1e40af">INBOUND</text>
  <text x="126" y="96" font-size="12" fill="#374151">Message arrives on channel (WhatsApp, Telegram, CLI, etc.)</text>
  <rect x="700" y="68" width="86" height="28" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="743" y="87" text-anchor="middle" font-size="11" fill="#1e40af">Channel</text>

  <line x1="430" y1="104" x2="430" y2="130" stroke="#374151" stroke-width="1.5" marker-end="url(#df)"/>

  <!-- Step 2 -->
  <circle cx="68" cy="172" r="20" fill="#2563eb"/>
  <text x="68" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">2</text>
  <rect x="100" y="142" width="700" height="60" rx="8" fill="#2563eb" stroke="#1e40af" stroke-width="1.5"/>
  <text x="126" y="164" font-size="14" font-weight="600" fill="#ffffff">PRE_CONTEXT_INJECTION</text>
  <text x="126" y="182" font-size="12" fill="#bfdbfe">Classify source, check sender permissions, determine channel classification</text>
  <text x="126" y="196" font-size="11" fill="#93c5fd">ALLOW / DENY decision logged with full context</text>

  <line x1="430" y1="202" x2="430" y2="224" stroke="#374151" stroke-width="1.5" marker-end="url(#df)"/>

  <!-- Step 3 -->
  <circle cx="68" cy="258" r="20" fill="#2563eb"/>
  <text x="68" y="264" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">3</text>
  <rect x="100" y="230" width="700" height="56" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="126" y="252" font-size="14" font-weight="600" fill="#374151">Context Assembly</text>
  <text x="126" y="270" font-size="12" fill="#6b7280">System prompt (SPINE.md) + conversation history + available tools</text>
  <text x="126" y="284" font-size="11" fill="#6b7280">Memory auto-injection if enabled (classification-gated)</text>

  <line x1="430" y1="286" x2="430" y2="308" stroke="#374151" stroke-width="1.5" marker-end="url(#df)"/>

  <!-- Step 4 -->
  <circle cx="68" cy="340" r="20" fill="#2563eb"/>
  <text x="68" y="346" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">4</text>
  <rect x="100" y="314" width="700" height="52" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="126" y="336" font-size="14" font-weight="600" fill="#374151">LLM Completion</text>
  <text x="126" y="354" font-size="12" fill="#6b7280">LLM generates response — may include tool calls</text>
  <rect x="700" y="322" width="86" height="28" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="743" y="341" text-anchor="middle" font-size="11" fill="#6b7280">LLM</text>

  <line x1="430" y1="366" x2="430" y2="388" stroke="#374151" stroke-width="1.5" marker-end="url(#df)"/>

  <!-- Step 5 -->
  <circle cx="68" cy="426" r="20" fill="#2563eb"/>
  <text x="68" y="432" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">5</text>
  <rect x="100" y="394" width="700" height="64" rx="8" fill="#2563eb" stroke="#1e40af" stroke-width="1.5"/>
  <text x="126" y="416" font-size="14" font-weight="600" fill="#ffffff">PRE_TOOL_CALL</text>
  <text x="126" y="434" font-size="12" fill="#bfdbfe">Validate tool name, check integration classification, check permissions</text>
  <text x="126" y="452" font-size="11" fill="#93c5fd">May escalate session taint based on tool's classification level</text>

  <line x1="430" y1="458" x2="430" y2="480" stroke="#374151" stroke-width="1.5" marker-end="url(#df)"/>

  <!-- Step 6 -->
  <circle cx="68" cy="510" r="20" fill="#2563eb"/>
  <text x="68" y="516" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">6</text>
  <rect x="100" y="486" width="700" height="48" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="126" y="508" font-size="14" font-weight="600" fill="#374151">Tool Execution</text>
  <text x="126" y="524" font-size="12" fill="#6b7280">Run the tool (MCP server, plugin, built-in) — sandboxed execution</text>
  <rect x="700" y="494" width="86" height="28" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="743" y="513" text-anchor="middle" font-size="11" fill="#6b7280">Tool</text>

  <line x1="430" y1="534" x2="430" y2="556" stroke="#374151" stroke-width="1.5" marker-end="url(#df)"/>

  <!-- Step 7 -->
  <circle cx="68" cy="598" r="20" fill="#2563eb"/>
  <text x="68" y="604" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">7</text>
  <rect x="100" y="562" width="700" height="64" rx="8" fill="#2563eb" stroke="#1e40af" stroke-width="1.5"/>
  <text x="126" y="584" font-size="14" font-weight="600" fill="#ffffff">POST_TOOL_RESPONSE</text>
  <text x="126" y="602" font-size="12" fill="#bfdbfe">Classify tool result, update session taint if needed</text>
  <text x="126" y="620" font-size="11" fill="#93c5fd">Memory writes forced to session taint level</text>

  <line x1="430" y1="626" x2="430" y2="648" stroke="#374151" stroke-width="1.5" marker-end="url(#df)"/>

  <!-- Step 8 -->
  <circle cx="68" cy="690" r="20" fill="#2563eb"/>
  <text x="68" y="696" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">8</text>
  <rect x="100" y="654" width="700" height="64" rx="8" fill="#2563eb" stroke="#1e40af" stroke-width="1.5"/>
  <text x="126" y="676" font-size="14" font-weight="600" fill="#ffffff">PRE_OUTPUT</text>
  <text x="126" y="694" font-size="12" fill="#bfdbfe">Check destination channel classification vs session taint</text>
  <text x="126" y="712" font-size="11" fill="#93c5fd">BLOCK if taint > channel classification (no-write-down)</text>

  <line x1="430" y1="718" x2="430" y2="740" stroke="#374151" stroke-width="1.5" marker-end="url(#df)"/>

  <!-- Step 9 -->
  <circle cx="68" cy="778" r="20" fill="#2563eb"/>
  <text x="68" y="784" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">9</text>
  <rect x="100" y="746" width="700" height="56" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="126" y="768" font-size="14" font-weight="600" fill="#166534">OUTBOUND</text>
  <text x="126" y="786" font-size="12" fill="#166534">Deliver to channel via Channel Router</text>
  <text x="126" y="800" font-size="11" fill="#15803d">Ripple indicators, typing status, delivery confirmation</text>
  <rect x="700" y="754" width="86" height="28" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="743" y="773" text-anchor="middle" font-size="11" fill="#166534">Delivered</text>

  <!-- Legend -->
  <rect x="200" y="840" width="460" height="60" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <rect x="220" y="856" width="14" height="14" rx="3" fill="#2563eb"/>
  <text x="242" y="868" font-size="12" fill="#374151">Policy enforcement hook (deterministic)</text>
  <rect x="220" y="876" width="14" height="14" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="242" y="888" font-size="12" fill="#374151">Processing stage (may involve LLM)</text>
</svg>