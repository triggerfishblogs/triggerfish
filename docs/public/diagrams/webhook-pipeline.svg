<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 900 380"
  width="900"
  height="380"
  font-family="system-ui, sans-serif"
>
  <defs>
    <marker
      id="wp-arrow"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" fill="#ffffff" />

  <!-- Title -->
  <text
    x="450"
    y="36"
    text-anchor="middle"
    font-size="18"
    font-weight="700"
    fill="#1e40af"
  >Webhook Processing Pipeline</text>

  <!-- Step 1: External Service -->
  <rect
    x="20"
    y="70"
    width="110"
    height="60"
    rx="8"
    fill="#f3f4f6"
    stroke="#9ca3af"
    stroke-width="2"
  />
  <text
    x="75"
    y="96"
    text-anchor="middle"
    font-size="12"
    font-weight="700"
    fill="#374151"
  >External</text>
  <text x="75" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#374151"
  >Service</text>

  <!-- Arrow 1 → 2 -->
  <line x1="130" y1="100" x2="158" y2="100" stroke="#374151" stroke-width="2" marker-end="url(#wp-arrow)" />

  <!-- Step 2: HTTP POST -->
  <rect
    x="170"
    y="70"
    width="100"
    height="60"
    rx="8"
    fill="#f3f4f6"
    stroke="#9ca3af"
    stroke-width="2"
  />
  <text
    x="220"
    y="105"
    text-anchor="middle"
    font-size="12"
    font-weight="700"
    fill="#374151"
  >HTTP POST</text>

  <!-- Arrow 2 → 3 -->
  <line x1="270" y1="100" x2="298" y2="100" stroke="#374151" stroke-width="2" marker-end="url(#wp-arrow)" />

  <!-- Step 3: HMAC Verification -->
  <rect
    x="310"
    y="70"
    width="110"
    height="60"
    rx="8"
    fill="#dbeafe"
    stroke="#1e40af"
    stroke-width="2"
  />
  <text
    x="365"
    y="96"
    text-anchor="middle"
    font-size="12"
    font-weight="700"
    fill="#1e40af"
  >HMAC</text>
  <text x="365" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af"
  >Verification</text>

  <!-- Arrow 3 → 4 -->
  <line x1="420" y1="100" x2="448" y2="100" stroke="#374151" stroke-width="2" marker-end="url(#wp-arrow)" />

  <!-- Step 4: Classification -->
  <rect
    x="460"
    y="70"
    width="110"
    height="60"
    rx="8"
    fill="#dbeafe"
    stroke="#1e40af"
    stroke-width="2"
  />
  <text
    x="515"
    y="105"
    text-anchor="middle"
    font-size="12"
    font-weight="700"
    fill="#1e40af"
  >Classification</text>

  <!-- Arrow 4 → 5 -->
  <line x1="570" y1="100" x2="598" y2="100" stroke="#374151" stroke-width="2" marker-end="url(#wp-arrow)" />

  <!-- Step 5: Session Isolation -->
  <rect
    x="610"
    y="70"
    width="110"
    height="60"
    rx="8"
    fill="#dbeafe"
    stroke="#1e40af"
    stroke-width="2"
  />
  <text
    x="665"
    y="96"
    text-anchor="middle"
    font-size="12"
    font-weight="700"
    fill="#1e40af"
  >Session</text>
  <text x="665" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af"
  >Isolation</text>

  <!-- Arrow 5 → 6 -->
  <line x1="720" y1="100" x2="748" y2="100" stroke="#374151" stroke-width="2" marker-end="url(#wp-arrow)" />

  <!-- Step 6: Agent Processing -->
  <rect
    x="760"
    y="70"
    width="110"
    height="60"
    rx="8"
    fill="#dcfce7"
    stroke="#16a34a"
    stroke-width="2"
  />
  <text
    x="815"
    y="96"
    text-anchor="middle"
    font-size="12"
    font-weight="700"
    fill="#166534"
  >Agent</text>
  <text x="815" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#166534"
  >Processing</text>

  <!-- Second row: Output with PRE_OUTPUT -->
  <line x1="815" y1="130" x2="815" y2="158" stroke="#374151" stroke-width="2" marker-end="url(#wp-arrow)" />

  <rect
    x="740"
    y="170"
    width="150"
    height="50"
    rx="8"
    fill="#dbeafe"
    stroke="#1e40af"
    stroke-width="2"
  />
  <text
    x="815"
    y="195"
    text-anchor="middle"
    font-size="12"
    font-weight="700"
    fill="#1e40af"
  >Output (PRE_OUTPUT)</text>

  <!-- Annotations below -->
  <rect
    x="310"
    y="160"
    width="110"
    height="30"
    rx="6"
    fill="#fef2f2"
    stroke="#fca5a5"
    stroke-width="1"
  />
  <text
    x="365"
    y="180"
    text-anchor="middle"
    font-size="11"
    font-weight="600"
    fill="#dc2626"
  >Reject if invalid</text>

  <line x1="365" y1="130" x2="365" y2="154" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,2" />

  <!-- Bottom note -->
  <rect
    x="100"
    y="260"
    width="700"
    height="80"
    rx="8"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1"
  />
  <text
    x="450"
    y="286"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#374151"
  >Every webhook is verified, classified, and isolated before agent processing</text>
  <text x="450" y="308" text-anchor="middle" font-size="12" fill="#6b7280"
  >HMAC verification ensures authenticity. Classification sets the session taint.</text>
  <text x="450" y="326" text-anchor="middle" font-size="12" fill="#6b7280"
  >Session isolation prevents cross-contamination. PRE_OUTPUT enforces write-down prevention.</text>
</svg>
