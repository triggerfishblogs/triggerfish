<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440" font-family="system-ui, sans-serif">
  <defs>
    <marker id="sm" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="sm-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="440" fill="#ffffff"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e40af">Channel / MCP Server State Machine</text>

  <!-- UNTRUSTED state -->
  <rect x="60" y="120" width="200" height="100" rx="50" fill="#f3f4f6" stroke="#9ca3af" stroke-width="2"/>
  <text x="160" y="160" text-anchor="middle" font-size="16" font-weight="700" fill="#374151">UNTRUSTED</text>
  <text x="160" y="182" text-anchor="middle" font-size="12" fill="#6b7280">Default for new</text>
  <text x="160" y="198" text-anchor="middle" font-size="12" fill="#6b7280">servers / channels</text>

  <!-- CLASSIFIED state -->
  <rect x="540" y="60" width="240" height="100" rx="50" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="660" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">CLASSIFIED</text>
  <text x="660" y="122" text-anchor="middle" font-size="12" fill="#166534">Reviewed, assigned</text>
  <text x="660" y="138" text-anchor="middle" font-size="12" fill="#166534">classification level</text>

  <!-- BLOCKED state -->
  <rect x="540" y="240" width="240" height="100" rx="50" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="660" y="280" text-anchor="middle" font-size="16" font-weight="700" fill="#dc2626">BLOCKED</text>
  <text x="660" y="302" text-anchor="middle" font-size="12" fill="#dc2626">Explicitly</text>
  <text x="660" y="318" text-anchor="middle" font-size="12" fill="#dc2626">prohibited</text>

  <!-- Arrow: UNTRUSTED → CLASSIFIED -->
  <path d="M 260 145 C 370 110, 450 90, 534 100" fill="none" stroke="#374151" stroke-width="2" marker-end="url(#sm)"/>
  <!-- Label background -->
  <rect x="310" y="82" width="200" height="34" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="410" y="98" text-anchor="middle" font-size="12" font-weight="500" fill="#374151">Admin reviews &amp;</text>
  <text x="410" y="112" text-anchor="middle" font-size="11" fill="#374151">assigns classification level</text>

  <!-- Arrow: UNTRUSTED → BLOCKED -->
  <path d="M 260 195 C 370 240, 450 265, 534 275" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#sm-red)"/>
  <!-- Label background -->
  <rect x="310" y="230" width="200" height="34" rx="4" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="410" y="246" text-anchor="middle" font-size="12" font-weight="500" fill="#dc2626">Admin determines</text>
  <text x="410" y="260" text-anchor="middle" font-size="11" fill="#dc2626">not permitted</text>

  <!-- Arrow: CLASSIFIED → BLOCKED -->
  <line x1="660" y1="160" x2="660" y2="234" stroke="#dc2626" stroke-width="2" marker-end="url(#sm-red)"/>
  <!-- Label background -->
  <rect x="680" y="182" width="140" height="28" rx="4" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="750" y="200" text-anchor="middle" font-size="12" font-weight="500" fill="#dc2626">Admin revokes access</text>

  <!-- Entry point -->
  <circle cx="160" cy="80" r="8" fill="#374151"/>
  <line x1="160" y1="88" x2="160" y2="114" stroke="#374151" stroke-width="2" marker-end="url(#sm)"/>
  <text x="160" y="72" text-anchor="middle" font-size="11" fill="#6b7280">New server / channel</text>

  <!-- Default deny annotation -->
  <rect x="60" y="260" width="200" height="66" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="160" y="282" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">Default Deny</text>
  <text x="160" y="300" text-anchor="middle" font-size="11" fill="#991b1b">UNTRUSTED servers are</text>
  <text x="160" y="314" text-anchor="middle" font-size="11" fill="#991b1b">rejected by policy hooks</text>

  <!-- Bottom note -->
  <rect x="120" y="370" width="620" height="50" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="430" y="392" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">No implicit trust — all integrations require explicit classification</text>
  <text x="430" y="410" text-anchor="middle" font-size="12" fill="#6b7280">Unclassified tools, MCP servers, and channels are always denied by default.</text>
</svg>