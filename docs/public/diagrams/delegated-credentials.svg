<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 860 620"
  width="860"
  height="620"
  font-family="system-ui, sans-serif"
>
  <rect width="860" height="620" fill="#ffffff" rx="0" />

  <defs>
    <marker
      id="dc-arrow"
      markerWidth="8"
      markerHeight="6"
      refX="8"
      refY="3"
      orient="auto"
    >
      <path d="M0,0 L8,3 L0,6 Z" fill="#374151" />
    </marker>
    <marker
      id="dc-arrow-blue"
      markerWidth="8"
      markerHeight="6"
      refX="8"
      refY="3"
      orient="auto"
    >
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb" />
    </marker>
    <marker
      id="dc-arrow-green"
      markerWidth="8"
      markerHeight="6"
      refX="8"
      refY="3"
      orient="auto"
    >
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a" />
    </marker>
  </defs>

  <!-- Title -->
  <text
    x="430"
    y="36"
    text-anchor="middle"
    font-size="16"
    font-weight="bold"
    fill="#1e40af"
  >Delegated Credentials — Sequence Diagram</text>

  <!-- Lifeline headers -->
  <rect x="70" y="58" width="140" height="42" rx="8" fill="#2563eb" />
  <text
    x="140"
    y="84"
    text-anchor="middle"
    font-size="14"
    font-weight="600"
    fill="#ffffff"
  >User</text>

  <rect x="360" y="58" width="160" height="42" rx="8" fill="#2563eb" />
  <text
    x="440"
    y="84"
    text-anchor="middle"
    font-size="14"
    font-weight="600"
    fill="#ffffff"
  >Triggerfish Agent</text>

  <rect x="660" y="58" width="140" height="42" rx="8" fill="#2563eb" />
  <text
    x="730"
    y="84"
    text-anchor="middle"
    font-size="14"
    font-weight="600"
    fill="#ffffff"
  >Source System</text>

  <!-- Lifelines -->
  <line
    x1="140"
    y1="100"
    x2="140"
    y2="570"
    stroke="#d1d5db"
    stroke-width="1.5"
    stroke-dasharray="6,4"
  />
  <line
    x1="440"
    y1="100"
    x2="440"
    y2="570"
    stroke="#d1d5db"
    stroke-width="1.5"
    stroke-dasharray="6,4"
  />
  <line
    x1="730"
    y1="100"
    x2="730"
    y2="570"
    stroke="#d1d5db"
    stroke-width="1.5"
    stroke-dasharray="6,4"
  />

  <!-- Step 1: OAuth consent -->
  <line
    x1="150"
    y1="140"
    x2="428"
    y2="140"
    stroke="#2563eb"
    stroke-width="1.5"
    marker-end="url(#dc-arrow-blue)"
  />
  <rect
    x="190"
    y="122"
    width="180"
    height="22"
    rx="4"
    fill="#ffffff"
    stroke="none"
  />
  <text
    x="280"
    y="137"
    text-anchor="middle"
    font-size="12"
    font-weight="600"
    fill="#2563eb"
  >1. OAuth consent</text>
  <text x="280" y="157" text-anchor="middle" font-size="11" fill="#6b7280"
  >User authorizes specific scopes</text>

  <!-- Step 2: Store token -->
  <rect
    x="390"
    y="185"
    width="100"
    height="50"
    rx="6"
    fill="#eff6ff"
    stroke="#2563eb"
    stroke-width="1.5"
  />
  <text
    x="440"
    y="207"
    text-anchor="middle"
    font-size="11"
    font-weight="500"
    fill="#1e40af"
  >Store token</text>
  <text x="440" y="221" text-anchor="middle" font-size="10" fill="#6b7280"
  >(OS keychain)</text>

  <text x="560" y="210" font-size="11" fill="#6b7280" font-style="italic"
  >2. Encrypted at rest</text>

  <!-- Step 3: User request -->
  <line
    x1="150"
    y1="270"
    x2="428"
    y2="270"
    stroke="#374151"
    stroke-width="1.5"
    marker-end="url(#dc-arrow)"
  />
  <rect
    x="200"
    y="252"
    width="160"
    height="22"
    rx="4"
    fill="#ffffff"
    stroke="none"
  />
  <text
    x="280"
    y="267"
    text-anchor="middle"
    font-size="12"
    font-weight="600"
    fill="#374151"
  >3. "Show my deals"</text>

  <!-- Step 4: Query with user's token -->
  <line
    x1="452"
    y1="320"
    x2="718"
    y2="320"
    stroke="#2563eb"
    stroke-width="1.5"
    marker-end="url(#dc-arrow-blue)"
  />
  <rect
    x="490"
    y="296"
    width="220"
    height="28"
    rx="4"
    fill="#eff6ff"
    stroke="#93c5fd"
    stroke-width="1"
  />
  <text
    x="600"
    y="315"
    text-anchor="middle"
    font-size="12"
    font-weight="600"
    fill="#1e40af"
  >4. Query with USER's token</text>
  <text x="600" y="340" text-anchor="middle" font-size="11" fill="#6b7280"
  >Not a system/admin token</text>

  <!-- Step 5: Filtered results -->
  <line
    x1="718"
    y1="385"
    x2="452"
    y2="385"
    stroke="#16a34a"
    stroke-width="1.5"
    marker-end="url(#dc-arrow-green)"
  />
  <rect
    x="490"
    y="363"
    width="230"
    height="28"
    rx="4"
    fill="#f0fdf4"
    stroke="#86efac"
    stroke-width="1"
  />
  <text
    x="605"
    y="382"
    text-anchor="middle"
    font-size="12"
    font-weight="600"
    fill="#15803d"
  >5. Only records user can see</text>
  <text x="605" y="405" text-anchor="middle" font-size="11" fill="#6b7280"
  >Source system enforces its own ACLs</text>

  <!-- Step 6: Return to user -->
  <line
    x1="428"
    y1="450"
    x2="152"
    y2="450"
    stroke="#16a34a"
    stroke-width="1.5"
    marker-end="url(#dc-arrow-green)"
  />
  <rect
    x="190"
    y="432"
    width="200"
    height="22"
    rx="4"
    fill="#ffffff"
    stroke="none"
  />
  <text
    x="290"
    y="447"
    text-anchor="middle"
    font-size="12"
    font-weight="600"
    fill="#15803d"
  >6. Results (user-scoped)</text>

  <!-- Key insight box -->
  <rect
    x="100"
    y="490"
    width="660"
    height="80"
    rx="8"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1.5"
  />
  <text
    x="430"
    y="515"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#1e40af"
  >Key Principle</text>
  <text x="430" y="537" text-anchor="middle" font-size="12" fill="#374151"
  >The agent never has MORE access than the user. It uses the user's delegated token,</text>
  <text x="430" y="555" text-anchor="middle" font-size="12" fill="#374151"
  >so the source system's own permissions apply. No privilege escalation possible.</text>

  <!-- Bottom note -->
  <text x="430" y="600" text-anchor="middle" font-size="12" fill="#6b7280"
  >Token scopes are limited to what the user explicitly granted during OAuth consent</text>
</svg>
