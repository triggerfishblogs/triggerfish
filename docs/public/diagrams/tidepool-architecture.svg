  <line
    x1="343"
    y1="200"
    x2="280"
    y2="200"
    stroke="#6b7280"
    stroke-width="1.2"
    stroke-dasharray="5,3"
    marker-end="url(#tp-arrow)"
  />
  <text x="312" y="193" text-anchor="middle" font-size="10" fill="#6b7280"
  >Callbacks</text>

  <!-- Bottom note -->
  <text
    x="450"
    y="395"
    text-anchor="middle"
    font-size="12"
    fill="#374151"
    font-weight="500"
  >Agent generates UI dynamically — no predefined templates. Full HTML/CSS/JS capability.</text>
  <text x="450" y="413" text-anchor="middle" font-size="12" fill="#6b7280"
  >Client iframe is sandboxed: no access to parent page, cookies, or host filesystem</text>
</svg>
