  <!-- Gateway column -->
  <rect
    x="355"
    y="105"
    width="190"
    height="50"
    rx="8"
    fill="#2563eb"
    stroke="#1e40af"
    stroke-width="1.5"
  />
  <text
    x="450"
    y="126"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#ffffff"
