  <!-- Column backgrounds -->
  <rect
    x="30"
    y="55"
    width="250"
    height="310"
    rx="10"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1"
  />
  <rect
    x="325"
    y="55"
    width="250"
    height="310"
    rx="10"
    fill="#eff6ff"
    stroke="#93c5fd"
    stroke-width="1"
  />
  <rect
    x="620"
