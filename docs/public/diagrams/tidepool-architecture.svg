  <rect
    x="749"
    y="198"
    width="88"
    height="28"
    rx="6"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1"
  />
  <text
    x="793"
    y="216"
    text-anchor="middle"
    font-size="11"
    font-weight="500"
    fill="#374151"
  >macOS</text>

  <rect
    x="655"
    y="234"
    width="88"
    height="28"
    rx="6"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1"
  />
  <text
    x="699"
    y="252"
    text-anchor="middle"
    font-size="11"
    font-weight="500"
    fill="#374151"
  >iOS</text>

  <rect
    x="749"
    y="234"
    width="88"
    height="28"
    rx="6"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1"
  />
  <text
    x="793"
    y="252"
    text-anchor="middle"
    font-size="11"
    font-weight="500"
    fill="#374151"
