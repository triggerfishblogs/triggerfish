  <text x="745" y="306" text-anchor="middle" font-size="11" fill="#6b7280"
  >HTML in sandboxed iframe</text>
  <text x="745" y="330" text-anchor="middle" font-size="11" fill="#6b7280"
  >Relays user events back</text>

  <!-- Arrows between columns -->
  <line
    x1="280"
    y1="130"
    x2="343"
    y2="130"
    stroke="#2563eb"
    stroke-width="2"
