  <rect
    x="65"
    y="234"
    width="88"
    height="28"
    rx="6"
    fill="#dbeafe"
    stroke="#93c5fd"
    stroke-width="1"
  />
  <text
    x="109"
    y="252"
    text-anchor="middle"
    font-size="11"
    font-weight="500"
    fill="#1e40af"
