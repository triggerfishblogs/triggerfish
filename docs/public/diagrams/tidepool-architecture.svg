  <rect
    x="159"
    y="198"
    width="88"
    height="28"
    rx="6"
    fill="#dbeafe"
    stroke="#93c5fd"
    stroke-width="1"
  />
  <text
    x="203"
    y="216"
    text-anchor="middle"
    font-size="11"
    font-weight="500"
    fill="#1e40af"
