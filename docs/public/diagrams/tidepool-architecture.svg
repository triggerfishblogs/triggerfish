  <line
    x1="575"
    y1="130"
    x2="638"
    y2="130"
    stroke="#2563eb"
    stroke-width="2"
    marker-end="url(#tp-arrow-blue)"
  />
  <text
    x="607"
    y="120"
    text-anchor="middle"
    font-size="10"
    fill="#2563eb"
    font-weight="500"
