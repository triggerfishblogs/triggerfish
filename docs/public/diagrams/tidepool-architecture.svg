<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 900 420"
  width="900"
  height="420"
  font-family="system-ui, sans-serif"
>
  <rect width="900" height="420" fill="#ffffff" rx="0" />

  <defs>
    <marker
      id="tp-arrow"
      markerWidth="8"
      markerHeight="6"
      refX="8"
      refY="3"
      orient="auto"
    >
      <path d="M0,0 L8,3 L0,6 Z" fill="#374151" />
    </marker>
    <marker
      id="tp-arrow-blue"
      markerWidth="8"
      markerHeight="6"
      refX="8"
      refY="3"
      orient="auto"
    >
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb" />
    </marker>
  </defs>

  <!-- Title -->
  <text
    x="450"
    y="36"
    text-anchor="middle"
    font-size="16"
    font-weight="bold"
    fill="#1e40af"
