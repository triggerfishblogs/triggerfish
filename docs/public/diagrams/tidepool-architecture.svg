  <!-- Return arrows -->
  <line
    x1="638"
    y1="200"
    x2="575"
    y2="200"
    stroke="#6b7280"
    stroke-width="1.2"
    stroke-dasharray="5,3"
    marker-end="url(#tp-arrow)"
  />
  <text x="607" y="193" text-anchor="middle" font-size="10" fill="#6b7280"
