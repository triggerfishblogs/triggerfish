<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 760 440"
  width="760"
  height="440"
  font-family="system-ui, sans-serif"
>
  <defs>
    <marker
      id="th-arrow"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="440" fill="#ffffff" />

  <!-- Title -->
  <text
    x="380"
    y="36"
    text-anchor="middle"
    font-size="18"
    font-weight="700"
    fill="#1e40af"
  >Trust Hierarchy</text>

  <!-- Triggerfish (Vendor) -->
  <rect
    x="180"
    y="70"
    width="400"
    height="80"
    rx="8"
    fill="#f3f4f6"
    stroke="#9ca3af"
    stroke-width="2"
  />
  <text
    x="380"
    y="100"
    text-anchor="middle"
    font-size="16"
    font-weight="700"
    fill="#374151"
  >TRIGGERFISH (Vendor)</text>
  <text x="380" y="122" text-anchor="middle" font-size="12" fill="#6b7280"
  >Zero access by default</text>
  <text x="380" y="140" text-anchor="middle" font-size="11" fill="#6b7280"
  >Provides platform — cannot see customer data</text>

  <!-- Arrow Vendor → Admin -->
  <line
    x1="380"
    y1="150"
    x2="380"
    y2="188"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#th-arrow)"
  />
  <text x="420" y="175" font-size="11" fill="#6b7280"
  >constrains</text>

  <!-- Org Admin (Customer) -->
  <rect
    x="180"
    y="200"
    width="400"
    height="80"
    rx="8"
    fill="#dbeafe"
    stroke="#1e40af"
    stroke-width="2"
  />
  <text
    x="380"
    y="230"
    text-anchor="middle"
    font-size="16"
    font-weight="700"
    fill="#1e40af"
  >ORG ADMIN (Customer)</text>
  <text x="380" y="252" text-anchor="middle" font-size="12" fill="#1e40af"
  >Sets policies, permissions</text>
  <text x="380" y="270" text-anchor="middle" font-size="11" fill="#1e40af"
  >Configures classification, ceilings, integrations</text>

  <!-- Arrow Admin → Employee -->
  <line
    x1="380"
    y1="280"
    x2="380"
    y2="318"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#th-arrow)"
  />
  <text x="420" y="305" font-size="11" fill="#6b7280"
  >constrains</text>

  <!-- Employee (End User) -->
  <rect
    x="180"
    y="330"
    width="400"
    height="80"
    rx="8"
    fill="#dcfce7"
    stroke="#16a34a"
    stroke-width="2"
  />
  <text
    x="380"
    y="360"
    text-anchor="middle"
    font-size="16"
    font-weight="700"
    fill="#166534"
  >EMPLOYEE (End User)</text>
  <text x="380" y="382" text-anchor="middle" font-size="12" fill="#166534"
  >Uses agent within boundaries</text>
  <text x="380" y="400" text-anchor="middle" font-size="11" fill="#166534"
  >Cannot exceed classification ceiling or bypass policies</text>

  <!-- Constraint direction label (left side) -->
  <text
    x="140"
    y="260"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#374151"
    transform="rotate(-90,140,260)"
  >Constraints Flow Down</text>

  <!-- Trust direction label (right side) -->
  <text
    x="620"
    y="260"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#6b7280"
    transform="rotate(90,620,260)"
  >Trust Increases Upward</text>
</svg>
