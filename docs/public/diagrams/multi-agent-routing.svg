<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="system-ui, sans-serif">
  <rect width="960" height="540" fill="#ffffff" rx="0"/>

  <defs>
    <marker id="mar-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#374151"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e40af">Multi-Agent Routing</text>

  <!-- Column headers -->
  <text x="110" y="68" text-anchor="middle" font-size="13" font-weight="600" fill="#6b7280">INBOUND CHANNELS</text>
  <text x="420" y="68" text-anchor="middle" font-size="13" font-weight="600" fill="#6b7280">ROUTER</text>
  <text x="760" y="68" text-anchor="middle" font-size="13" font-weight="600" fill="#6b7280">AGENT WORKSPACES</text>

  <!-- Left: Channels -->
  <!-- WhatsApp -->
  <rect x="30" y="100" width="160" height="50" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <circle cx="58" cy="125" r="14" fill="#25D366"/>
  <text x="54" y="130" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">W</text>
  <text x="120" y="130" text-anchor="middle" font-size="13" font-weight="500" fill="#374151">WhatsApp</text>

  <!-- Telegram -->
  <rect x="30" y="175" width="160" height="50" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <circle cx="58" cy="200" r="14" fill="#0088cc"/>
  <text x="54" y="205" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">T</text>
  <text x="120" y="205" text-anchor="middle" font-size="13" font-weight="500" fill="#374151">Telegram</text>

  <!-- Email -->
  <rect x="30" y="250" width="160" height="50" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <circle cx="58" cy="275" r="14" fill="#ea4335"/>
  <text x="54" y="280" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">E</text>
  <text x="120" y="280" text-anchor="middle" font-size="13" font-weight="500" fill="#374151">Email</text>

  <!-- CLI -->
  <rect x="30" y="325" width="160" height="50" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <circle cx="58" cy="350" r="14" fill="#374151"/>
  <text x="54" y="355" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">&gt;_</text>
  <text x="120" y="355" text-anchor="middle" font-size="13" font-weight="500" fill="#374151">CLI</text>

  <!-- Center: Router -->
  <rect x="310" y="100" width="220" height="290" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <rect x="310" y="100" width="220" height="40" rx="8" fill="#2563eb"/>
  <rect x="310" y="122" width="220" height="18" fill="#2563eb"/>
  <text x="420" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Router</text>

  <text x="420" y="170" text-anchor="middle" font-size="12" fill="#374151" font-weight="500">Routing Logic:</text>

  <text x="335" y="196" font-size="11" fill="#374151">1. Check message context</text>
  <text x="335" y="216" font-size="11" fill="#374151">2. Match routing rules</text>
  <text x="335" y="236" font-size="11" fill="#374151">3. Apply classification</text>
  <text x="335" y="256" font-size="11" fill="#374151">4. Select target agent</text>
  <text x="335" y="276" font-size="11" fill="#374151">5. Forward with metadata</text>

  <line x1="330" y1="294" x2="510" y2="294" stroke="#d1d5db" stroke-width="1"/>

  <text x="420" y="316" text-anchor="middle" font-size="11" fill="#6b7280">Prefix routing: /work, /project</text>
  <text x="420" y="336" text-anchor="middle" font-size="11" fill="#6b7280">Channel-based defaults</text>
  <text x="420" y="356" text-anchor="middle" font-size="11" fill="#6b7280">Keyword matching</text>
  <text x="420" y="376" text-anchor="middle" font-size="11" fill="#6b7280">Fallback: personal agent</text>

  <!-- Right: Agent Workspaces -->
  <!-- Personal -->
  <rect x="640" y="88" width="280" height="108" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <rect x="640" y="88" width="280" height="32" rx="8" fill="#16a34a"/>
  <rect x="640" y="104" width="280" height="16" fill="#16a34a"/>
  <text x="780" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Personal Agent</text>

  <text x="660" y="140" font-size="11" fill="#6b7280">Skills:</text>
  <text x="705" y="140" font-size="11" fill="#374151" font-weight="500">calendar, email, reminders</text>
  <text x="660" y="158" font-size="11" fill="#6b7280">Classification:</text>
  <rect x="745" y="146" width="72" height="18" rx="4" fill="#dcfce7"/>
  <text x="781" y="159" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">INTERNAL</text>
  <text x="660" y="180" font-size="11" fill="#6b7280">Default for: personal messages</text>

  <!-- Work -->
  <rect x="640" y="212" width="280" height="108" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <rect x="640" y="212" width="280" height="32" rx="8" fill="#2563eb"/>
  <rect x="640" y="228" width="280" height="16" fill="#2563eb"/>
  <text x="780" y="234" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Work Agent</text>

  <text x="660" y="264" font-size="11" fill="#6b7280">Skills:</text>
  <text x="705" y="264" font-size="11" fill="#374151" font-weight="500">GitHub, Jira, Slack</text>
  <text x="660" y="282" font-size="11" fill="#6b7280">Classification:</text>
  <rect x="745" y="270" width="100" height="18" rx="4" fill="#dbeafe"/>
  <text x="795" y="283" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">CONFIDENTIAL</text>
  <text x="660" y="304" font-size="11" fill="#6b7280">Default for: /work prefix</text>

  <!-- Side Project -->
  <rect x="640" y="336" width="280" height="108" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <rect x="640" y="336" width="280" height="32" rx="8" fill="#7c3aed"/>
  <rect x="640" y="352" width="280" height="16" fill="#7c3aed"/>
  <text x="780" y="358" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Side Project Agent</text>

  <text x="660" y="388" font-size="11" fill="#6b7280">Skills:</text>
  <text x="705" y="388" font-size="11" fill="#374151" font-weight="500">coding, web search, docs</text>
  <text x="660" y="406" font-size="11" fill="#6b7280">Classification:</text>
  <rect x="745" y="394" width="72" height="18" rx="4" fill="#f3e8ff"/>
  <text x="781" y="407" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">INTERNAL</text>
  <text x="660" y="428" font-size="11" fill="#6b7280">Default for: /project prefix</text>

  <!-- Arrows: Channels to Router -->
  <line x1="190" y1="125" x2="298" y2="200" stroke="#374151" stroke-width="1.2" marker-end="url(#mar-arrow)"/>
  <line x1="190" y1="200" x2="298" y2="230" stroke="#374151" stroke-width="1.2" marker-end="url(#mar-arrow)"/>
  <line x1="190" y1="275" x2="298" y2="260" stroke="#374151" stroke-width="1.2" marker-end="url(#mar-arrow)"/>
  <line x1="190" y1="350" x2="298" y2="300" stroke="#374151" stroke-width="1.2" marker-end="url(#mar-arrow)"/>

  <!-- Arrows: Router to Workspaces -->
  <line x1="530" y1="180" x2="628" y2="142" stroke="#16a34a" stroke-width="1.2" marker-end="url(#mar-arrow)"/>
  <line x1="530" y1="240" x2="628" y2="266" stroke="#2563eb" stroke-width="1.2" marker-end="url(#mar-arrow)"/>
  <line x1="530" y1="310" x2="628" y2="390" stroke="#7c3aed" stroke-width="1.2" marker-end="url(#mar-arrow)"/>

  <!-- Bottom note -->
  <text x="480" y="490" text-anchor="middle" font-size="12" fill="#374151" font-weight="500">Each workspace is fully isolated — separate session state, taint tracking, and skill access</text>
  <text x="480" y="510" text-anchor="middle" font-size="12" fill="#6b7280">CONFIDENTIAL data in Work cannot flow to Personal or Side Project agents</text>
</svg>