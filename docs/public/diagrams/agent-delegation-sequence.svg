<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 860 460"
  width="860"
  height="460"
  font-family="system-ui, sans-serif"
>
  <defs>
    <marker
      id="ads-arrow"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151" />
    </marker>
    <marker
      id="ads-green"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
    <marker
      id="ads-red"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="460" fill="#ffffff" />

  <!-- Title -->
  <text
    x="430"
    y="36"
    text-anchor="middle"
    font-size="18"
    font-weight="700"
    fill="#1e40af"
  >Agent Delegation Sequence</text>

  <!-- Agent A box -->
  <rect
    x="40"
    y="70"
    width="180"
    height="70"
    rx="8"
    fill="#f3f4f6"
    stroke="#9ca3af"
    stroke-width="2"
  />
  <text
    x="130"
    y="98"
    text-anchor="middle"
    font-size="15"
    font-weight="700"
    fill="#374151"
  >Agent A</text>
  <text x="130" y="118" text-anchor="middle" font-size="12" fill="#6b7280"
  >taint: CONFIDENTIAL</text>

  <!-- Arrow A → Check -->
  <line
    x1="220"
    y1="105"
    x2="278"
    y2="105"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#ads-arrow)"
  />
  <text x="250" y="96" text-anchor="middle" font-size="11" fill="#6b7280"
  >calls B</text>

  <!-- Check ceiling box -->
  <rect
    x="290"
    y="70"
    width="180"
    height="70"
    rx="8"
    fill="#dbeafe"
    stroke="#1e40af"
    stroke-width="2"
  />
  <text
    x="380"
    y="98"
    text-anchor="middle"
    font-size="14"
    font-weight="600"
    fill="#1e40af"
  >Check B's Ceiling</text>
  <text x="380" y="118" text-anchor="middle" font-size="12" fill="#1e40af"
  >B.ceiling >= A.taint?</text>

  <!-- Diamond decision -->
  <polygon
    points="600,105 660,145 600,185 540,145"
    fill="#f3f4f6"
    stroke="#374151"
    stroke-width="2"
  />
  <text
    x="600"
    y="142"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#374151"
  >ceiling</text>
  <text
    x="600"
    y="156"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#374151"
  >>= taint?</text>

  <!-- Arrow Check → Diamond -->
  <line
    x1="470"
    y1="105"
    x2="545"
    y2="132"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#ads-arrow)"
  />

  <!-- YES path down -->
  <line
    x1="600"
    y1="185"
    x2="600"
    y2="248"
    stroke="#16a34a"
    stroke-width="2"
    marker-end="url(#ads-green)"
  />
  <text x="620" y="220" font-size="13" font-weight="700" fill="#16a34a"
  >Yes</text>

  <!-- Inherit taint box -->
  <rect
    x="480"
    y="260"
    width="240"
    height="60"
    rx="8"
    fill="#dcfce7"
    stroke="#16a34a"
    stroke-width="2"
  />
  <text
    x="600"
    y="285"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#166534"
  >B inherits taint</text>
  <text x="600" y="305" text-anchor="middle" font-size="12" fill="#166534"
  >max(B.taint, A.taint)</text>

  <!-- Arrow to B processes -->
  <line
    x1="600"
    y1="320"
    x2="600"
    y2="358"
    stroke="#16a34a"
    stroke-width="2"
    marker-end="url(#ads-green)"
  />

  <!-- B processes task -->
  <rect
    x="480"
    y="370"
    width="240"
    height="50"
    rx="8"
    fill="#dcfce7"
    stroke="#16a34a"
    stroke-width="2"
  />
  <text
    x="600"
    y="400"
    text-anchor="middle"
    font-size="14"
    font-weight="600"
    fill="#166534"
  >B processes task</text>

  <!-- NO path right -->
  <line
    x1="660"
    y1="145"
    x2="738"
    y2="145"
    stroke="#dc2626"
    stroke-width="2"
    marker-end="url(#ads-red)"
  />
  <text x="700" y="136" font-size="13" font-weight="700" fill="#dc2626"
  >No</text>

  <!-- BLOCKED box -->
  <rect
    x="750"
    y="120"
    width="90"
    height="50"
    rx="8"
    fill="#fef2f2"
    stroke="#dc2626"
    stroke-width="2"
  />
  <text
    x="795"
    y="150"
    text-anchor="middle"
    font-size="14"
    font-weight="700"
    fill="#dc2626"
  >BLOCKED</text>

  <!-- Bottom note -->
  <rect
    x="40"
    y="260"
    width="380"
    height="70"
    rx="8"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1"
  />
  <text
    x="230"
    y="285"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#374151"
  >Delegation enforces ceiling checks</text>
  <text x="230" y="305" text-anchor="middle" font-size="12" fill="#6b7280"
  >A cannot delegate to B if A's taint</text>
  <text x="230" y="320" text-anchor="middle" font-size="12" fill="#6b7280"
  >exceeds B's classification ceiling.</text>
</svg>
