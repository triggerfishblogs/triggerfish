<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="900" height="720" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arw" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e40af">End-to-End Taint Example with BLOCKED Output</text>

  <!-- Step 1: Session starts -->
  <circle cx="70" cy="90" r="18" fill="#2563eb"/>
  <text x="70" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1</text>
  <rect x="100" y="68" width="700" height="44" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="140" y="88" font-size="14" font-weight="600" fill="#166534">Session starts</text>
  <text x="140" y="104" font-size="12" fill="#166534">Taint: PUBLIC</text>
  <rect x="660" y="76" width="120" height="28" rx="6" fill="#16a34a"/>
  <text x="720" y="95" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">PUBLIC</text>

  <!-- Arrow -->
  <line x1="450" y1="112" x2="450" y2="140" stroke="#374151" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- Step 2: User asks question -->
  <circle cx="70" cy="168" r="18" fill="#2563eb"/>
  <text x="70" y="173" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2</text>
  <rect x="100" y="146" width="700" height="44" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="140" y="166" font-size="14" font-weight="600" fill="#374151">User asks: "What's in our GitHub repo?"</text>
  <text x="140" y="182" font-size="12" fill="#6b7280">PRE_CONTEXT_INJECTION evaluates</text>
  <rect x="680" y="154" width="100" height="28" rx="6" fill="#16a34a"/>
  <text x="730" y="173" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">ALLOW</text>

  <!-- Arrow -->
  <line x1="450" y1="190" x2="450" y2="218" stroke="#374151" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- Step 3: Agent calls GitHub tool -->
  <circle cx="70" cy="246" r="18" fill="#2563eb"/>
  <text x="70" y="251" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3</text>
  <rect x="100" y="224" width="700" height="56" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="140" y="246" font-size="14" font-weight="600" fill="#92400e">PRE_TOOL_CALL: Agent calls github_list_repos</text>
  <text x="140" y="264" font-size="12" fill="#92400e">GitHub integration classified CONFIDENTIAL — taint escalates</text>
  <rect x="620" y="234" width="160" height="28" rx="6" fill="#d97706"/>
  <text x="700" y="253" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">CONFIDENTIAL</text>

  <!-- Escalation indicator -->
  <text x="640" y="272" font-size="11" fill="#d97706" font-weight="500">Taint: PUBLIC -> CONFIDENTIAL</text>

  <!-- Arrow -->
  <line x1="450" y1="280" x2="450" y2="310" stroke="#374151" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- Step 4: Tool returns data -->
  <circle cx="70" cy="338" r="18" fill="#2563eb"/>
  <text x="70" y="343" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">4</text>
  <rect x="100" y="316" width="700" height="56" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="140" y="338" font-size="14" font-weight="600" fill="#92400e">POST_TOOL_RESPONSE: Tool returns repository list</text>
  <text x="140" y="356" font-size="12" fill="#92400e">Response data classified CONFIDENTIAL — taint confirmed</text>
  <rect x="680" y="326" width="100" height="28" rx="6" fill="#16a34a"/>
  <text x="730" y="345" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">ALLOW</text>

  <!-- Arrow -->
  <line x1="450" y1="372" x2="450" y2="402" stroke="#374151" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- Step 5: Agent generates reply -->
  <circle cx="70" cy="430" r="18" fill="#2563eb"/>
  <text x="70" y="435" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">5</text>
  <rect x="100" y="408" width="700" height="44" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="140" y="428" font-size="14" font-weight="600" fill="#374151">LLM generates reply with repo details</text>
  <text x="140" y="444" font-size="12" fill="#6b7280">Response contains CONFIDENTIAL data from GitHub</text>

  <!-- Arrow -->
  <line x1="450" y1="452" x2="450" y2="482" stroke="#374151" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- Step 6: PRE_OUTPUT check -->
  <circle cx="70" cy="522" r="18" fill="#dc2626"/>
  <text x="70" y="527" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">6</text>
  <rect x="100" y="490" width="700" height="76" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="140" y="514" font-size="14" font-weight="700" fill="#dc2626">PRE_OUTPUT: Destination = Slack (PUBLIC channel)</text>
  <text x="140" y="534" font-size="13" fill="#dc2626">Session taint: CONFIDENTIAL  |  Channel classification: PUBLIC</text>
  <text x="140" y="554" font-size="12" font-weight="600" fill="#dc2626">CONFIDENTIAL cannot flow to PUBLIC — no-write-down violation</text>
  <rect x="660" y="500" width="120" height="32" rx="6" fill="#dc2626"/>
  <text x="720" y="521" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">BLOCKED</text>

  <!-- Big X -->
  <line x1="430" y1="580" x2="470" y2="610" stroke="#dc2626" stroke-width="4"/>
  <line x1="470" y1="580" x2="430" y2="610" stroke="#dc2626" stroke-width="4"/>

  <!-- Explanation box -->
  <rect x="140" y="630" width="620" height="70" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="450" y="655" text-anchor="middle" font-size="14" font-weight="600" fill="#dc2626">Message NOT delivered to Slack</text>
  <text x="450" y="675" text-anchor="middle" font-size="12" fill="#991b1b">The agent must respond via a CONFIDENTIAL or higher channel,</text>
  <text x="450" y="691" text-anchor="middle" font-size="12" fill="#991b1b">or the user must re-ask on a channel with sufficient classification.</text>
</svg>