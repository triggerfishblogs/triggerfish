<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 860 380"
  width="860"
  height="380"
  font-family="system-ui, sans-serif"
>
  <defs>
    <marker
      id="rl-arr"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151" />
    </marker>
    <marker
      id="rl-arr-red"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="380" fill="#ffffff" />

  <!-- Title -->
  <text
    x="430"
    y="36"
    text-anchor="middle"
    font-size="18"
    font-weight="700"
    fill="#1e40af"
  >Rate Limiter Flow</text>

  <!-- Step 1: Agent Loop -->
  <rect
    x="30"
    y="120"
    width="130"
    height="60"
    rx="8"
    fill="#dbeafe"
    stroke="#93c5fd"
    stroke-width="1.5"
  />
  <text
    x="95"
    y="155"
    text-anchor="middle"
    font-size="14"
    font-weight="600"
    fill="#1e40af"
  >Agent Loop</text>

  <!-- Arrow: Agent Loop → Rate Limiter -->
  <line
    x1="160"
    y1="150"
    x2="206"
    y2="150"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#rl-arr)"
  />

  <!-- Step 2: Rate Limiter -->
  <rect
    x="210"
    y="120"
    width="140"
    height="60"
    rx="8"
    fill="#2563eb"
    stroke="#1e40af"
    stroke-width="1.5"
  />
  <text
    x="280"
    y="148"
    text-anchor="middle"
    font-size="14"
    font-weight="600"
    fill="#ffffff"
  >Rate Limiter</text>
  <text
    x="280"
    y="166"
    text-anchor="middle"
    font-size="11"
    fill="#bfdbfe"
  >Sliding window</text>

  <!-- Arrow: Rate Limiter → Decision Diamond -->
  <line
    x1="350"
    y1="150"
    x2="396"
    y2="150"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#rl-arr)"
  />

  <!-- Decision Diamond -->
  <polygon
    points="480,90 560,150 480,210 400,150"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1.5"
  />
  <text
    x="480"
    y="145"
    text-anchor="middle"
    font-size="12"
    font-weight="600"
    fill="#374151"
  >Capacity</text>
  <text
    x="480"
    y="162"
    text-anchor="middle"
    font-size="12"
    font-weight="600"
    fill="#374151"
  >Available?</text>

  <!-- Arrow: Yes → Forward to Provider -->
  <line
    x1="560"
    y1="130"
    x2="616"
    y2="105"
    stroke="#16a34a"
    stroke-width="2"
    marker-end="url(#rl-arr)"
  />
  <!-- Label: Yes -->
  <rect x="566" y="98" width="40" height="20" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1" />
  <text x="586" y="112" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">Yes</text>

  <!-- Arrow: No → Wait for Window -->
  <line
    x1="560"
    y1="170"
    x2="616"
    y2="195"
    stroke="#dc2626"
    stroke-width="2"
    marker-end="url(#rl-arr-red)"
  />
  <!-- Label: No -->
  <rect x="566" y="184" width="40" height="20" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" />
  <text x="586" y="198" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">No</text>

  <!-- Step 3a: Forward to Provider -->
  <rect
    x="620"
    y="72"
    width="180"
    height="60"
    rx="8"
    fill="#dcfce7"
    stroke="#16a34a"
    stroke-width="1.5"
  />
  <text
    x="710"
    y="98"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#166534"
  >Forward to</text>
  <text
    x="710"
    y="118"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#166534"
  >Provider</text>

  <!-- Arrow: Forward → Record Usage -->
  <line
    x1="710"
    y1="132"
    x2="710"
    y2="246"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#rl-arr)"
  />

  <!-- Record Usage -->
  <rect
    x="620"
    y="252"
    width="180"
    height="50"
    rx="8"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1.5"
  />
  <text
    x="710"
    y="282"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#374151"
  >Record Usage</text>

  <!-- Step 3b: Wait for Window Slide -->
  <rect
    x="620"
    y="172"
    width="180"
    height="60"
    rx="8"
    fill="#fef2f2"
    stroke="#fca5a5"
    stroke-width="1.5"
  />
  <text
    x="710"
    y="198"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#dc2626"
  >Wait for</text>
  <text
    x="710"
    y="218"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#dc2626"
  >Window Slide</text>

  <!-- Return arrow: Wait → Rate Limiter (loop back) -->
  <path
    d="M 620 215 C 560 250, 400 280, 280 186"
    fill="none"
    stroke="#dc2626"
    stroke-width="1.5"
    stroke-dasharray="6,3"
    marker-end="url(#rl-arr-red)"
  />
  <text
    x="430"
    y="268"
    text-anchor="middle"
    font-size="11"
    fill="#dc2626"
  >Retry after window slides</text>

  <!-- Bottom note -->
  <rect
    x="130"
    y="326"
    width="600"
    height="40"
    rx="8"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1"
  />
  <text
    x="430"
    y="344"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#374151"
  >Sliding window rate limiter prevents provider quota exhaustion</text>
  <text x="430" y="360" text-anchor="middle" font-size="12" fill="#6b7280"
  >Per-provider, per-model limits with automatic backoff.</text>
</svg>