<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 900 340"
  width="900"
  height="340"
  font-family="system-ui, sans-serif"
>
  <defs>
    <marker
      id="sr-arr"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" fill="#ffffff" />

  <!-- Title -->
  <text
    x="450"
    y="36"
    text-anchor="middle"
    font-size="18"
    font-weight="700"
    fill="#1e40af"
  >Secret Resolution Flow</text>

  <!-- Step 1: Config File -->
  <rect
    x="20"
    y="80"
    width="180"
    height="80"
    rx="8"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1.5"
  />
  <text
    x="110"
    y="108"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#374151"
  >Config File</text>
  <text
    x="110"
    y="128"
    text-anchor="middle"
    font-size="10"
    fill="#6b7280"
  >triggerfish.yaml</text>
  <rect x="34" y="138" width="152" height="16" rx="3" fill="#e5e7eb" />
  <text
    x="110"
    y="150"
    text-anchor="middle"
    font-size="9"
    font-weight="500"
    fill="#374151"
    font-family="monospace"
  >secret:provider:anthropic:apiKey</text>

  <!-- Arrow -->
  <line
    x1="200"
    y1="120"
    x2="246"
    y2="120"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#sr-arr)"
  />

  <!-- Step 2: Secret Resolver -->
  <rect
    x="250"
    y="80"
    width="160"
    height="80"
    rx="8"
    fill="#2563eb"
    stroke="#1e40af"
    stroke-width="1.5"
  />
  <text
    x="330"
    y="112"
    text-anchor="middle"
    font-size="14"
    font-weight="600"
    fill="#ffffff"
  >Secret Resolver</text>
  <text
    x="330"
    y="132"
    text-anchor="middle"
    font-size="11"
    fill="#bfdbfe"
  >Parse secret: prefix</text>
  <text
    x="330"
    y="148"
    text-anchor="middle"
    font-size="11"
    fill="#bfdbfe"
  >Lookup by path</text>

  <!-- Arrow -->
  <line
    x1="410"
    y1="120"
    x2="456"
    y2="120"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#sr-arr)"
  />

  <!-- Step 3: OS Keychain -->
  <rect
    x="460"
    y="80"
    width="150"
    height="80"
    rx="8"
    fill="#fef3c7"
    stroke="#f59e0b"
    stroke-width="1.5"
  />
  <text
    x="535"
    y="112"
    text-anchor="middle"
    font-size="14"
    font-weight="600"
    fill="#92400e"
  >OS Keychain</text>
  <text
    x="535"
    y="132"
    text-anchor="middle"
    font-size="11"
    fill="#92400e"
  >macOS Keychain</text>
  <text
    x="535"
    y="148"
    text-anchor="middle"
    font-size="11"
    fill="#92400e"
  >GNOME Keyring / etc.</text>

  <!-- Arrow -->
  <line
    x1="610"
    y1="120"
    x2="656"
    y2="120"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#sr-arr)"
  />

  <!-- Step 4: Resolved Value -->
  <rect
    x="660"
    y="80"
    width="140"
    height="80"
    rx="8"
    fill="#dcfce7"
    stroke="#16a34a"
    stroke-width="1.5"
  />
  <text
    x="730"
    y="112"
    text-anchor="middle"
    font-size="14"
    font-weight="600"
    fill="#166534"
  >Resolved Value</text>
  <text
    x="730"
    y="132"
    text-anchor="middle"
    font-size="11"
    fill="#166534"
  >In-memory only</text>
  <text
    x="730"
    y="148"
    text-anchor="middle"
    font-size="11"
    fill="#166534"
  >Never logged</text>

  <!-- Arrow down to HTTP Request -->
  <line
    x1="730"
    y1="160"
    x2="730"
    y2="206"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#sr-arr)"
  />

  <!-- Step 5: HTTP Request -->
  <rect
    x="620"
    y="212"
    width="220"
    height="60"
    rx="8"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1.5"
  />
  <text
    x="730"
    y="238"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#374151"
  >HTTP Request</text>
  <text
    x="730"
    y="258"
    text-anchor="middle"
    font-size="11"
    fill="#6b7280"
  >Below LLM layer (unforgeable)</text>

  <!-- Annotation: LLM never sees secrets -->
  <rect
    x="30"
    y="200"
    width="260"
    height="70"
    rx="8"
    fill="#fef2f2"
    stroke="#fca5a5"
    stroke-width="1"
  />
  <text
    x="160"
    y="224"
    text-anchor="middle"
    font-size="12"
    font-weight="600"
    fill="#dc2626"
  >LLM never sees secrets</text>
  <text
    x="160"
    y="242"
    text-anchor="middle"
    font-size="11"
    fill="#991b1b"
  >Resolution happens below the LLM layer.</text>
  <text
    x="160"
    y="258"
    text-anchor="middle"
    font-size="11"
    fill="#991b1b"
  >Secrets are not in config files or env vars.</text>

  <!-- Bottom note -->
  <rect
    x="150"
    y="296"
    width="600"
    height="30"
    rx="8"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1"
  />
  <text
    x="450"
    y="316"
    text-anchor="middle"
    font-size="12"
    fill="#6b7280"
  >Config references secrets by path. Actual values live only in the OS keychain.</text>
</svg>