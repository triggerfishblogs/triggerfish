<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 860 420"
  width="860"
  height="420"
  font-family="system-ui, sans-serif"
>
  <defs>
    <marker
      id="nr-arr"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="420" fill="#ffffff" />

  <!-- Title -->
  <text
    x="430"
    y="36"
    text-anchor="middle"
    font-size="18"
    font-weight="700"
    fill="#1e40af"
  >Notification Routing</text>

  <!-- Step 1: Notification -->
  <rect
    x="30"
    y="130"
    width="140"
    height="60"
    rx="8"
    fill="#dbeafe"
    stroke="#93c5fd"
    stroke-width="1.5"
  />
  <text
    x="100"
    y="165"
    text-anchor="middle"
    font-size="14"
    font-weight="600"
    fill="#1e40af"
  >Notification</text>

  <!-- Arrow: Notification → Priority Check -->
  <line
    x1="170"
    y1="160"
    x2="216"
    y2="160"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#nr-arr)"
  />

  <!-- Step 2: Priority Check (diamond) -->
  <polygon
    points="300,100 380,160 300,220 220,160"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1.5"
  />
  <text
    x="300"
    y="155"
    text-anchor="middle"
    font-size="12"
    font-weight="600"
    fill="#374151"
  >Priority</text>
  <text
    x="300"
    y="172"
    text-anchor="middle"
    font-size="12"
    font-weight="600"
    fill="#374151"
  >Check</text>

  <!-- Arrow: Priority Check → Preferred Channel (high) -->
  <line
    x1="380"
    y1="130"
    x2="436"
    y2="105"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#nr-arr)"
  />
  <!-- Label: High Priority -->
  <rect x="370" y="88" width="56" height="20" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1" />
  <text x="398" y="102" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">HIGH</text>

  <!-- Arrow: Priority Check → Batch Queue (low) -->
  <line
    x1="380"
    y1="190"
    x2="436"
    y2="215"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#nr-arr)"
  />
  <!-- Label: Low Priority -->
  <rect x="370" y="204" width="56" height="20" rx="4" fill="#fef3c7" stroke="#fbbf24" stroke-width="1" />
  <text x="398" y="218" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">LOW</text>

  <!-- Step 3a: Preferred Channel -->
  <rect
    x="440"
    y="72"
    width="150"
    height="60"
    rx="8"
    fill="#dcfce7"
    stroke="#16a34a"
    stroke-width="1.5"
  />
  <text
    x="515"
    y="98"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#166534"
  >Preferred</text>
  <text
    x="515"
    y="116"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#166534"
  >Channel</text>

  <!-- Step 3b: Batch Queue -->
  <rect
    x="440"
    y="190"
    width="150"
    height="60"
    rx="8"
    fill="#fef3c7"
    stroke="#fbbf24"
    stroke-width="1.5"
  />
  <text
    x="515"
    y="216"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#92400e"
  >Batch Queue</text>
  <text
    x="515"
    y="234"
    text-anchor="middle"
    font-size="11"
    fill="#92400e"
  >Aggregate &amp; delay</text>

  <!-- Arrow: Preferred Channel → Channel Router -->
  <line
    x1="590"
    y1="102"
    x2="636"
    y2="145"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#nr-arr)"
  />

  <!-- Arrow: Batch Queue → Channel Router -->
  <line
    x1="590"
    y1="220"
    x2="636"
    y2="175"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#nr-arr)"
  />

  <!-- Step 4: Channel Router -->
  <rect
    x="640"
    y="130"
    width="170"
    height="60"
    rx="8"
    fill="#2563eb"
    stroke="#1e40af"
    stroke-width="1.5"
  />
  <text
    x="725"
    y="156"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#ffffff"
  >Channel Router</text>
  <text
    x="725"
    y="174"
    text-anchor="middle"
    font-size="11"
    fill="#bfdbfe"
  >Classification gate</text>

  <!-- Arrow: Channel Router → Delivery -->
  <line
    x1="725"
    y1="190"
    x2="725"
    y2="256"
    stroke="#374151"
    stroke-width="2"
    marker-end="url(#nr-arr)"
  />

  <!-- Step 5: Delivery -->
  <rect
    x="640"
    y="262"
    width="170"
    height="60"
    rx="8"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1.5"
  />
  <text
    x="725"
    y="288"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#374151"
  >Delivery</text>
  <text
    x="725"
    y="306"
    text-anchor="middle"
    font-size="11"
    fill="#6b7280"
  >With retry &amp; backoff</text>

  <!-- Bottom note -->
  <rect
    x="130"
    y="360"
    width="600"
    height="44"
    rx="8"
    fill="#f3f4f6"
    stroke="#d1d5db"
    stroke-width="1"
  />
  <text
    x="430"
    y="380"
    text-anchor="middle"
    font-size="13"
    font-weight="600"
    fill="#374151"
  >Classification is enforced at the Channel Router</text>
  <text x="430" y="396" text-anchor="middle" font-size="12" fill="#6b7280"
  >Tainted sessions cannot deliver to channels below their classification level.</text>
</svg>