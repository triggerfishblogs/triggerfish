<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="ocean" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#023E8A"/>
      <stop offset="50%" stop-color="#0077B6"/>
      <stop offset="100%" stop-color="#48CAE4"/>
    </linearGradient>
  </defs>
  <!-- Stylized triggerfish silhouette -->
  <path d="M6 16c0-5.5 4.5-10 10-10s10 4.5 10 10-4.5 10-10 10S6 21.5 6 16z" fill="url(#ocean)" opacity="0.9"/>
  <path d="M8 16c0-4.4 3.6-8 8-8s8 3.6 8 8-3.6 8-8 8-8-3.6-8-8z" fill="white" opacity="0.15"/>
  <!-- Fish body -->
  <ellipse cx="15" cy="16" rx="7" ry="5" fill="url(#ocean)"/>
  <!-- Tail -->
  <path d="M22 16l5-4v8l-5-4z" fill="url(#ocean)"/>
  <!-- Eye -->
  <circle cx="11" cy="15" r="1.5" fill="white"/>
  <circle cx="11" cy="15" r="0.7" fill="#023E8A"/>
  <!-- Dorsal fin -->
  <path d="M14 11l2-3 2 3" fill="url(#ocean)" opacity="0.8"/>
  <!-- Ventral fin -->
  <path d="M14 21l2 2.5 2-2.5" fill="url(#ocean)" opacity="0.8"/>
  <!-- Stripe pattern (triggerfish marking) -->
  <path d="M12 13.5c2 0 4 1 5 2.5" stroke="white" stroke-width="0.5" opacity="0.4" fill="none"/>
  <path d="M12 15.5c2 0.5 4 1.5 5 2" stroke="white" stroke-width="0.5" opacity="0.3" fill="none"/>
</svg>
